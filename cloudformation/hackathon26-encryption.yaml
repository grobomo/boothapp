AWSTemplateFormatVersion: '2010-09-09'
Description: >
  KMS CMK and S3 bucket encryption enforcement for hackathon26.
  NIST SP 800-53 control PR.DS-10 (data-at-rest protection).

Parameters:
  InstanceRoleArn:
    Type: String
    Description: ARN of the hackathon26-instance-role IAM role
    Default: ''

Conditions:
  HasInstanceRole: !Not [!Equals [!Ref InstanceRoleArn, '']]

Resources:
  # -------------------------------------------------------
  # KMS Customer-Managed Key
  # -------------------------------------------------------
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: hackathon26 data-at-rest encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: hackathon26-key-policy
        Statement:
          - Sid: RootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - !If
            - HasInstanceRole
            - Sid: InstanceRoleAccess
              Effect: Allow
              Principal:
                AWS: !Ref InstanceRoleArn
              Action:
                - 'kms:Decrypt'
                - 'kms:GenerateDataKey'
              Resource: '*'
            - !Ref 'AWS::NoValue'
      Tags:
        - Key: Project
          Value: hackathon26
        - Key: NIST-Control
          Value: PR.DS-10

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/hackathon26-cmk
      TargetKeyId: !Ref EncryptionKey

  # -------------------------------------------------------
  # S3 Bucket Policies -- enforce SSE-KMS on every PUT
  # -------------------------------------------------------
  SessionsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: boothapp-sessions-752266476357
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedPut
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: 'arn:aws:s3:::boothapp-sessions-752266476357/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'aws:kms'
          - Sid: DenyWrongKey
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: 'arn:aws:s3:::boothapp-sessions-752266476357/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption-aws-kms-key-id': !GetAtt EncryptionKey.Arn

  StateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: hackathon26-state-752266476357
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedPut
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: 'arn:aws:s3:::hackathon26-state-752266476357/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'aws:kms'
          - Sid: DenyWrongKey
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: 'arn:aws:s3:::hackathon26-state-752266476357/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption-aws-kms-key-id': !GetAtt EncryptionKey.Arn

Outputs:
  KmsKeyArn:
    Description: ARN of the hackathon26 KMS encryption key
    Value: !GetAtt EncryptionKey.Arn
    Export:
      Name: hackathon26-kms-key-arn
