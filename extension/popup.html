<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1-Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
    }

    /* ── Header ── */

    .header {
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    .s3-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .s3-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
    }

    .s3-dot.active {
      background: #34d399;
      box-shadow: 0 0 6px #34d39966;
    }

    .s3-status-text {
      color: #6b7280;
    }

    .s3-status-text.active {
      color: #34d399;
    }

    /* ── Hero: Status Circle + Timer ── */

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 16px;
    }

    .status-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #2a2a3a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .status-circle.recording {
      background: #059669;
      box-shadow: 0 0 40px #34d39966, 0 0 80px #34d39933;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .status-circle.error {
      background: #dc2626;
      box-shadow: 0 0 40px #ef444466, 0 0 80px #ef444433;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px #34d39966, 0 0 80px #34d39933; }
      50% { box-shadow: 0 0 60px #34d39999, 0 0 100px #34d39955; }
    }

    .circle-timer {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .circle-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-circle:not(.recording):not(.error) .circle-timer {
      color: #6b7280;
    }

    .status-circle:not(.recording):not(.error) .circle-label {
      color: #4b5563;
    }

    .hero-visitor {
      font-size: 16px;
      color: #a78bfa;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }

    .hero-visitor.visible {
      display: block;
    }

    .hero-error-msg {
      font-size: 13px;
      color: #f87171;
      margin-top: 8px;
      display: none;
      text-align: center;
      max-width: 300px;
    }

    .hero-error-msg.visible {
      display: block;
    }

    /* ── Stats Row ── */

    .stats-row {
      display: flex;
      gap: 12px;
      margin: 0 20px 16px;
    }

    .stat-box {
      flex: 1;
      background: #12121c;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
      margin-top: 6px;
    }

    /* ── Session Button ── */

    .btn-wrap {
      padding: 0 20px 16px;
    }

    .session-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .session-btn.start {
      background: linear-gradient(135deg, #059669 0%, #34d399 100%);
      color: #fff;
      box-shadow: 0 4px 16px #05966950;
    }

    .session-btn.start:hover {
      box-shadow: 0 6px 24px #05966970;
      transform: translateY(-1px);
    }

    .session-btn.stop {
      background: linear-gradient(135deg, #dc2626 0%, #f87171 100%);
      color: #fff;
      box-shadow: 0 4px 16px #dc262650;
    }

    .session-btn.stop:hover {
      box-shadow: 0 6px 24px #dc262670;
      transform: translateY(-1px);
    }

    .session-btn:active {
      transform: translateY(0);
    }

    /* ── Session Info (compact) ── */

    .session-info {
      padding: 0 20px 12px;
    }

    .session-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      color: #6b7280;
    }

    .session-info-val {
      color: #9ca3af;
      text-align: right;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-info-val.muted {
      color: #3d3d5c;
    }

    /* ── S3 Config (collapsible) ── */

    .s3-section {
      border-top: 1px solid #2a2a4a;
      padding: 0 20px;
    }

    .s3-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 10px 0;
    }

    .s3-toggle:hover .s3-toggle-label {
      color: #9ca3af;
    }

    .s3-arrow {
      font-size: 10px;
      color: #6b7280;
      transition: transform 0.2s;
    }

    .s3-arrow.open {
      transform: rotate(90deg);
    }

    .s3-toggle-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
    }

    .s3-configured-badge {
      font-size: 13px;
      color: #34d399;
      display: none;
    }

    .s3-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 14px;
    }

    .s3-body.collapsed {
      display: none;
    }

    .s3-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .s3-label {
      font-size: 11px;
      color: #6b7280;
      letter-spacing: 0.3px;
    }

    .s3-input {
      background: #12121c;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: #e8e8f0;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    .s3-input:focus {
      border-color: #a78bfa;
    }

    .s3-input::placeholder {
      color: #3d3d5c;
    }

    .s3-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .s3-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .s3-btn:hover {
      opacity: 0.85;
    }

    .s3-btn-save {
      background: #a78bfa;
      color: #0f0f14;
    }

    .s3-btn-save.saved {
      background: #34d399;
    }

    .s3-btn-demo {
      background: #16213e;
      border: 1px solid #2a2a4a;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="brand-name">V1-Helper</div>
    </div>
    <div class="s3-status">
      <div class="s3-dot" id="s3PollDot"></div>
      <span class="s3-status-text" id="s3PollText">S3: --</span>
    </div>
  </div>

  <!-- Hero: 150px status circle with timer inside -->
  <div class="hero">
    <div class="status-circle" id="statusCircle">
      <div class="circle-timer" id="circleTimer">--:--</div>
      <div class="circle-label" id="circleLabel">IDLE</div>
    </div>
    <div class="hero-visitor" id="heroVisitor"></div>
    <div class="hero-error-msg" id="heroError"></div>
  </div>

  <!-- Stats: Clicks + Screenshots (big numbers) -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="statClicks">0</div>
      <div class="stat-label">Clicks</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statScreenshots">0</div>
      <div class="stat-label">Screenshots</div>
    </div>
  </div>

  <!-- Start / Stop button -->
  <div class="btn-wrap">
    <button class="session-btn start" id="sessionBtn">Start Session</button>
  </div>

  <!-- Compact session info -->
  <div class="session-info">
    <div class="session-info-row">
      <span>Session</span>
      <span class="session-info-val muted" id="infoSessionId">--</span>
    </div>
    <div class="session-info-row">
      <span>Visitor</span>
      <span class="session-info-val muted" id="infoVisitor">--</span>
    </div>
    <div class="session-info-row">
      <span>Started</span>
      <span class="session-info-val muted" id="infoStartTime">--</span>
    </div>
  </div>

  <!-- S3 Config (collapsible, starts collapsed) -->
  <div class="s3-section">
    <div class="s3-toggle" id="s3ConfigToggle">
      <span class="s3-arrow" id="s3Arrow">&#9654;</span>
      <span class="s3-toggle-label">S3 Configuration</span>
      <span class="s3-configured-badge" id="s3ConfiguredBadge">&#10003;</span>
    </div>

    <div class="s3-body collapsed" id="s3ConfigBody">
      <div class="s3-field">
        <label class="s3-label" for="s3Bucket">S3 Bucket</label>
        <input class="s3-input" id="s3Bucket" type="text" placeholder="my-bucket-name" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="s3Region">AWS Region</label>
        <input class="s3-input" id="s3Region" type="text" placeholder="us-east-1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsAccessKeyId">Access Key ID</label>
        <input class="s3-input" id="awsAccessKeyId" type="text" placeholder="AKIA..." />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSecretAccessKey">Secret Access Key</label>
        <input class="s3-input" id="awsSecretAccessKey" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSessionToken">Session Token <em style="font-style:normal;color:#3d3d5c">(optional)</em></label>
        <input class="s3-input" id="awsSessionToken" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-actions">
        <button class="s3-btn s3-btn-save" id="s3SaveBtn">Save</button>
        <button class="s3-btn s3-btn-demo" id="s3DemoBtn">Pre-fill Demo</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
