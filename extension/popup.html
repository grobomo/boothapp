<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1-Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    /* ── Header ── */

    .header {
      background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .brand-powered {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
      letter-spacing: 0.3px;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .s3-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .s3-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef5350;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .s3-dot.active {
      background: #66bb6a;
      box-shadow: 0 0 8px rgba(102,187,106,0.6);
    }

    .s3-status-text {
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .s3-status-text.active {
      color: #fff;
    }

    .gear-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
    }

    .gear-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .gear-btn svg {
      width: 18px;
      height: 18px;
      fill: rgba(255,255,255,0.8);
      transition: transform 0.3s ease;
    }

    .gear-btn.open svg {
      transform: rotate(90deg);
      fill: #fff;
    }

    /* ── Hero: Status + Timer ── */

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 20px;
      background: #16213e;
    }

    .status-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 3px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
      position: relative;
    }

    .status-ring.recording {
      border-color: #D32F2F;
      box-shadow: 0 0 0 6px rgba(211,47,47,0.15), 0 0 30px rgba(211,47,47,0.2);
      animation: pulse-rec 2s ease-in-out infinite;
    }

    .status-ring.uploading {
      border-color: #42a5f5;
      box-shadow: 0 0 0 6px rgba(66,165,245,0.15), 0 0 30px rgba(66,165,245,0.2);
      animation: pulse-upload 1.5s ease-in-out infinite;
    }

    .status-ring.complete {
      border-color: #66bb6a;
      box-shadow: 0 0 0 6px rgba(102,187,106,0.15), 0 0 30px rgba(102,187,106,0.2);
    }

    .status-ring.error {
      border-color: #B71C1C;
      box-shadow: 0 0 0 6px rgba(183,28,28,0.2);
    }

    @keyframes pulse-rec {
      0%, 100% { box-shadow: 0 0 0 6px rgba(211,47,47,0.15), 0 0 30px rgba(211,47,47,0.2); }
      50% { box-shadow: 0 0 0 12px rgba(211,47,47,0.08), 0 0 50px rgba(211,47,47,0.25); }
    }

    @keyframes pulse-upload {
      0%, 100% { box-shadow: 0 0 0 6px rgba(66,165,245,0.15), 0 0 30px rgba(66,165,245,0.2); }
      50% { box-shadow: 0 0 0 10px rgba(66,165,245,0.08), 0 0 40px rgba(66,165,245,0.3); }
    }

    .ring-icon {
      font-size: 36px;
      line-height: 1;
      display: none;
    }

    .status-ring.complete .ring-icon {
      display: block;
      color: #66bb6a;
    }

    .status-ring.complete .ring-timer,
    .status-ring.complete .ring-label {
      display: none;
    }

    .ring-timer {
      font-size: 28px;
      font-weight: 700;
      color: #9e9e9e;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .ring-label {
      font-size: 10px;
      font-weight: 700;
      color: #616161;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: color 0.3s;
    }

    .status-ring.recording .ring-timer { color: #ef5350; }
    .status-ring.recording .ring-label { color: #ef5350; }
    .status-ring.uploading .ring-timer { color: #42a5f5; }
    .status-ring.uploading .ring-label { color: #42a5f5; }
    .status-ring.error .ring-timer { color: #ef5350; }
    .status-ring.error .ring-label { color: #ef5350; }

    /* Pulsing red dot for recording */
    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D32F2F;
      display: none;
      position: absolute;
      top: 14px;
      right: 14px;
      animation: blink-dot 1s ease-in-out infinite;
    }

    .status-ring.recording .rec-dot {
      display: block;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Blue spinner for uploading */
    .upload-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(66,165,245,0.2);
      border-top-color: #42a5f5;
      border-radius: 50%;
      display: none;
      animation: spin 0.8s linear infinite;
      margin-bottom: 4px;
    }

    .status-ring.uploading .upload-spinner {
      display: block;
    }

    .status-ring.uploading .ring-timer {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hero-visitor {
      font-size: 14px;
      color: #ef5350;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }

    .hero-visitor.visible {
      display: block;
    }

    .hero-error-msg {
      font-size: 12px;
      color: #ef5350;
      margin-top: 8px;
      display: none;
      text-align: center;
      max-width: 280px;
    }

    .hero-error-msg.visible {
      display: block;
    }

    /* ── Stats Row ── */

    .stats-row {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #1a1a2e;
    }

    .stat-box {
      flex: 1;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      transition: border-color 0.3s;
    }

    .stat-box:hover {
      border-color: #3a3a5a;
    }

    .stat-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
      fill: #757575;
      transition: fill 0.3s;
    }

    .stat-box:hover .stat-icon svg {
      fill: #ef5350;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #ef5350;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #757575;
      margin-top: 6px;
    }

    /* ── Session Button ── */

    .btn-wrap {
      padding: 0 20px 16px;
      background: #1a1a2e;
    }

    .btn-wrap.hidden {
      display: none;
    }

    .session-btn {
      width: 100%;
      padding: 13px 20px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .session-btn.start {
      background: linear-gradient(135deg, #D32F2F 0%, #C62828 100%);
      color: #fff;
      box-shadow: 0 3px 12px rgba(211,47,47,0.4);
    }

    .session-btn.start:hover {
      box-shadow: 0 5px 20px rgba(211,47,47,0.5);
      transform: translateY(-1px);
    }

    .session-btn.stop {
      background: transparent;
      color: #ef5350;
      border: 2px solid #ef5350;
      box-shadow: 0 2px 8px rgba(211,47,47,0.2);
    }

    .session-btn.stop:hover {
      background: rgba(211,47,47,0.1);
      box-shadow: 0 4px 16px rgba(211,47,47,0.3);
      transform: translateY(-1px);
    }

    .session-btn:active {
      transform: translateY(0);
    }

    /* ── Session Info ── */

    .session-info {
      padding: 0 20px 12px;
      background: #1a1a2e;
    }

    .session-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 3px 0;
      color: #616161;
    }

    .session-info-val {
      color: #9e9e9e;
      text-align: right;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-info-val.muted {
      color: #4a4a6a;
    }

    /* ── S3 Config (collapsible) ── */

    .s3-section {
      border-top: 1px solid #2a2a4a;
      padding: 0 20px;
      background: #16213e;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding-top 0.35s ease, padding-bottom 0.35s ease;
    }

    .s3-section.open {
      max-height: 600px;
      padding-top: 16px;
      padding-bottom: 16px;
    }

    .s3-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #757575;
      margin-bottom: 12px;
    }

    .s3-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .s3-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .s3-label {
      font-size: 10px;
      color: #757575;
      letter-spacing: 0.3px;
    }

    .s3-input {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #e0e0e0;
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .s3-input:focus {
      border-color: #D32F2F;
      box-shadow: 0 0 0 2px rgba(211,47,47,0.15);
    }

    .s3-input::placeholder {
      color: #4a4a6a;
    }

    .s3-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .s3-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, background 0.2s;
    }

    .s3-btn:hover {
      opacity: 0.85;
    }

    .s3-btn-save {
      background: #D32F2F;
      color: #fff;
    }

    .s3-btn-save.saved {
      background: #66bb6a;
    }

    .s3-btn-demo {
      background: #2a2a4a;
      color: #9e9e9e;
      border: 1px solid #3a3a5a;
    }

    .s3-btn-demo:hover {
      color: #e0e0e0;
    }

    /* ── Screenshot Quality Selector ── */

    .quality-group {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .quality-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 6px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #757575;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-align: center;
    }

    .quality-btn:hover {
      border-color: #3a3a5a;
      color: #9e9e9e;
    }

    .quality-btn.active {
      border-color: #D32F2F;
      color: #ef5350;
      background: rgba(211,47,47,0.1);
    }

    .quality-hint {
      font-size: 9px;
      color: #4a4a6a;
      display: block;
      margin-top: 2px;
    }

    /* ── QR Overlay ── */

    .qr-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .qr-overlay.visible {
      display: flex;
    }

    .qr-container {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      border: 1px solid #2a2a4a;
      max-width: 340px;
    }

    .qr-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .qr-subtitle {
      font-size: 11px;
      color: #757575;
      margin-bottom: 16px;
    }

    .qr-image-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .qr-image-wrap svg {
      width: 200px;
      height: 200px;
      display: block;
    }

    .qr-close-btn {
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .qr-close-btn:hover {
      background: #3a3a5a;
    }

    .pair-btn {
      width: 100%;
      padding: 13px 20px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #42a5f5 0%, #1e88e5 100%);
      color: #fff;
      box-shadow: 0 3px 12px rgba(66,165,245,0.4);
      transition: all 0.2s ease;
    }

    .pair-btn:hover {
      box-shadow: 0 5px 20px rgba(66,165,245,0.5);
      transform: translateY(-1px);
    }

    .pair-btn:active {
      transform: translateY(0);
    }

    /* ── Footer ── */

    .footer {
      padding: 8px 20px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 9px;
      color: #4a4a6a;
      letter-spacing: 0.3px;
    }

    .footer-ver {
      font-size: 9px;
      color: #4a4a6a;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <div class="brand-name">V1-Helper</div>
        <div class="brand-sub">Booth Capture</div>
        <div class="brand-powered">Powered by Trend Micro</div>
      </div>
    </div>
    <div class="header-right">
      <div class="s3-status">
        <div class="s3-dot" id="s3PollDot"></div>
        <span class="s3-status-text" id="s3PollText">S3</span>
      </div>
      <button class="gear-btn" id="gearBtn" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
      </button>
    </div>
  </div>

  <!-- Hero: status ring with timer -->
  <div class="hero">
    <div class="status-ring" id="statusRing">
      <div class="rec-dot"></div>
      <div class="upload-spinner"></div>
      <div class="ring-icon" id="ringIcon">&#10003;</div>
      <div class="ring-timer" id="ringTimer">--:--</div>
      <div class="ring-label" id="ringLabel">IDLE</div>
    </div>
    <div class="hero-visitor" id="heroVisitor"></div>
    <div class="hero-error-msg" id="heroError"></div>
  </div>

  <!-- Stats: Clicks + Screenshots -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4l7.071 16 2.51-7.42L21 10.07 4 4zm9.172 9.172l-1.26 3.726L7.283 7.283l9.615 4.629-3.726 1.26z"/></svg>
      </div>
      <div class="stat-value" id="statClicks">0</div>
      <div class="stat-label">Clicks</div>
    </div>
    <div class="stat-box">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm8 3a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm7-2a1 1 0 110 2 1 1 0 010-2z"/></svg>
      </div>
      <div class="stat-value" id="statScreenshots">0</div>
      <div class="stat-label">Screenshots</div>
    </div>
  </div>

  <!-- Start Demo / End Demo button (hidden when S3 not configured) -->
  <div class="btn-wrap hidden" id="btnWrap">
    <button class="session-btn start" id="sessionBtn">Start Demo</button>
  </div>

  <!-- Session info -->
  <div class="session-info">
    <div class="session-info-row">
      <span>Session</span>
      <span class="session-info-val muted" id="infoSessionId">--</span>
    </div>
    <div class="session-info-row">
      <span>Visitor</span>
      <span class="session-info-val muted" id="infoVisitor">--</span>
    </div>
    <div class="session-info-row">
      <span>Started</span>
      <span class="session-info-val muted" id="infoStartTime">--</span>
    </div>
  </div>

  <!-- Pair Device QR Code -->
  <div class="btn-wrap" id="qrBtnWrap">
    <button class="pair-btn" id="pairBtn">Pair Mobile App</button>
  </div>
  <div class="qr-overlay" id="qrOverlay">
    <div class="qr-container">
      <div class="qr-title">Scan with BoothApp</div>
      <div class="qr-subtitle">Point your phone camera at this QR code</div>
      <div class="qr-image-wrap">
        <div id="qrImage" style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;"></div>
      </div>
      <div class="qr-close-btn-wrap">
        <button class="qr-close-btn" id="qrCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- S3 Config (hidden by default, toggled by gear) -->
  <div class="s3-section" id="s3Section">
    <div class="s3-section-title">S3 Configuration</div>
    <div class="s3-body">
      <div class="s3-field">
        <label class="s3-label" for="s3Bucket">S3 Bucket</label>
        <input class="s3-input" id="s3Bucket" type="text" placeholder="my-bucket-name" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="s3Region">AWS Region</label>
        <input class="s3-input" id="s3Region" type="text" placeholder="us-east-1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="presignEndpoint">Presign Endpoint URL</label>
        <input class="s3-input" id="presignEndpoint" type="url" placeholder="https://xxx.lambda-url.us-east-1.on.aws/" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsAccessKeyId">Access Key ID</label>
        <input class="s3-input" id="awsAccessKeyId" type="text" placeholder="AKIA..." />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSecretAccessKey">Secret Access Key</label>
        <input class="s3-input" id="awsSecretAccessKey" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSessionToken">Session Token <span style="color:#4a4a6a">(optional)</span></label>
        <input class="s3-input" id="awsSessionToken" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-field">
        <label class="s3-label">Screenshot Quality</label>
        <div class="quality-group" id="qualityGroup">
          <button class="quality-btn" data-quality="low">Low<span class="quality-hint">480p</span></button>
          <button class="quality-btn active" data-quality="medium">Medium<span class="quality-hint">720p</span></button>
          <button class="quality-btn" data-quality="high">High<span class="quality-hint">1080p</span></button>
        </div>
      </div>
      <div class="s3-actions">
        <button class="s3-btn s3-btn-save" id="s3SaveBtn">Save</button>
        <button class="s3-btn s3-btn-demo" id="s3DemoBtn">Pre-fill Demo</button>
      </div>
    </div>
  </div>
