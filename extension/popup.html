<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseyApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e8e8f0;
    }

    /* ── Header ── */

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #1e1028 100%);
      border-bottom: 2px solid #D12B2B;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: #D12B2B;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 10px;
      color: #D12B2B;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .settings-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      padding: 6px;
      color: #6b7280;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-btn:hover {
      color: #e8e8f0;
      border-color: #2a2a4a;
      background: rgba(255,255,255,0.05);
    }

    .settings-btn.active {
      color: #D12B2B;
      border-color: #D12B2B33;
      background: #D12B2B11;
    }

    .settings-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }

    .settings-btn.active svg {
      transform: rotate(90deg);
    }

    /* ── Session Status Bar ── */

    .session-bar {
      padding: 12px 20px;
      background: #12121c;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .session-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .session-indicator.idle {
      background: #6b7280;
    }

    .session-indicator.recording {
      background: #D12B2B;
      box-shadow: 0 0 8px #D12B2Baa;
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    .session-indicator.uploading {
      background: #3B82F6;
      box-shadow: 0 0 8px #3B82F6aa;
      animation: spin-ring 1s linear infinite;
      border: 2px solid #3B82F6;
      border-top-color: transparent;
      background: transparent;
    }

    .session-indicator.complete {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55eaa;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    @keyframes spin-ring {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .session-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .session-label {
      font-size: 12px;
      font-weight: 600;
      color: #e8e8f0;
    }

    .session-label.idle { color: #6b7280; }
    .session-label.recording { color: #D12B2B; }
    .session-label.uploading { color: #3B82F6; }
    .session-label.complete { color: #22c55e; }

    .session-id {
      font-size: 10px;
      color: #4b5563;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    /* ── Counters ── */

    .counters {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
    }

    .counter-card {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .counter-card:hover {
      border-color: #3a3a5a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .counter-value {
      font-size: 26px;
      font-weight: 700;
      color: #e8e8f0;
      line-height: 1;
    }

    .counter-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 6px;
    }

    .counter-card.clicks .counter-value { color: #D12B2B; }
    .counter-card.screenshots .counter-value { color: #a78bfa; }

    /* ── S3 Status ── */

    .s3-status-bar {
      padding: 8px 20px;
      background: #12121c;
      border-top: 1px solid #1e1e30;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .s3-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .s3-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e66;
    }

    .s3-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 6px #ef444466;
    }

    .s3-status-text {
      color: #6b7280;
      flex: 1;
    }

    .s3-status-text.connected { color: #22c55e; }
    .s3-status-text.disconnected { color: #ef4444; }

    /* ── Demo Buttons ── */

    .demo-actions {
      padding: 0 20px 16px;
      display: flex;
      gap: 8px;
    }

    .demo-actions.hidden {
      display: none;
    }

    .demo-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    .demo-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.4);
    }

    .demo-btn:active {
      transform: translateY(0);
    }

    .demo-btn-start {
      background: #D12B2B;
      color: #fff;
    }

    .demo-btn-start:hover {
      background: #b91c1c;
    }

    .demo-btn-start:disabled {
      background: #4b1a1a;
      color: #6b4a4a;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .demo-btn-end {
      background: #1a1a2e;
      border: 1px solid #D12B2B44;
      color: #D12B2B;
    }

    .demo-btn-end:hover {
      background: #D12B2B11;
      border-color: #D12B2B;
    }

    .demo-btn-end:disabled {
      border-color: #2a2a4a;
      color: #4b5563;
      background: #1a1a2e;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── S3 Config Panel ── */

    .s3-config {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 20px;
      background: #0d0d12;
      border-top: 1px solid transparent;
    }

    .s3-config.open {
      max-height: 400px;
      padding: 16px 20px;
      border-top-color: #1e1e30;
    }

    .s3-config-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .s3-fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .s3-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .s3-label {
      font-size: 11px;
      color: #6b7280;
      letter-spacing: 0.3px;
    }

    .s3-input {
      background: #12121c;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #e8e8f0;
      outline: none;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .s3-input:focus {
      border-color: #D12B2B;
      box-shadow: 0 0 0 2px #D12B2B22;
    }

    .s3-input::placeholder {
      color: #3d3d5c;
    }

    .s3-config-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .s3-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .s3-btn:hover {
      opacity: 0.85;
    }

    .s3-btn-save {
      background: #D12B2B;
      color: #fff;
    }

    .s3-btn-save.saved {
      background: #22c55e;
    }

    .s3-btn-demo {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      color: #9ca3af;
    }

    .s3-btn-demo:hover {
      border-color: #3a3a5a;
    }

    /* ── Footer ── */

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #1e1e30;
      text-align: center;
    }

    .footer-text {
      font-size: 10px;
      color: #4b5563;
      letter-spacing: 0.3px;
    }

    .footer-text span {
      color: #D12B2B;
      font-weight: 600;
    }

    /* ── Complete check icon ── */
    .check-icon {
      display: none;
      color: #22c55e;
      font-size: 10px;
      font-weight: bold;
    }

    .session-indicator.complete + .session-info .check-icon {
      display: inline;
    }

    /* ── QR Pairing Section ── */

    .qr-section {
      padding: 12px 20px;
      border-top: 1px solid #1e1e30;
      background: #12121c;
    }

    .qr-section.hidden {
      display: none;
    }

    .qr-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .qr-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7280;
    }

    .qr-status {
      font-size: 11px;
      color: #6b7280;
    }

    .qr-status.paired {
      color: #22c55e;
    }

    .qr-container {
      text-align: center;
      padding: 8px 0;
    }

    .qr-placeholder {
      font-size: 12px;
      color: #4b5563;
      padding: 20px 0;
    }

    .qr-image {
      display: none;
    }

    .qr-image img, .qr-image svg {
      max-width: 180px;
      max-height: 180px;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .qr-device-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding-top: 8px;
      border-top: 1px solid #1e1e30;
      margin-top: 8px;
    }

    .qr-device-info.hidden {
      display: none;
    }

    .qr-device-label {
      color: #6b7280;
    }

    .qr-device-name {
      color: #a78bfa;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-icon">T</div>
    <div class="brand">
      <div class="brand-name">CaseyApp</div>
      <div class="brand-sub">Trend Micro</div>
    </div>
    <button class="settings-btn" id="settingsBtn" title="S3 Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Session Status -->
  <div class="session-bar">
    <div class="session-indicator idle" id="sessionIndicator"></div>
    <div class="session-info">
      <span class="session-label idle" id="sessionLabel">Idle</span>
      <span class="session-id" id="sessionId"></span>
    </div>
  </div>

  <!-- Counters -->
  <div class="counters">
    <div class="counter-card clicks">
      <div class="counter-value" id="clickCount">0</div>
      <div class="counter-label">Clicks</div>
    </div>
    <div class="counter-card screenshots">
      <div class="counter-value" id="screenshotCount">0</div>
      <div class="counter-label">Screenshots</div>
    </div>
  </div>

  <!-- QR Pairing Section -->
  <div class="qr-section hidden" id="qrSection">
    <div class="qr-header">
      <span class="qr-title">Mobile Pairing</span>
      <span class="qr-status" id="qrPairStatus">Not paired</span>
    </div>
    <div class="qr-container" id="qrContainer">
      <div class="qr-placeholder" id="qrPlaceholder">Configure settings to enable QR pairing</div>
      <div class="qr-image" id="qrImage"></div>
    </div>
    <div class="qr-device-info hidden" id="qrDeviceInfo">
      <span class="qr-device-label">Paired device:</span>
      <span class="qr-device-name" id="qrDeviceName"></span>
    </div>
  </div>

  <!-- S3 Connection Status -->
  <div class="s3-status-bar">
    <div class="s3-dot disconnected" id="s3Dot"></div>
    <span class="s3-status-text disconnected" id="s3StatusText">S3 Not Configured</span>
  </div>

  <!-- Demo Buttons (hidden until S3 configured) -->
  <div class="demo-actions hidden" id="demoActions">
    <button class="demo-btn demo-btn-start" id="startDemoBtn">Start Demo</button>
    <button class="demo-btn demo-btn-end" id="endDemoBtn" disabled>End Demo</button>
  </div>

  <!-- S3 Config Panel (toggled by gear icon) -->
  <div class="s3-config" id="s3Config">
    <div class="s3-config-title">Connection Settings</div>
    <div class="s3-fields">
      <div class="s3-field">
        <label class="s3-label" for="managementUrl">Management Server</label>
        <input class="s3-input" id="managementUrl" type="text" placeholder="https://caseyapp.trendcyberrange.com" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="demoPcId">Demo PC ID</label>
        <input class="s3-input" id="demoPcId" type="text" placeholder="1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="eventId">Event ID</label>
        <input class="s3-input" id="eventId" type="text" placeholder="1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="s3Bucket">S3 Bucket</label>
        <input class="s3-input" id="s3Bucket" type="text" placeholder="my-bucket-name" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="s3Region">AWS Region</label>
        <input class="s3-input" id="s3Region" type="text" placeholder="us-east-1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsAccessKeyId">Access Key ID</label>
        <input class="s3-input" id="awsAccessKeyId" type="text" placeholder="AKIA..." />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSecretAccessKey">Secret Access Key</label>
        <input class="s3-input" id="awsSecretAccessKey" type="password" placeholder="••••••••" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSessionToken">Session Token <em style="font-style:normal;color:#3d3d5c">(optional)</em></label>
        <input class="s3-input" id="awsSessionToken" type="password" placeholder="••••••••" />
      </div>
      <div class="s3-config-actions">
        <button class="s3-btn s3-btn-save" id="s3SaveBtn">Save</button>
        <button class="s3-btn s3-btn-demo" id="s3DemoBtn">Pre-fill Demo</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">Powered by <span>Trend Micro</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
