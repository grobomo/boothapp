<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1-Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #212121;
    }

    /* ── Header ── */

    .header {
      background: #D32F2F;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .s3-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .s3-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .s3-dot.active {
      background: #A5D6A7;
      box-shadow: 0 0 6px rgba(165,214,167,0.6);
    }

    .s3-status-text {
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .s3-status-text.active {
      color: #fff;
    }

    /* ── Hero: Status Circle + Timer ── */

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 16px;
      background: #fff;
    }

    .status-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #EEEEEE;
      border: 4px solid #E0E0E0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .status-circle.recording {
      background: #FFEBEE;
      border-color: #D32F2F;
      box-shadow: 0 0 0 8px rgba(211,47,47,0.1), 0 0 30px rgba(211,47,47,0.15);
      animation: pulse-ring 2s ease-in-out infinite;
    }

    .status-circle.uploading {
      background: #FFF3E0;
      border-color: #F57C00;
      box-shadow: 0 0 0 8px rgba(245,124,0,0.1);
      animation: pulse-ring-orange 1.5s ease-in-out infinite;
    }

    .status-circle.error {
      background: #FFCDD2;
      border-color: #B71C1C;
      box-shadow: 0 0 0 8px rgba(183,28,28,0.15);
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 8px rgba(211,47,47,0.1), 0 0 30px rgba(211,47,47,0.15); }
      50% { box-shadow: 0 0 0 14px rgba(211,47,47,0.05), 0 0 50px rgba(211,47,47,0.2); }
    }

    @keyframes pulse-ring-orange {
      0%, 100% { box-shadow: 0 0 0 8px rgba(245,124,0,0.1); }
      50% { box-shadow: 0 0 0 14px rgba(245,124,0,0.05); }
    }

    .circle-timer {
      font-size: 32px;
      font-weight: 700;
      color: #424242;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .circle-label {
      font-size: 12px;
      font-weight: 700;
      color: #9E9E9E;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .status-circle.recording .circle-timer {
      color: #D32F2F;
    }

    .status-circle.recording .circle-label {
      color: #D32F2F;
    }

    .status-circle.uploading .circle-timer {
      color: #F57C00;
    }

    .status-circle.uploading .circle-label {
      color: #F57C00;
    }

    .status-circle.error .circle-timer {
      color: #B71C1C;
    }

    .status-circle.error .circle-label {
      color: #B71C1C;
    }

    .hero-visitor {
      font-size: 15px;
      color: #D32F2F;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }

    .hero-visitor.visible {
      display: block;
    }

    .hero-error-msg {
      font-size: 13px;
      color: #C62828;
      margin-top: 8px;
      display: none;
      text-align: center;
      max-width: 300px;
    }

    .hero-error-msg.visible {
      display: block;
    }

    /* ── Stats Row ── */

    .stats-row {
      display: flex;
      gap: 12px;
      margin: 0 20px 16px;
      padding-top: 16px;
    }

    .stat-box {
      flex: 1;
      background: #fff;
      border: 1px solid #E0E0E0;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #D32F2F;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #757575;
      margin-top: 6px;
    }

    /* ── Session Button ── */

    .btn-wrap {
      padding: 0 20px 16px;
    }

    .session-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .session-btn.start {
      background: #D32F2F;
      color: #fff;
      box-shadow: 0 2px 8px rgba(211,47,47,0.3);
    }

    .session-btn.start:hover {
      background: #C62828;
      box-shadow: 0 4px 16px rgba(211,47,47,0.4);
      transform: translateY(-1px);
    }

    .session-btn.stop {
      background: #fff;
      color: #D32F2F;
      border: 2px solid #D32F2F;
      box-shadow: 0 2px 8px rgba(211,47,47,0.15);
    }

    .session-btn.stop:hover {
      background: #FFEBEE;
      box-shadow: 0 4px 16px rgba(211,47,47,0.25);
      transform: translateY(-1px);
    }

    .session-btn:active {
      transform: translateY(0);
    }

    /* ── Session Info (compact) ── */

    .session-info {
      padding: 0 20px 12px;
    }

    .session-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      color: #757575;
    }

    .session-info-val {
      color: #616161;
      text-align: right;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-info-val.muted {
      color: #BDBDBD;
    }

    /* ── S3 Config (collapsible) ── */

    .s3-section {
      border-top: 1px solid #E0E0E0;
      padding: 0 20px;
      background: #fff;
    }

    .s3-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 10px 0;
    }

    .s3-toggle:hover .s3-toggle-label {
      color: #616161;
    }

    .s3-arrow {
      font-size: 10px;
      color: #9E9E9E;
      transition: transform 0.2s;
    }

    .s3-arrow.open {
      transform: rotate(90deg);
    }

    .s3-toggle-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9E9E9E;
    }

    .s3-configured-badge {
      font-size: 13px;
      color: #4CAF50;
      display: none;
    }

    .s3-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 14px;
    }

    .s3-body.collapsed {
      display: none;
    }

    .s3-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .s3-label {
      font-size: 11px;
      color: #757575;
      letter-spacing: 0.3px;
    }

    .s3-input {
      background: #FAFAFA;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: #212121;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    .s3-input:focus {
      border-color: #D32F2F;
      box-shadow: 0 0 0 2px rgba(211,47,47,0.1);
    }

    .s3-input::placeholder {
      color: #BDBDBD;
    }

    .s3-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .s3-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .s3-btn:hover {
      opacity: 0.85;
    }

    .s3-btn-save {
      background: #D32F2F;
      color: #fff;
    }

    .s3-btn-save.saved {
      background: #4CAF50;
    }

    .s3-btn-demo {
      background: #FAFAFA;
      border: 1px solid #E0E0E0;
      color: #757575;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="brand-name">V1-Helper</div>
      <div class="brand-sub">Booth Capture</div>
    </div>
    <div class="s3-status">
      <div class="s3-dot" id="s3PollDot"></div>
      <span class="s3-status-text" id="s3PollText">S3: --</span>
    </div>
  </div>

  <!-- Hero: status circle with timer inside -->
  <div class="hero">
    <div class="status-circle" id="statusCircle">
      <div class="circle-timer" id="circleTimer">--:--</div>
      <div class="circle-label" id="circleLabel">IDLE</div>
    </div>
    <div class="hero-visitor" id="heroVisitor"></div>
    <div class="hero-error-msg" id="heroError"></div>
  </div>

  <!-- Stats: Clicks + Screenshots (big numbers) -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-value" id="statClicks">0</div>
      <div class="stat-label">Clicks</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="statScreenshots">0</div>
      <div class="stat-label">Screenshots</div>
    </div>
  </div>

  <!-- Start / Stop button -->
  <div class="btn-wrap">
    <button class="session-btn start" id="sessionBtn">Start Session</button>
  </div>

  <!-- Compact session info -->
  <div class="session-info">
    <div class="session-info-row">
      <span>Session</span>
      <span class="session-info-val muted" id="infoSessionId">--</span>
    </div>
    <div class="session-info-row">
      <span>Visitor</span>
      <span class="session-info-val muted" id="infoVisitor">--</span>
    </div>
    <div class="session-info-row">
      <span>Started</span>
      <span class="session-info-val muted" id="infoStartTime">--</span>
    </div>
  </div>

  <!-- S3 Config (collapsible, starts collapsed) -->
  <div class="s3-section">
    <div class="s3-toggle" id="s3ConfigToggle">
      <span class="s3-arrow" id="s3Arrow">&#9654;</span>
      <span class="s3-toggle-label">S3 Configuration</span>
      <span class="s3-configured-badge" id="s3ConfiguredBadge">&#10003;</span>
    </div>

    <div class="s3-body collapsed" id="s3ConfigBody">
      <div class="s3-field">
        <label class="s3-label" for="s3Bucket">S3 Bucket</label>
        <input class="s3-input" id="s3Bucket" type="text" placeholder="my-bucket-name" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="s3Region">AWS Region</label>
        <input class="s3-input" id="s3Region" type="text" placeholder="us-east-1" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="presignEndpoint">Presign Endpoint URL</label>
        <input class="s3-input" id="presignEndpoint" type="url" placeholder="https://xxxxxxx.lambda-url.us-east-1.on.aws/" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsAccessKeyId">Access Key ID</label>
        <input class="s3-input" id="awsAccessKeyId" type="text" placeholder="AKIA..." />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSecretAccessKey">Secret Access Key</label>
        <input class="s3-input" id="awsSecretAccessKey" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-field">
        <label class="s3-label" for="awsSessionToken">Session Token <em style="font-style:normal;color:#BDBDBD">(optional)</em></label>
        <input class="s3-input" id="awsSessionToken" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
      </div>
      <div class="s3-actions">
        <button class="s3-btn s3-btn-save" id="s3SaveBtn">Save</button>
        <button class="s3-btn s3-btn-demo" id="s3DemoBtn">Pre-fill Demo</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
