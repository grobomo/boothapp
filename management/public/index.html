<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaseyApp Management</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#D71920;--red-dark:#A8131A;--red-glow:rgba(215,25,32,.35);
  --bg:#0B0E14;--surface:#141820;--surface2:#1C2028;--border:#252A34;
  --text:#F0F2F5;--text-dim:#8A92A0;--success:#2ECC71;--blue:#3498DB;--amber:#F39C12;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit;font-size:.875rem}
input,select,textarea{font-family:inherit;font-size:.875rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
th{color:var(--text-dim);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
td{font-size:.875rem}
tr:hover{background:var(--surface2)}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-brand .logo{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.sidebar-brand h1{font-size:1rem;font-weight:700;color:var(--text)}
.sidebar-brand small{display:block;font-size:.7rem;color:var(--text-dim);font-weight:400}
.sidebar-nav{flex:1;padding:12px 0}
.sidebar-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;background:none;color:var(--text-dim);font-size:.875rem;text-align:left;transition:all .15s}
.sidebar-nav button:hover{background:var(--surface2);color:var(--text)}
.sidebar-nav button.active{background:rgba(215,25,32,.1);color:var(--red);border-right:3px solid var(--red)}
.sidebar-nav button .icon{font-size:1.1rem;width:24px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-dim)}
.sidebar-footer button{background:none;color:var(--text-dim);padding:6px 0;font-size:.75rem}
.sidebar-footer button:hover{color:var(--red)}

.main{flex:1;display:flex;flex-direction:column;overflow:auto}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.topbar h2{font-size:1.1rem;font-weight:600}
.content{padding:24px;flex:1}

/* Components */
.btn{padding:8px 16px;border-radius:6px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-dark)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-danger{background:#dc3545;color:#fff}.btn-danger:hover{background:#c82333}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-active{background:rgba(46,204,113,.15);color:var(--success)}
.badge-inactive{background:rgba(138,146,160,.15);color:var(--text-dim)}
.badge-complete{background:rgba(52,152,219,.15);color:var(--blue)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h3{font-size:.95rem;margin-bottom:12px}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.75rem;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-row{display:flex;gap:12px}.form-row>*{flex:1}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-card .value{font-size:1.8rem;font-weight:700;color:var(--red)}
.stat-card .label{font-size:.75rem;color:var(--text-dim);margin-top:2px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:90%;max-width:480px}
.modal h3{margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.empty{text-align:center;padding:48px;color:var(--text-dim)}
.empty .icon{font-size:2rem;margin-bottom:8px}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:360px}
.login-box .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.login-box .logo-icon{width:40px;height:40px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff}
.login-box h2{font-size:1.2rem}
.login-box .error{background:rgba(220,53,69,.1);color:#dc3545;padding:8px 12px;border-radius:6px;font-size:.8rem;margin-bottom:12px}

.hidden{display:none!important}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:60px}.sidebar-brand h1,.sidebar-brand small,.sidebar-nav button span,.sidebar-footer span{display:none}
  .sidebar-nav button{justify-content:center;padding:12px}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="logo-row">
      <div class="logo-icon">C</div>
      <div><h2>CaseyApp</h2><small style="color:var(--text-dim);font-size:.75rem">Management Console</small></div>
    </div>
    <div id="loginError" class="error hidden"></div>
    <div id="pwChangeNotice" class="hidden" style="background:rgba(243,156,18,.1);color:var(--amber);padding:8px 12px;border-radius:6px;font-size:.8rem;margin-bottom:12px">
      You must change your password before continuing.
    </div>
    <form id="loginForm">
      <div class="form-group"><label>Username</label><input id="loginUser" type="text" required autocomplete="username"></div>
      <div class="form-group"><label>Password</label><input id="loginPass" type="password" required autocomplete="current-password"></div>
      <div id="newPwGroup" class="form-group hidden"><label>New Password</label><input id="loginNewPass" type="password" minlength="6" autocomplete="new-password"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Sign In</button>
    </form>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" class="app hidden">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">C</div>
      <div><h1>CaseyApp</h1><small>Management</small></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button data-tab="events" class="active"><span class="icon">&#9733;</span><span>Events</span></button>
      <button data-tab="sessions"><span class="icon">&#9654;</span><span>Sessions</span></button>
      <button data-tab="contacts"><span class="icon">&#9993;</span><span>Contacts</span></button>
      <button data-tab="demopcs"><span class="icon">&#9000;</span><span>Demo PCs</span></button>
      <button data-tab="users"><span class="icon">&#9881;</span><span>Users</span></button>
    </nav>
    <div class="sidebar-footer">
      <span id="currentUser"></span>
      <button id="logoutBtn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">Events</h2>
      <div id="topbarActions"></div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<script>
'use strict';

/* ====================================================================
   STATE
   ==================================================================== */
const state = {
  token: localStorage.getItem('token') || '',
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  currentTab: 'events',
  activeEventId: null,
  events: [],
  sessions: [],
  contacts: [],
  demoPcs: [],
  users: [],
};

/* ====================================================================
   API HELPERS
   ==================================================================== */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
  };
  if (state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function apiUpload(path, formData) {
  const opts = {
    method: 'POST',
    credentials: 'include',
    body: formData,
  };
  if (state.token) opts.headers = { 'Authorization': 'Bearer ' + state.token };
  const res = await fetch('/api' + path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Upload failed');
  return data;
}

/* ====================================================================
   AUTH
   ==================================================================== */
const loginPage = document.getElementById('loginPage');
const appShell = document.getElementById('appShell');
const loginForm = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const pwChangeNotice = document.getElementById('pwChangeNotice');
const newPwGroup = document.getElementById('newPwGroup');

function showLogin() {
  loginPage.classList.remove('hidden');
  appShell.classList.add('hidden');
}

function showApp() {
  loginPage.classList.add('hidden');
  appShell.classList.remove('hidden');
  document.getElementById('currentUser').textContent = state.user?.username || '';
  switchTab('events');
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.classList.add('hidden');
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;

  try {
    const data = await api('POST', '/auth/login', { username, password });
    state.token = data.token;
    state.user = data.user;

    if (data.user.force_password_change) {
      const newPass = document.getElementById('loginNewPass').value;
      if (!newPass || newPass.length < 6) {
        pwChangeNotice.classList.remove('hidden');
        newPwGroup.classList.remove('hidden');
        return;
      }
      await api('POST', '/auth/change-password', { new_password: newPass });
      state.user.force_password_change = false;
    }

    localStorage.setItem('token', state.token);
    localStorage.setItem('user', JSON.stringify(state.user));
    showApp();
  } catch (err) {
    loginError.textContent = err.message;
    loginError.classList.remove('hidden');
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try { await api('POST', '/auth/logout'); } catch (_) {}
  state.token = '';
  state.user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  showLogin();
});

/* ====================================================================
   TAB SWITCHING
   ==================================================================== */
const tabs = {
  events: { title: 'Events', load: loadEvents },
  sessions: { title: 'Sessions', load: loadSessions },
  contacts: { title: 'Contacts', load: loadContacts },
  demopcs: { title: 'Demo PCs', load: loadDemoPcs },
  users: { title: 'Users', load: loadUsers },
};

document.getElementById('sidebarNav').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  switchTab(btn.dataset.tab);
});

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('#sidebarNav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('pageTitle').textContent = tabs[tab].title;
  document.getElementById('topbarActions').innerHTML = '';
  tabs[tab].load();
}

/* ====================================================================
   EVENTS TAB
   ==================================================================== */
async function loadEvents() {
  const content = document.getElementById('pageContent');
  try {
    const data = await api('GET', '/events');
    state.events = data.events || [];
  } catch (err) {
    content.innerHTML = '<div class="empty"><div class="icon">!</div><p>' + err.message + '</p></div>';
    return;
  }

  const active = state.events.find(e => e.active);
  state.activeEventId = active ? active.id : null;

  // Stats
  let html = '<div class="stats">';
  html += '<div class="stat-card"><div class="value">' + state.events.length + '</div><div class="label">Total Events</div></div>';
  html += '<div class="stat-card"><div class="value">' + (active ? active.name : 'None') + '</div><div class="label">Active Event</div></div>';
  html += '</div>';

  // Action button
  document.getElementById('topbarActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="showEventModal()">+ New Event</button>';

  // Table
  html += '<div class="card"><table><thead><tr><th>Name</th><th>Date</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  if (state.events.length === 0) {
    html += '<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">No events yet</td></tr>';
  }
  for (const ev of state.events) {
    html += '<tr>';
    html += '<td><strong>' + esc(ev.name) + '</strong></td>';
    html += '<td>' + esc(ev.date || '-') + '</td>';
    html += '<td>' + esc(ev.location || '-') + '</td>';
    html += '<td>' + (ev.active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>') + '</td>';
    html += '<td>';
    if (!ev.active) html += '<button class="btn btn-sm btn-secondary" onclick="activateEvent(' + ev.id + ')">Activate</button> ';
    html += '<button class="btn btn-sm btn-danger" onclick="deleteEvent(' + ev.id + ')">Delete</button>';
    html += '</td></tr>';
  }
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function showEventModal(ev) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${ev ? 'Edit Event' : 'New Event'}</h3>
      <div class="form-group"><label>Name</label><input id="evName" value="${ev ? esc(ev.name) : ''}"></div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input id="evDate" type="date" value="${ev ? esc(ev.date || '') : ''}"></div>
        <div class="form-group"><label>Location</label><input id="evLocation" value="${ev ? esc(ev.location || '') : ''}"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="evSaveBtn">${ev ? 'Save' : 'Create'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('evSaveBtn').addEventListener('click', async () => {
    const name = document.getElementById('evName').value.trim();
    if (!name) return;
    const body = { name, date: document.getElementById('evDate').value || null, location: document.getElementById('evLocation').value || null };
    try {
      if (ev) await api('PUT', '/events/' + ev.id, body);
      else await api('POST', '/events', body);
      overlay.remove();
      loadEvents();
    } catch (err) { alert(err.message); }
  });
}

async function activateEvent(id) {
  try { await api('POST', '/events/' + id + '/activate'); loadEvents(); } catch (err) { alert(err.message); }
}

async function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  try { await api('DELETE', '/events/' + id); loadEvents(); } catch (err) { alert(err.message); }
}

/* ====================================================================
   SESSIONS TAB
   ==================================================================== */
async function loadSessions() {
  const content = document.getElementById('pageContent');
  const eid = state.activeEventId;

  try {
    const q = eid ? '?event_id=' + eid : '';
    const data = await api('GET', '/sessions' + q);
    state.sessions = data.sessions || [];
  } catch (err) {
    content.innerHTML = '<div class="empty"><p>' + err.message + '</p></div>';
    return;
  }

  document.getElementById('topbarActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="showCreateSessionModal()">+ New Session</button>';

  const activeSessions = state.sessions.filter(s => s.status === 'active');
  const completeSessions = state.sessions.filter(s => s.status === 'complete');

  let html = '<div class="stats">';
  html += '<div class="stat-card"><div class="value">' + state.sessions.length + '</div><div class="label">Total Sessions</div></div>';
  html += '<div class="stat-card"><div class="value">' + activeSessions.length + '</div><div class="label">Active</div></div>';
  html += '<div class="stat-card"><div class="value">' + completeSessions.length + '</div><div class="label">Complete</div></div>';
  html += '</div>';

  html += '<div class="card"><table><thead><tr><th>Visitor</th><th>Company</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
  if (state.sessions.length === 0) {
    html += '<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">No sessions</td></tr>';
  }
  for (const s of state.sessions) {
    html += '<tr>';
    html += '<td>' + esc(s.visitor_name || 'Unknown') + '</td>';
    html += '<td>' + esc(s.visitor_company || '-') + '</td>';
    html += '<td>' + (s.status === 'active' ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-complete">Complete</span>') + '</td>';
    html += '<td>' + esc(s.created_at || '') + '</td>';
    html += '<td>';
    if (s.status === 'active') {
      if (!s.audio_opted_out) html += '<button class="btn btn-sm btn-secondary" onclick="stopAudio(\'' + esc(s.id) + '\')">Mute Audio</button> ';
      html += '<button class="btn btn-sm btn-danger" onclick="endSession(\'' + esc(s.id) + '\')">End</button>';
    }
    html += '</td></tr>';
  }
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function showCreateSessionModal() {
  if (!state.activeEventId) { alert('No active event. Activate an event first.'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>New Session</h3>
      <div class="form-group"><label>Visitor Name</label><input id="sessName"></div>
      <div class="form-row">
        <div class="form-group"><label>Company</label><input id="sessCompany"></div>
        <div class="form-group"><label>Title</label><input id="sessTitle"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="sessSaveBtn">Create</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('sessSaveBtn').addEventListener('click', async () => {
    try {
      await api('POST', '/sessions/create', {
        event_id: state.activeEventId,
        visitor_name: document.getElementById('sessName').value || null,
        visitor_company: document.getElementById('sessCompany').value || null,
        visitor_title: document.getElementById('sessTitle').value || null,
      });
      overlay.remove();
      loadSessions();
    } catch (err) { alert(err.message); }
  });
}

async function stopAudio(id) {
  try { await api('POST', '/sessions/' + id + '/stop-audio'); loadSessions(); } catch (err) { alert(err.message); }
}

async function endSession(id) {
  if (!confirm('End this session?')) return;
  try { await api('POST', '/sessions/' + id + '/end'); loadSessions(); } catch (err) { alert(err.message); }
}

/* ====================================================================
   CONTACTS TAB
   ==================================================================== */
async function loadContacts() {
  const content = document.getElementById('pageContent');
  const eid = state.activeEventId;

  try {
    const q = eid ? '?event_id=' + eid : '';
    const data = await api('GET', '/contacts' + q);
    state.contacts = data.contacts || [];
  } catch (err) {
    content.innerHTML = '<div class="empty"><p>' + err.message + '</p></div>';
    return;
  }

  document.getElementById('topbarActions').innerHTML =
    '<button class="btn btn-secondary btn-sm" onclick="runContactMatch()" style="margin-right:8px">AI Match</button>' +
    '<button class="btn btn-primary btn-sm" onclick="showImportCsvModal()">Import CSV</button>';

  let html = '<div class="stats">';
  html += '<div class="stat-card"><div class="value">' + state.contacts.length + '</div><div class="label">Contacts</div></div>';
  html += '</div>';

  html += '<div class="card"><table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Title</th><th>Score</th></tr></thead><tbody>';
  if (state.contacts.length === 0) {
    html += '<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">No contacts imported</td></tr>';
  }
  for (const c of state.contacts) {
    html += '<tr>';
    html += '<td>' + esc(c.name || '-') + '</td>';
    html += '<td>' + esc(c.email || '-') + '</td>';
    html += '<td>' + esc(c.company || '-') + '</td>';
    html += '<td>' + esc(c.title || '-') + '</td>';
    html += '<td>' + esc(c.lead_score || '-') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function showImportCsvModal() {
  if (!state.activeEventId) { alert('No active event. Activate an event first.'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Import Contacts CSV</h3>
      <div class="form-group"><label>CSV File</label><input type="file" id="csvFile" accept=".csv,.tsv,.txt"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="csvImportBtn">Import</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('csvImportBtn').addEventListener('click', async () => {
    const file = document.getElementById('csvFile').files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('csv_file', file);
    fd.append('event_id', state.activeEventId);
    try {
      const data = await apiUpload('/contacts/import', fd);
      alert('Imported ' + data.imported + ' contacts');
      overlay.remove();
      loadContacts();
    } catch (err) { alert(err.message); }
  });
}

async function runContactMatch() {
  if (!state.activeEventId) { alert('No active event.'); return; }
  try {
    const data = await api('POST', '/contacts/match', { event_id: state.activeEventId });
    alert('Matched: ' + data.matches.length + ', Unmatched: ' + data.unmatched);
  } catch (err) { alert(err.message); }
}

/* ====================================================================
   DEMO PCS TAB
   ==================================================================== */
async function loadDemoPcs() {
  const content = document.getElementById('pageContent');
  const eid = state.activeEventId;

  try {
    const q = eid ? '?event_id=' + eid : '';
    const data = await api('GET', '/demo-pcs' + q);
    state.demoPcs = data.demo_pcs || [];
  } catch (err) {
    content.innerHTML = '<div class="empty"><p>' + err.message + '</p></div>';
    return;
  }

  document.getElementById('topbarActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="showDemoPcModal()">+ Add PC</button>';

  let html = '<div class="card"><table><thead><tr><th>Name</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
  if (state.demoPcs.length === 0) {
    html += '<tr><td colspan="3" style="text-align:center;color:var(--text-dim)">No demo PCs</td></tr>';
  }
  for (const pc of state.demoPcs) {
    html += '<tr>';
    html += '<td><strong>' + esc(pc.name) + '</strong></td>';
    html += '<td>' + esc(pc.created_at || '') + '</td>';
    html += '<td>';
    html += '<button class="btn btn-sm btn-secondary" onclick="showQrCode(' + pc.id + ')">QR Code</button> ';
    html += '<button class="btn btn-sm btn-danger" onclick="deleteDemoPc(' + pc.id + ')">Delete</button>';
    html += '</td></tr>';
  }
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function showDemoPcModal() {
  if (!state.activeEventId) { alert('No active event. Activate an event first.'); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Add Demo PC</h3>
      <div class="form-group"><label>PC Name</label><input id="pcName" placeholder="e.g. Demo-Laptop-1"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="pcSaveBtn">Add</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('pcSaveBtn').addEventListener('click', async () => {
    const name = document.getElementById('pcName').value.trim();
    if (!name) return;
    try {
      await api('POST', '/demo-pcs', { name, event_id: state.activeEventId });
      overlay.remove();
      loadDemoPcs();
    } catch (err) { alert(err.message); }
  });
}

async function showQrCode(pcId) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="text-align:center">
      <h3>QR Code for Device Pairing</h3>
      <div id="qrContainer" style="margin:16px auto;width:256px;height:256px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center">Loading...</div>
      <div class="modal-actions" style="justify-content:center"><button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Close</button></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  try {
    const res = await fetch('/api/demo-pcs/' + pcId + '/qr-image', { headers: state.token ? { Authorization: 'Bearer ' + state.token } : {} });
    if (!res.ok) throw new Error('Failed to load QR');
    const svg = await res.text();
    document.getElementById('qrContainer').innerHTML = svg;
  } catch (err) {
    document.getElementById('qrContainer').textContent = err.message;
  }
}

async function deleteDemoPc(id) {
  if (!confirm('Delete this demo PC?')) return;
  try { await api('DELETE', '/demo-pcs/' + id); loadDemoPcs(); } catch (err) { alert(err.message); }
}

/* ====================================================================
   USERS TAB
   ==================================================================== */
async function loadUsers() {
  const content = document.getElementById('pageContent');

  if (state.user?.role !== 'admin') {
    content.innerHTML = '<div class="empty"><div class="icon">&#128274;</div><p>Admin access required</p></div>';
    return;
  }

  try {
    const data = await api('GET', '/auth/users');
    state.users = data.users || [];
  } catch (err) {
    content.innerHTML = '<div class="empty"><p>' + err.message + '</p></div>';
    return;
  }

  document.getElementById('topbarActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="showUserModal()">+ Add User</button>';

  let html = '<div class="card"><table><thead><tr><th>Username</th><th>Role</th><th>Password Change</th><th>Created</th><th>Actions</th></tr></thead><tbody>';
  for (const u of state.users) {
    html += '<tr>';
    html += '<td><strong>' + esc(u.username) + '</strong></td>';
    html += '<td>' + esc(u.role) + '</td>';
    html += '<td>' + (u.force_password_change ? '<span class="badge badge-active">Required</span>' : '-') + '</td>';
    html += '<td>' + esc(u.created_at || '') + '</td>';
    html += '<td>';
    if (u.id !== state.user.id) {
      html += '<button class="btn btn-sm btn-secondary" onclick="resetUserPw(' + u.id + ')">Reset PW</button> ';
      html += '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + u.id + ')">Delete</button>';
    }
    html += '</td></tr>';
  }
  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function showUserModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Add User</h3>
      <div class="form-group"><label>Username</label><input id="newUsername"></div>
      <div class="form-group"><label>Password</label><input id="newUserPass" type="password"></div>
      <div class="form-group"><label>Role</label><select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="userSaveBtn">Create</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  document.getElementById('userSaveBtn').addEventListener('click', async () => {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newUserPass').value;
    const role = document.getElementById('newUserRole').value;
    if (!username || !password) return;
    try {
      await api('POST', '/auth/users', { username, password, role });
      overlay.remove();
      loadUsers();
    } catch (err) { alert(err.message); }
  });
}

async function resetUserPw(id) {
  const pw = prompt('Enter new password (min 6 chars):');
  if (!pw || pw.length < 6) return;
  try { await api('POST', '/auth/users/' + id + '/reset-password', { new_password: pw }); alert('Password reset'); } catch (err) { alert(err.message); }
}

async function deleteUser(id) {
  if (!confirm('Delete this user?')) return;
  try { await api('DELETE', '/auth/users/' + id); loadUsers(); } catch (err) { alert(err.message); }
}

/* ====================================================================
   UTILITIES
   ==================================================================== */
function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

/* ====================================================================
   INIT
   ==================================================================== */
if (state.token && state.user) {
  // Verify token is still valid
  api('GET', '/auth/me').then(() => showApp()).catch(() => { state.token = ''; state.user = null; localStorage.clear(); showLogin(); });
} else {
  showLogin();
}
</script>
</body>
</html>
