<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/error-boundary.js"></script>
<script src="components/nav.js"></script>
<title>BoothApp — Session Dashboard</title>
<link rel="stylesheet" href="styles/mobile.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2333;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-purple: #a371f7;
    --score-green: #3fb950;
    --score-yellow: #d29922;
    --score-red: #f85149;
  }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  /* -- Header -- */
  .page-header {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .page-header h1 {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent-blue);
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .refresh-badge {
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-family: monospace;
    color: var(--text-muted);
  }

  /* -- Status bar -- */
  .status-bar {
    max-width: 1200px;
    margin: 0 auto 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .status-chip {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 0.5rem 1.2rem;
    font-size: 0.9rem;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.active { background: var(--accent-red); animation: pulse 1.5s infinite; }
  .status-dot.completed { background: var(--accent-green); }
  .status-dot.total { background: var(--accent-blue); }
  .status-dot.avg { background: var(--accent-purple); }

  .status-chip .count {
    font-weight: 700;
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 1.1rem;
    color: var(--text-primary);
  }

  .status-chip .label {
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* -- Session grid -- */
  .session-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* -- Session card -- */
  .session-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .session-card:hover {
    border-color: var(--accent-blue);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(88, 166, 255, 0.1);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.75rem;
  }

  .visitor-info {
    flex: 1;
    min-width: 0;
  }

  .visitor-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .visitor-company {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* -- Score badge -- */
  .score-badge {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    font-family: "SF Mono", "Cascadia Code", monospace;
  }

  .score-badge.score-green {
    background: rgba(63, 185, 80, 0.15);
    color: var(--score-green);
    border: 1px solid rgba(63, 185, 80, 0.3);
  }

  .score-badge.score-yellow {
    background: rgba(210, 153, 34, 0.15);
    color: var(--score-yellow);
    border: 1px solid rgba(210, 153, 34, 0.3);
  }

  .score-badge.score-red {
    background: rgba(248, 81, 73, 0.15);
    color: var(--score-red);
    border: 1px solid rgba(248, 81, 73, 0.3);
  }

  .score-badge.score-none {
    background: rgba(48, 54, 61, 0.5);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }

  /* -- Card meta row -- */
  .card-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .meta-item svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    opacity: 0.7;
  }

  /* -- Card summary -- */
  .card-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* -- Card footer -- */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .session-id-tag {
    font-family: "SF Mono", "Cascadia Code", monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    background: rgba(48, 54, 61, 0.5);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
  }

  .view-link {
    font-size: 0.8rem;
    color: var(--accent-blue);
    font-weight: 500;
  }

  /* -- Loading / empty states -- */
  .loading-state {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
    padding: 6rem 2rem;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  .loading-state::after {
    content: "";
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 0.6rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
    padding: 6rem 2rem;
    color: var(--text-dim);
  }

  .empty-state h2 {
    font-size: 1.3rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .empty-state p {
    font-size: 0.95rem;
  }

  .error-banner {
    max-width: 1200px;
    margin: 0 auto 1rem;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--accent-red);
    color: var(--accent-red);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
    display: none;
  }

  /* -- Quick nav row -- */
  .quick-nav {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .quick-nav a {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    padding: 0.35rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
  }

  .quick-nav a:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
  }

  .hidden { display: none !important; }

  /* -- Responsive -- */
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .page-header h1 { font-size: 1.4rem; }
    .session-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<script src="auth.js"></script>
<script>
if (!BoothAuth.requireAwsCreds()) { window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href); }
else if (!BoothAuth.requireLogin()) { /* redirects */ }
</script>

<div class="page-header">
  <h1>Session Dashboard</h1>
  <div class="header-right">
    <span id="session-count" style="color:#8b949e;"></span>
    <span class="refresh-badge" id="refresh-badge">30s</span>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<!-- Status chips -->
<div class="status-bar" id="status-bar" role="status" aria-label="Session status summary">
  <div class="status-chip">
    <span class="status-dot active"></span>
    <span class="count" id="cnt-active">-</span>
    <span class="label">Active</span>
  </div>
  <div class="status-chip">
    <span class="status-dot completed"></span>
    <span class="count" id="cnt-completed">-</span>
    <span class="label">Completed</span>
  </div>
  <div class="status-chip">
    <span class="status-dot total"></span>
    <span class="count" id="cnt-total">-</span>
    <span class="label">Total</span>
  </div>
  <div class="status-chip">
    <span class="status-dot avg"></span>
    <span class="count" id="cnt-avg">-</span>
    <span class="label">Avg Score</span>
  </div>
</div>

<!-- Quick nav links -->
<div class="quick-nav">
  <a href="sessions.html">Table View</a>
  <a href="live-dashboard.html">Live Monitor</a>
  <a href="analytics.html">Analytics</a>
  <a href="highlights.html">Highlights</a>
  <a href="session.html">New Session</a>
  <a href="admin.html">Admin</a>
</div>

<!-- Loading state -->
<div class="loading-state" id="loading">Loading sessions</div>

<!-- Empty state -->
<div class="empty-state hidden" id="empty-state">
  <h2>No completed sessions yet</h2>
  <p>Sessions will appear here after demos are captured and analyzed.</p>
</div>

<!-- Session card grid -->
<div class="session-grid hidden" id="session-grid"></div>

<script>
(function () {
  'use strict';

  var REFRESH_MS = 30000;
  var apiUrl = (localStorage.getItem('boothapp_api_url') || '').replace(/\/+$/, '');

  var gridEl      = document.getElementById('session-grid');
  var loadingEl   = document.getElementById('loading');
  var emptyEl     = document.getElementById('empty-state');
  var errorBanner = document.getElementById('error-banner');
  var cntActive   = document.getElementById('cnt-active');
  var cntCompleted= document.getElementById('cnt-completed');
  var cntTotal    = document.getElementById('cnt-total');
  var cntAvg      = document.getElementById('cnt-avg');
  var countEl     = document.getElementById('session-count');
  var refreshBadge= document.getElementById('refresh-badge');

  var countdown = 30;
  var countdownTimer = null;

  function startCountdown() {
    countdown = Math.floor(REFRESH_MS / 1000);
    refreshBadge.textContent = countdown + 's';
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(function () {
      countdown = Math.max(0, countdown - 1);
      refreshBadge.textContent = countdown + 's';
    }, 1000);
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }

  function clearError() {
    errorBanner.style.display = 'none';
  }

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function isCompleted(status) {
    var s = (status || '').toLowerCase();
    return s === 'completed' || s === 'ended' || s === 'analyzed' || s === 'reviewed' || s === 'sent';
  }

  function isActive(status) {
    var s = (status || '').toLowerCase();
    return s === 'recording' || s === 'active' || s === 'in_progress';
  }

  // Score color: green 8-10, yellow 5-7, red 1-4
  function scoreClass(score) {
    if (score == null) return 'score-none';
    if (score >= 8) return 'score-green';
    if (score >= 5) return 'score-yellow';
    return 'score-red';
  }

  function formatDate(iso) {
    if (!iso) return '--';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '--';
    var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mon[d.getMonth()] + ' ' + d.getDate() + ', ' +
      (d.getHours() < 10 ? '0' : '') + d.getHours() + ':' +
      (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
  }

  function computeDuration(s) {
    if (!s.started_at) return '--';
    var start = new Date(s.started_at).getTime();
    var end = s.ended_at ? new Date(s.ended_at).getTime() : Date.now();
    var sec = Math.max(0, Math.floor((end - start) / 1000));
    var m = Math.floor(sec / 60);
    return m + 'min';
  }

  function loadSessions() {
    startCountdown();

    if (!apiUrl) {
      loadingEl.classList.add('hidden');
      showError('No API endpoint configured. Visit sessions.html to set it up.');
      return;
    }

    // Single request with ?include=analysis to avoid N+1 detail fetches
    fetch(apiUrl + '/sessions?include=analysis')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        clearError();
        if (!Array.isArray(data) || data.length === 0) {
          loadingEl.classList.add('hidden');
          emptyEl.classList.remove('hidden');
          gridEl.classList.add('hidden');
          updateCounts(data || []);
          return;
        }

        updateCounts(data);

        var completed = data.filter(function (s) { return isCompleted(s.status); });

        if (completed.length === 0) {
          loadingEl.classList.add('hidden');
          emptyEl.classList.remove('hidden');
          gridEl.classList.add('hidden');
          return;
        }

        var enriched = completed.map(function (s) {
          return {
            session_id: s.session_id,
            visitor_name: s.visitor_name || 'Unknown Visitor',
            visitor_company: s.visitor_company || '',
            started_at: s.started_at,
            ended_at: s.ended_at,
            status: s.status,
            se_name: s.se_name || '',
            session_score: s.session_score != null ? s.session_score : null,
            executive_summary: s.executive_summary || ''
          };
        });

        // Sort by score descending (null scores at bottom)
        enriched.sort(function (a, b) {
          var sa = a.session_score != null ? a.session_score : -1;
          var sb = b.session_score != null ? b.session_score : -1;
          return sb - sa;
        });

        renderGrid(enriched);
      })
      .catch(function (err) {
        showError('Failed to load sessions: ' + err.message);
        loadingEl.classList.add('hidden');
      });
  }

  function updateCounts(data) {
    var active = 0;
    var completed = 0;

    data.forEach(function (s) {
      if (isActive(s.status)) active++;
      if (isCompleted(s.status)) completed++;
    });

    cntActive.textContent = active;
    cntCompleted.textContent = completed;
    cntTotal.textContent = data.length;
    countEl.textContent = completed + ' completed session' + (completed !== 1 ? 's' : '');
  }

  function renderGrid(sessions) {
    loadingEl.classList.add('hidden');
    emptyEl.classList.add('hidden');
    gridEl.classList.remove('hidden');

    // Calculate average score
    var scores = sessions.filter(function (s) { return s.session_score != null; })
                         .map(function (s) { return s.session_score; });
    if (scores.length > 0) {
      var avg = scores.reduce(function (a, b) { return a + b; }, 0) / scores.length;
      cntAvg.textContent = avg.toFixed(1);
    } else {
      cntAvg.textContent = '--';
    }

    gridEl.innerHTML = '';

    sessions.forEach(function (s) {
      var scoreVal = s.session_score != null ? s.session_score : '--';
      var sClass = scoreClass(s.session_score);
      var duration = computeDuration(s);
      var dateStr = formatDate(s.started_at);

      var card = document.createElement('a');
      card.className = 'session-card';
      card.href = 'session-viewer.html?session=' + encodeURIComponent(s.session_id);

      card.innerHTML =
        '<div class="card-top">' +
          '<div class="visitor-info">' +
            '<div class="visitor-name">' + esc(s.visitor_name) + '</div>' +
            (s.visitor_company ? '<div class="visitor-company">' + esc(s.visitor_company) + '</div>' : '') +
          '</div>' +
          '<div class="score-badge ' + sClass + '">' + esc(String(scoreVal)) + '</div>' +
        '</div>' +
        (s.executive_summary ?
          '<div class="card-summary">' + esc(s.executive_summary) + '</div>' : '') +
        '<div class="card-meta">' +
          '<span class="meta-item">' +
            '<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>' +
            esc(dateStr) +
          '</span>' +
          '<span class="meta-item">' +
            '<svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A8.962 8.962 0 0012 4c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>' +
            esc(duration) +
          '</span>' +
          (s.se_name ?
            '<span class="meta-item">' +
              '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>' +
              esc(s.se_name) +
            '</span>' : '') +
        '</div>' +
        '<div class="card-footer">' +
          '<span class="session-id-tag">' + esc(s.session_id) + '</span>' +
          '<span class="view-link">View Analysis &rarr;</span>' +
        '</div>';

      gridEl.appendChild(card);
    });
  }

  // Initial load + 30s auto-refresh
  loadSessions();
  setInterval(loadSessions, REFRESH_MS);
})();
</script>
<script src="lib/shortcuts.js"></script>
</body>
</html>
