<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        /* ============================================================
           RESET & BASE (matches demo.html)
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-glow:  rgba(215, 25, 32, .35);
            --red-dark:  #A8131A;
            --red-light: #FF4D52;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --blue:      #448AFF;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           BACKGROUND
           ============================================================ */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(215,25,32,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(215,25,32,.03) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: .4;
        }
        .bg-glow {
            position: fixed; z-index: 0;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .10;
        }
        .bg-glow--1 { top: -300px; left: -200px; width: 800px; height: 800px; background: var(--red); }
        .bg-glow--2 { bottom: -300px; right: -200px; width: 700px; height: 700px; background: var(--red); }

        /* ============================================================
           LAYOUT
           ============================================================ */
        .container {
            position: relative; z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 40px 64px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--red-glow);
        }
        .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--red); }
        .header-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-right {
            display: flex; gap: 10px;
        }
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all .2s;
        }
        .back-link:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }

        /* ============================================================
           TOOLBAR
           ============================================================ */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toolbar-sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }
        .btn:hover { border-color: var(--text-dim); background: var(--surface2); }
        .btn:disabled { opacity: .35; cursor: not-allowed; }
        .btn:disabled:hover { border-color: var(--border); background: var(--surface); }
        .btn--red {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }
        .btn--red:hover { background: var(--red-dark); border-color: var(--red-dark); }
        .btn--red:disabled:hover { background: var(--red); border-color: var(--red); }
        .btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
        .select-info {
            font-size: 13px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        /* ============================================================
           PROGRESS BAR
           ============================================================ */
        .progress-wrap {
            display: none;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
        }
        .progress-wrap.active { display: block; }
        .progress-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar {
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--red-light));
            border-radius: 3px;
            width: 0%;
            transition: width .3s;
        }

        /* ============================================================
           TABLE
           ============================================================ */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: var(--surface2);
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        th:first-child, td:first-child { padding-left: 20px; }
        th:last-child, td:last-child { padding-right: 20px; }
        tbody tr {
            transition: background .15s;
        }
        tbody tr:hover { background: rgba(255,255,255,.02); }
        tbody tr:last-child td { border-bottom: none; }

        .cb-cell { width: 40px; }
        input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--red);
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge--high   { background: rgba(45,147,108,.15); color: #2D936C; }
        .badge--medium { background: rgba(233,196,106,.15); color: #E9C46A; }
        .badge--low    { background: rgba(230,57,70,.15);   color: #E63946; }

        .topics-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .topic-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(68,138,255,.1);
            color: var(--blue);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .session-id {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dim);
        }
        .visitor-name { font-weight: 600; }
        .visitor-company { font-size: 12px; color: var(--text-dim); }
        .duration { font-family: 'Consolas', monospace; font-size: 13px; }
        .actions-cell { display: flex; gap: 6px; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

        /* ============================================================
           STATS ROW
           ============================================================ */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .stat-value--red { color: var(--red); }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 22px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
            z-index: 1000;
            transform: translateY(20px);
            opacity: 0;
            transition: all .3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-icon { font-size: 18px; }

        /* ============================================================
           PRINT / PDF CSS
           ============================================================ */
        @media print {
            :root {
                --bg: #fff;
                --surface: #fff;
                --surface2: #f5f5f5;
                --border: #ddd;
                --text: #222;
                --text-dim: #666;
            }
            body { background: #fff; color: #222; }
            .bg-grid, .bg-glow, .bg-glow--1, .bg-glow--2 { display: none; }
            .toolbar, .header-right, .progress-wrap, .actions-cell, .cb-cell,
            th:first-child, td:first-child { display: none !important; }
            .container { padding: 0 16px; }
            .table-wrap { border: 1px solid #ccc; }
            th, td { border-bottom: 1px solid #ddd; color: #222; }
            th { background: #f0f0f0; color: #444; }
            .badge { border: 1px solid currentColor; }
            .topic-tag { background: #eef; color: #336; border: 1px solid #cce; }
            .stat-card { border: 1px solid #ccc; }
            .stat-value--red { color: #D71920; }
            .header { border-bottom: 2px solid #D71920; }
            .header h1 span { color: #D71920; }
            .logo-icon { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
            .print-title {
                display: block !important;
                text-align: center;
                font-size: 20px;
                font-weight: 700;
                margin: 16px 0;
                color: #222;
            }
            table { font-size: 12px; }
            .toast { display: none !important; }
        }
        .print-title { display: none; }
    </style>
</head>

                { topic: "XDR / Alert Reduction", confidence: "high", detail: "90% false positive rate currently" },
                { topic: "Managed XDR", confidence: "high", detail: "No weekend SOC staff" },
                { topic: "Email Security", confidence: "high", detail: "POS credential phishing" },
                { topic: "Cloud Workload", confidence: "medium", detail: "Migrating to AWS" }
            ],
            recommendations: [
                { action: "Schedule XDR POC with alert reduction metrics", priority: "high" },
                { action: "Send Managed XDR SLA and pricing", priority: "high" },
                { action: "POS security case study from retail vertical", priority: "high" },
                { action: "AWS migration security checklist", priority: "medium" }
            ],
            follow_up_email: "Hi David,\n\nWhat a great 42-minute deep-dive! Tackling 90% false positives and weekend coverage gaps are exactly what Vision One + Managed XDR solve.\n\nNext steps:\n- Schedule XDR POC focused on alert reduction\n- Send Managed XDR SLA and pricing\n- Share POS security case study\n- AWS migration security checklist\n\nBest,\nYour Trend Micro SE"
        }
    ];

    /* ==================================================================
       STATE
       ================================================================== */
    let selected = new Set();

    /* ==================================================================
       INIT
       ================================================================== */
    function init() {
        renderTable();
        updateStats();
    }

    function renderTable() {
        const tbody = document.getElementById('session-tbody');
        tbody.innerHTML = SESSIONS.map((s, i) => {
            const topInterest = s.interests[0] || {};
            const topics = s.products_demonstrated.map(p => p.name);
            const dur = s.visitor.visit_duration || '--';
            const engagement = getEngagement(s);
            return `
                <tr data-idx="${i}">
                    <td class="cb-cell">
                        <input type="checkbox" data-idx="${i}"
                            ${selected.has(i) ? 'checked' : ''}
                            onchange="toggleSelect(${i}, this.checked)">
                    </td>
                    <td>
                        <div class="session-id">${esc(s.session_id)}</div>
                        <div style="font-size:12px;color:var(--text-dim)">${esc(s.generated_at)}</div>
                    </td>
                    <td>
                        <div class="visitor-name">${esc(s.visitor.name)}</div>
                        <div class="visitor-company">${esc(s.visitor.title)}, ${esc(s.visitor.company)}</div>
                    </td>
                    <td><span class="duration">${esc(dur)}</span></td>
                    <td>
                        <div class="topics-cell">
                            ${topics.map(t => `<span class="topic-tag">${esc(t)}</span>`).join('')}
                        </div>
                    </td>
                    <td>
                        <span class="badge badge--${topInterest.confidence || 'low'}">
                            ${esc(topInterest.topic || '--')}
                        </span>
                    </td>
                    <td>${engagementBar(engagement)}</td>
                    <td class="actions-cell">
                        <button class="btn btn-sm" onclick="exportSessionZip(${i})" title="Download session zip">
                            <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
                            Zip
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function getEngagement(s) {
        const highCount = s.interests.filter(i => i.confidence === 'high').length;
        const medCount = s.interests.filter(i => i.confidence === 'medium').length;
        const dur = parseInt(s.visitor.visit_duration) || 0;
        return Math.min(100, (highCount * 25) + (medCount * 10) + (dur * 1.2));
    }

    function engagementBar(pct) {
        const rounded = Math.round(pct);
        const color = rounded >= 70 ? 'var(--success)' : rounded >= 40 ? 'var(--amber)' : 'var(--red-light)';
        return `
            <div style="display:flex;align-items:center;gap:8px;">
                <div style="flex:1;height:6px;background:var(--surface2);border-radius:3px;min-width:60px;">
                    <div style="width:${rounded}%;height:100%;background:${color};border-radius:3px;"></div>
                </div>
                <span style="font-size:12px;font-weight:700;color:${color};min-width:30px;">${rounded}%</span>
            </div>
        `;
    }

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    /* ==================================================================
       SELECTION
       ================================================================== */
    function toggleSelect(idx, checked) {
        if (checked) selected.add(idx); else selected.delete(idx);
        updateStats();
    }

    function toggleSelectAll() {
        const allSelected = selected.size === SESSIONS.length;
        selected.clear();
        if (!allSelected) {
            SESSIONS.forEach((_, i) => selected.add(i));
        }
        document.getElementById('cb-all').checked = !allSelected;
        renderTable();
        updateStats();
    }

    function getSelectedSessions() {
        if (selected.size === 0) return SESSIONS;
        return [...selected].sort().map(i => SESSIONS[i]);
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = SESSIONS.length;
        const durations = SESSIONS.map(s => parseInt(s.visitor.visit_duration) || 0);
        const avg = durations.length ? Math.round(durations.reduce((a,b) => a+b, 0) / durations.length) : 0;
        document.getElementById('stat-duration').textContent = avg + 'm';
        const highCount = SESSIONS.filter(s =>
            s.interests.some(i => i.confidence === 'high')
        ).length;
        document.getElementById('stat-high').textContent = highCount;
        document.getElementById('stat-selected').textContent = selected.size;
        document.getElementById('select-info').textContent =
            selected.size === 0 ? 'None selected (exports all)' : selected.size + ' selected';
    }

    /* ==================================================================
       PROGRESS INDICATOR
       ================================================================== */
    function showProgress(text, pct) {
        const wrap = document.getElementById('progress');
        wrap.classList.add('active');
        document.getElementById('progress-text').textContent = text;
        document.getElementById('progress-pct').textContent = Math.round(pct) + '%';
        document.getElementById('progress-fill').style.width = pct + '%';
    }

    function hideProgress() {
        document.getElementById('progress').classList.remove('active');
    }

    async function animateProgress(label, steps) {
        for (let i = 0; i <= steps; i++) {
            showProgress(label, (i / steps) * 100);
            await new Promise(r => setTimeout(r, 30));
        }
    }

    /* ==================================================================
       TOAST
       ================================================================== */
    function toast(text, icon) {
        const el = document.getElementById('toast');
        document.getElementById('toast-text').textContent = text;
        document.getElementById('toast-icon').textContent = icon || '[OK]';
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    /* ==================================================================
       DOWNLOAD HELPER
       ================================================================== */
    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /* ==================================================================
       EXPORT: CSV
       ================================================================== */
    async function exportCSV() {
        const sessions = getSelectedSessions();
        await animateProgress('Generating CSV...', 20);

        const headers = [
            'Session ID', 'Report ID', 'Date', 'Visitor Name', 'Title',
            'Company', 'Email', 'Industry', 'Company Size', 'Duration',
            'Products Demonstrated', 'Top Interest', 'Top Confidence',
            'Interest Count (High)', 'Interest Count (Medium)', 'Interest Count (Low)',
            'Engagement Score', 'Recommendation Count'
        ];

        const rows = sessions.map(s => {
            const highC = s.interests.filter(i => i.confidence === 'high').length;
            const medC = s.interests.filter(i => i.confidence === 'medium').length;
            const lowC = s.interests.filter(i => i.confidence === 'low').length;
            const topI = s.interests[0] || {};
            return [
                s.session_id,
                s.report_id,
                s.generated_at,
                s.visitor.name,
                s.visitor.title,
                s.visitor.company,
                s.visitor.email,
                s.visitor.industry || '',
                s.visitor.company_size || '',
                s.visitor.visit_duration || '',
                s.products_demonstrated.map(p => p.name).join('; '),
                topI.topic || '',
                topI.confidence || '',
                highC,
                medC,
                lowC,
                Math.round(getEngagement(s)),
                s.recommendations.length
            ];
        });

        const csvContent = [headers, ...rows]
            .map(row => row.map(cell => {
                const str = String(cell);
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            }).join(','))
            .join('\n');

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        downloadBlob(blob, 'boothapp-sessions-export.csv');

        hideProgress();
        toast('CSV downloaded (' + sessions.length + ' sessions)', '[CSV]');
    }

    /* ==================================================================
       EXPORT: JSON
       ================================================================== */
    async function exportJSON() {
        const sessions = getSelectedSessions();
        await animateProgress('Generating JSON...', 15);

        const exportData = {
            exported_at: new Date().toISOString(),
            session_count: sessions.length,
            sessions: sessions
        };

        const blob = new Blob(
            [JSON.stringify(exportData, null, 2)],
            { type: 'application/json;charset=utf-8;' }
        );
        downloadBlob(blob, 'boothapp-sessions-export.json');

        hideProgress();
        toast('JSON downloaded (' + sessions.length + ' sessions)', '{ }');
    }

    /* ==================================================================
       EXPORT: PDF (via browser print)
       ================================================================== */
    async function exportPDF() {
        await animateProgress('Preparing print view...', 10);
        hideProgress();
        toast('Opening print dialog -- use "Save as PDF"', '[PDF]');
        setTimeout(() => window.print(), 300);
    }

    /* ==================================================================
       EXPORT: BULK EMAILS
       ================================================================== */
    async function exportEmails() {
        const sessions = getSelectedSessions();
        await animateProgress('Compiling follow-up emails...', 20);

        const divider = '='.repeat(72);
        const emailText = sessions.map((s, i) => {
            const header = [
                `TO: ${s.visitor.email}`,
                `SUBJECT: Follow-up: Trend Micro Vision One Demo - ${s.visitor.company}`,
                `DATE: ${s.generated_at}`,
                `SESSION: ${s.session_id}`,
            ].join('\n');

            return [
                divider,
                `  EMAIL ${i + 1} of ${sessions.length}`,
                divider,
                '',
                header,
                '',
                '-'.repeat(40),
                '',
                s.follow_up_email || '(No follow-up email generated for this session)',
                '',
            ].join('\n');
        }).join('\n');

        const header = [
            'BOOTHAPP -- BULK FOLLOW-UP EMAIL EXPORT',
            `Generated: ${new Date().toISOString()}`,
            `Sessions: ${sessions.length}`,
            '',
            '',
        ].join('\n');

        const blob = new Blob(
            [header + emailText],
            { type: 'text/plain;charset=utf-8;' }
        );
        downloadBlob(blob, 'boothapp-followup-emails.txt');

        hideProgress();
        toast('Email drafts downloaded (' + sessions.length + ' emails)', '[@]');
    }

    /* ==================================================================
       EXPORT: SESSION ZIP
       Uses JSZip (loaded dynamically) to package all session data.
       ================================================================== */
    async function exportSessionZip(idx) {
        const s = SESSIONS[idx];
        showProgress('Packaging session ' + s.session_id + '...', 10);

        if (typeof JSZip === 'undefined') {
            showProgress('Loading zip library...', 5);
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        }

        showProgress('Building zip archive...', 30);

        const zip = new JSZip();
        const folder = zip.folder(s.session_id);

        folder.file('badge.json', JSON.stringify(s.visitor, null, 2));

        showProgress('Adding analysis data...', 50);

        const result = {
            report_id: s.report_id,
            generated_at: s.generated_at,
            visitor: s.visitor,
            products_demonstrated: s.products_demonstrated,
            interests: s.interests,
            recommendations: s.recommendations
        };
        const outputFolder = folder.folder('output');
        outputFolder.file('result.json', JSON.stringify(result, null, 2));

        showProgress('Adding email draft...', 70);

        if (s.follow_up_email) {
            outputFolder.file('follow-up-email.txt', s.follow_up_email);
        }

        const csvLine = [
            s.session_id, s.visitor.name, s.visitor.company,
            s.visitor.visit_duration,
            s.products_demonstrated.map(p => p.name).join('; '),
            Math.round(getEngagement(s)) + '%'
        ].join(',');
        folder.file('summary.csv', 'Session ID,Visitor,Company,Duration,Products,Engagement\n' + csvLine);

        showProgress('Compressing...', 90);

        const blob = await zip.generateAsync({ type: 'blob' });

        showProgress('Done!', 100);
        downloadBlob(blob, s.session_id + '.zip');

        setTimeout(hideProgress, 500);
        toast('Session zip downloaded: ' + s.session_id, '[ZIP]');
    }

    /* ==================================================================
       EXPORT: ALL FORMATS
       ================================================================== */
    async function exportAllFormats() {
        await exportCSV();
        await new Promise(r => setTimeout(r, 300));
        await exportJSON();
        await new Promise(r => setTimeout(r, 300));
        await exportEmails();
        await new Promise(r => setTimeout(r, 300));
        toast('All exports complete!', '[OK]');
    }

    /* ==================================================================
       DYNAMIC SCRIPT LOADER
       ================================================================== */
    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    /* ==================================================================
       BOOT
       ================================================================== */
    init();
    </script>
</body>
</html>
