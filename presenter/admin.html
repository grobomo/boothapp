<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp Admin</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }
        .admin-header {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 2rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .admin-header h1 { font-size: 1.5rem; font-weight: 600; }
        .admin-header a {
            color: var(--text-dim); text-decoration: none; font-size: .85rem;
        }
        .admin-header a:hover { color: var(--text); }

        /* ---- Feature Flags Section ---- */
        .section { margin-bottom: 2rem; }
        .section h2 {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;
            color: var(--red); text-transform: uppercase; letter-spacing: .05em;
        }
        .flag-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .flag-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.25rem;
            display: flex; align-items: center; justify-content: space-between;
            transition: border-color .2s;
        }
        .flag-card:hover { border-color: rgba(215,25,32,.3); }
        .flag-card.disabled { opacity: .5; }
        .flag-info h3 { font-size: .95rem; font-weight: 500; margin-bottom: .25rem; }
        .flag-info p { font-size: .8rem; color: var(--text-dim); }

        /* Toggle switch */
        .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider {
            position: absolute; inset: 0; cursor: pointer;
            background: #333; border-radius: 26px; transition: .3s;
        }
        .toggle .slider::before {
            content: ''; position: absolute; width: 20px; height: 20px;
            left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
            transition: .3s;
        }
        .toggle input:checked + .slider { background: var(--success); }
        .toggle input:checked + .slider::before { transform: translateX(22px); }

        /* Action bar */
        .action-bar {
            display: flex; gap: .75rem; margin-top: 1.5rem; flex-wrap: wrap;
        }
        .btn {
            padding: .5rem 1.25rem; border: 1px solid var(--border);
            border-radius: 8px; background: var(--surface2); color: var(--text);
            font-size: .85rem; cursor: pointer; transition: .2s;
        }
        .btn:hover { border-color: var(--red); color: var(--red); }
        .btn--danger { border-color: #c0392b; color: #e74c3c; }
        .btn--danger:hover { background: #c0392b; color: #fff; }

        /* Status toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--surface); border: 1px solid var(--success);
            color: var(--success); padding: .75rem 1.25rem; border-radius: 8px;
            font-size: .85rem; opacity: 0; transform: translateY(10px);
            transition: .3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        /* S3 sync config */
        .sync-config {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.25rem; margin-top: 1rem;
        }
        .sync-config label { font-size: .85rem; color: var(--text-dim); display: block; margin-bottom: .5rem; }
        .sync-config input[type="text"] {
            width: 100%; padding: .5rem .75rem; background: var(--bg);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text);
            font-size: .85rem; font-family: monospace;
        }
        .sync-config input[type="text"]:focus { outline: none; border-color: var(--red); }
        .sync-actions { display: flex; gap: .5rem; margin-top: .75rem; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>BoothApp Admin</h1>
        <a href="demo.html">&larr; Back to Demo</a>
    </div>

    <div class="section">
        <h2>Feature Flags</h2>
        <div class="flag-grid" id="flagGrid"></div>
        <div class="action-bar">
            <button class="btn" id="btnResetFlags">Reset to Defaults</button>
            <button class="btn btn--danger" id="btnDisableAll">Disable All</button>
            <button class="btn" id="btnEnableAll">Enable All</button>
        </div>
    </div>

    <div class="section">
        <h2>S3 Sync</h2>
        <div class="sync-config">
            <label for="s3Endpoint">S3/API Gateway endpoint for flags JSON:</label>
            <input type="text" id="s3Endpoint" placeholder="https://your-api.execute-api.region.amazonaws.com/flags">
            <div class="sync-actions">
                <button class="btn" id="btnS3Push">Push to S3</button>
                <button class="btn" id="btnS3Pull">Pull from S3</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../infra/feature-flags.js"></script>
    <script>
    (function () {
        'use strict';

        var FLAG_META = {
            audio_recording:     { label: 'Audio Recording',     desc: 'Record and transcribe booth conversations' },
            badge_ocr:           { label: 'Badge OCR',           desc: 'Scan attendee badges via camera' },
            competitive_analysis:{ label: 'Competitive Analysis', desc: 'AI-generated competitor comparisons' },
            email_drafts:        { label: 'Email Drafts',        desc: 'Auto-generate follow-up emails' },
            cost_estimation:     { label: 'Cost Estimation',     desc: 'Real-time TCO/ROI calculations' }
        };

        var S3_ENDPOINT_KEY = 'boothapp_s3_endpoint';

        // ---- Render flags ----
        function renderFlags() {
            var grid = document.getElementById('flagGrid');
            grid.innerHTML = '';
            var flags = FeatureFlags.getAllFlags();

            Object.keys(FLAG_META).forEach(function (key) {
                var meta = FLAG_META[key];
                var enabled = flags[key] === true;

                var card = document.createElement('div');
                card.className = 'flag-card' + (enabled ? '' : ' disabled');
                card.innerHTML =
                    '<div class="flag-info">' +
                        '<h3>' + meta.label + '</h3>' +
                        '<p>' + meta.desc + '</p>' +
                    '</div>' +
                    '<label class="toggle">' +
                        '<input type="checkbox" data-flag="' + key + '"' + (enabled ? ' checked' : '') + '>' +
                        '<span class="slider"></span>' +
                    '</label>';
                grid.appendChild(card);
            });

            // Bind change events
            grid.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
                cb.addEventListener('change', function () {
                    var flag = this.getAttribute('data-flag');
                    FeatureFlags.setFlag(flag, this.checked);
                    this.closest('.flag-card').classList.toggle('disabled', !this.checked);
                    showToast(FLAG_META[flag].label + ': ' + (this.checked ? 'ON' : 'OFF'));
                });
            });
        }

        // ---- Toast ----
        var toastTimer;
        function showToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2000);
        }

        // ---- Buttons ----
        document.getElementById('btnResetFlags').addEventListener('click', function () {
            FeatureFlags.resetFlags();
            renderFlags();
            showToast('Flags reset to defaults');
        });

        document.getElementById('btnDisableAll').addEventListener('click', function () {
            var flags = FeatureFlags.getAllFlags();
            Object.keys(flags).forEach(function (k) { FeatureFlags.setFlag(k, false); });
            renderFlags();
            showToast('All features disabled');
        });

        document.getElementById('btnEnableAll').addEventListener('click', function () {
            var flags = FeatureFlags.getAllFlags();
            Object.keys(flags).forEach(function (k) { FeatureFlags.setFlag(k, true); });
            renderFlags();
            showToast('All features enabled');
        });

        // ---- S3 Sync ----
        var endpointInput = document.getElementById('s3Endpoint');
        try { endpointInput.value = localStorage.getItem(S3_ENDPOINT_KEY) || ''; } catch (e) {}

        endpointInput.addEventListener('input', function () {
            try { localStorage.setItem(S3_ENDPOINT_KEY, this.value); } catch (e) {}
        });

        document.getElementById('btnS3Push').addEventListener('click', function () {
            var url = endpointInput.value.trim();
            if (!url) { showToast('Enter an S3 endpoint first'); return; }
            FeatureFlags.syncS3(url, 'push')
                .then(function () { showToast('Flags pushed to S3'); })
                .catch(function (e) { showToast('Push failed: ' + e.message); });
        });

        document.getElementById('btnS3Pull').addEventListener('click', function () {
            var url = endpointInput.value.trim();
            if (!url) { showToast('Enter an S3 endpoint first'); return; }
            FeatureFlags.syncS3(url, 'pull')
                .then(function () { renderFlags(); showToast('Flags pulled from S3'); })
                .catch(function (e) { showToast('Pull failed: ' + e.message); });
        });

        // ---- Listen for external flag changes ----
        window.addEventListener('boothapp:flagchange', function () { renderFlags(); });

        // ---- Boot ----
        renderFlags();
    })();
    </script>
</body>
</html>
