<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/nav.js"></script>
<title>BoothApp — Admin Console</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 1.5rem 2rem;
  }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  header {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.85rem;
  }
  .header-right a {
    color: #8b949e;
    text-decoration: none;
  }
  .header-right a:hover { color: #e6edf3; }

  .user-badge {
    color: #8b949e;
    font-family: monospace;
    font-size: 0.85rem;
  }

  /* ── Messages ────────────────────────────────────────────────────────────── */
  .msg {
    max-width: 1200px;
    margin: 0 auto 1rem;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }
  .msg-error { background: #f8514922; border: 1px solid #f85149; color: #f85149; }
  .msg-success { background: #23863622; border: 1px solid #238636; color: #3fb950; }

  /* ── Panels / Sections ───────────────────────────────────────────────────── */
  .panel {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-header {
    padding: 0.9rem 1.2rem;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h2 {
    font-size: 1rem;
    font-weight: 600;
    color: #e6edf3;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .panel-body {
    padding: 0;
  }

  /* ── Status grid ─────────────────────────────────────────────────────────── */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }

  .status-cell {
    padding: 1rem 1.2rem;
    border-right: 1px solid #21262d;
    text-align: center;
  }
  .status-cell:last-child { border-right: none; }

  .status-cell .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    margin-bottom: 0.3rem;
  }

  .status-cell .value {
    font-size: 1.6rem;
    font-weight: 700;
    font-family: monospace;
    color: #e6edf3;
  }

  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 0.4rem;
    vertical-align: middle;
  }
  .status-dot.active  { background: #3fb950; }
  .status-dot.stale   { background: #d29922; }
  .status-dot.unknown { background: #484f58; }
  .status-dot.error   { background: #f85149; }

  .dim { color: #8b949e; font-size: 0.8rem; }

  /* ── Tables ──────────────────────────────────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    padding: 0.6rem 1rem;
    font-size: 0.73rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: #e6edf3; }
  thead th .sort-arrow { margin-left: 0.2rem; font-size: 0.65rem; }

  tbody tr {
    border-bottom: 1px solid #21262d;
  }
  tbody tr:hover { background: #1c2128; }

  td {
    padding: 0.55rem 1rem;
    font-size: 0.88rem;
    vertical-align: middle;
  }

  .mono { font-family: monospace; }
  .accent { color: #58a6ff; font-weight: 600; }

  /* ── Badges ──────────────────────────────────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-recording  { background: #f8514933; color: #f85149; }
  .badge-completed  { background: #23863633; color: #3fb950; }
  .badge-ended      { background: #23863633; color: #3fb950; }
  .badge-waiting    { background: #d2992233; color: #d29922; }
  .badge-analyzing  { background: #58a6ff33; color: #58a6ff; }
  .badge-unknown    { background: #30363d;   color: #8b949e; }

  /* ── Score bar ───────────────────────────────────────────────────────────── */
  .score-bar {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .score-track {
    width: 50px;
    height: 5px;
    background: #30363d;
    border-radius: 3px;
    overflow: hidden;
  }
  .score-fill { height: 100%; border-radius: 3px; }
  .score-fill.low  { background: #f85149; }
  .score-fill.mid  { background: #d29922; }
  .score-fill.high { background: #3fb950; }
  .score-label { font-size: 0.8rem; font-family: monospace; min-width: 2em; text-align: right; }

  /* ── Buttons ─────────────────────────────────────────────────────────────── */
  .btn {
    font-size: 0.8rem;
    padding: 0.35rem 0.8rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { font-size: 0.75rem; padding: 0.25rem 0.6rem; }

  .btn-accent  { background: #1f6feb; color: #fff; }
  .btn-accent:hover { background: #388bfd; }

  .btn-danger  { background: #da3633; color: #fff; }
  .btn-danger:hover { background: #f85149; }

  .btn-refresh { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .btn-refresh:hover { color: #e6edf3; border-color: #484f58; }

  .action-cell {
    display: flex;
    gap: 0.4rem;
  }

  /* ── Activity log ────────────────────────────────────────────────────────── */
  .log-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .log-info    { background: #1f6feb33; color: #58a6ff; }
  .log-success { background: #23863633; color: #3fb950; }
  .log-error   { background: #f8514933; color: #f85149; }
  .log-warning { background: #d2992233; color: #d29922; }

  .log-table td {
    padding: 0.4rem 0.8rem;
    font-size: 0.82rem;
    vertical-align: top;
  }

  /* ── Responsive ──────────────────────────────────────────────────────────── */
  .hidden { display: none !important; }

  @media (max-width: 900px) {
    body { padding: 1rem; }
    .status-grid { grid-template-columns: repeat(2, 1fr); }
    .status-cell { border-bottom: 1px solid #21262d; }
  }

  @media (max-width: 600px) {
    .status-grid { grid-template-columns: 1fr; }
    .action-cell { flex-direction: column; }
    td, th { padding: 0.4rem 0.6rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Admin Console</h1>
  <div class="header-right">
    <span class="user-badge" id="current-user"></span>
    <button class="btn btn-refresh" id="refresh-btn">Refresh</button>
    <a href="sessions.html">Sessions</a>
    <a href="workers.html">Workers</a>
    <a href="#" id="logout-link">Logout</a>
  </div>
</header>

<div class="msg msg-error" id="error-msg"></div>
<div class="msg msg-success" id="success-msg"></div>

<!-- ── System Status ─────────────────────────────────────────────────────── -->
<div class="panel">
  <div class="panel-header">
    <h2>System Status</h2>
  </div>
  <div class="panel-body">
    <div class="status-grid">
      <div class="status-cell">
        <div class="label">Watcher</div>
        <div class="value" id="watcher-status" style="font-size:1rem;">
          <span class="status-dot unknown"></span> Checking...
        </div>
      </div>
      <div class="status-cell">
        <div class="label">S3 Objects</div>
        <div class="value" id="s3-objects">--</div>
      </div>
      <div class="status-cell">
        <div class="label">S3 Size</div>
        <div class="value" id="s3-size">--</div>
      </div>
      <div class="status-cell">
        <div class="label">Lambda (24h)</div>
        <div class="value" id="lambda-invocations">--</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Session Management ────────────────────────────────────────────────── -->
<div class="panel">
  <div class="panel-header">
    <h2>Session Management</h2>
    <span class="dim" id="session-count"></span>
  </div>
  <div class="panel-body" style="overflow-x:auto;">
    <table id="session-table">
      <thead>
        <tr>
          <th data-col="id">Session ID <span class="sort-arrow"></span></th>
          <th data-col="name">Visitor <span class="sort-arrow"></span></th>
          <th data-col="date">Date <span class="sort-arrow"></span></th>
          <th data-col="status">Status <span class="sort-arrow"></span></th>
          <th data-col="score">Engagement <span class="sort-arrow"></span></th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="session-body">
        <tr><td colspan="6" style="text-align:center;padding:2rem;color:#484f58;">Loading sessions...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Activity Log ──────────────────────────────────────────────────────── -->
<div class="panel">
  <div class="panel-header">
    <h2>Activity Log</h2>
    <span class="dim">Last 50 events</span>
  </div>
  <div class="panel-body" style="overflow-x:auto;max-height:400px;overflow-y:auto;">
    <table class="log-table">
      <thead>
        <tr>
          <th style="width:140px;cursor:default;">Time</th>
          <th style="width:80px;cursor:default;">Type</th>
          <th style="cursor:default;">Event</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr><td colspan="3" style="text-align:center;padding:1.5rem;color:#484f58;">Loading events...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="auth.js"></script>
<script src="admin.js"></script>
<script>
(function () {
  // ── Auth gate ─────────────────────────────────────────────────────────────
  if (!BoothAuth.requireAwsCreds()) {
    window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
    return;
  }
  if (!BoothAuth.requireLogin()) return;
  if (!BoothAuth.isAdmin()) {
    document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#f85149;font-size:1.2rem;">Access denied. Admin role required.</div>';
    return;
  }

  document.getElementById("current-user").textContent = BoothAuth.currentUser();
  document.getElementById("logout-link").addEventListener("click", function (e) {
    e.preventDefault();
    BoothAuth.logout();
  });

  // ── Init console ──────────────────────────────────────────────────────────
  var ready = AdminConsole.init({
    errorMsg:          document.getElementById("error-msg"),
    successMsg:        document.getElementById("success-msg"),
    watcherStatus:     document.getElementById("watcher-status"),
    s3Objects:         document.getElementById("s3-objects"),
    s3Size:            document.getElementById("s3-size"),
    lambdaInvocations: document.getElementById("lambda-invocations"),
    sessionTable:      document.getElementById("session-table"),
    sessionBody:       document.getElementById("session-body"),
    sessionCount:      document.getElementById("session-count"),
    logBody:           document.getElementById("log-body")
  });

  if (!ready) {
    window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
    return;
  }

  AdminConsole.start();

  // ── Sort headers ──────────────────────────────────────────────────────────
  document.querySelectorAll("#session-table thead th[data-col]").forEach(function (th) {
    th.addEventListener("click", function () {
      AdminConsole.setSort(th.getAttribute("data-col"));
    });
  });

  // ── Refresh button ────────────────────────────────────────────────────────
  document.getElementById("refresh-btn").addEventListener("click", function () {
    AdminConsole.loadAll();
  });
})();
</script>
<script src="lib/shortcuts.js"></script>
</body>
</html>
