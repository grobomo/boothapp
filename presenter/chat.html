<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/error-boundary.js"></script>
<script src="components/nav.js"></script>
<title>BoothApp — Chat</title>
<link rel="stylesheet" href="styles/mobile.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .chat-container {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: 0;
  }

  .chat-header {
    text-align: center;
    padding: 1.5rem 0 1rem;
  }

  .chat-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .chat-header p {
    color: var(--text2);
    font-size: 0.875rem;
  }

  /* -- Messages area -- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-height: 300px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 0.75rem;
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message.system {
    align-self: flex-start;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .message.user .msg-avatar {
    background: var(--accent-dim);
    color: #fff;
  }

  .message.system .msg-avatar {
    background: var(--surface2);
    color: var(--purple);
    border: 1px solid var(--border);
  }

  .msg-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    line-height: 1.6;
    word-break: break-word;
  }

  .message.user .msg-body {
    background: var(--accent-dim);
    border-color: transparent;
    color: #fff;
  }

  .msg-body strong { color: var(--accent); font-weight: 600; }
  .message.user .msg-body strong { color: #fff; }

  .msg-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.5rem 0;
    font-size: 0.8rem;
  }

  .msg-body th, .msg-body td {
    text-align: left;
    padding: 0.3rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .msg-body th {
    color: var(--text2);
    font-weight: 500;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .msg-time {
    font-size: 0.7rem;
    color: var(--text3);
    margin-top: 0.25rem;
    text-align: right;
  }

  .message.system .msg-time { text-align: left; }

  /* -- Typing indicator -- */
  .typing {
    display: none;
    align-self: flex-start;
    gap: 0.75rem;
    max-width: 85%;
  }

  .typing.active { display: flex; }

  .typing-dots {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    background: var(--text3);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .typing-dots span:nth-child(1) { animation-delay: 0s; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* -- Quick actions -- */
  .quick-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0.5rem 0;
  }

  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .quick-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  /* -- Input area -- */
  .input-area {
    display: flex;
    gap: 0.5rem;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    align-items: flex-end;
  }

  .input-area textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-area textarea:focus {
    border-color: var(--accent);
  }

  .input-area textarea::placeholder {
    color: var(--text3);
  }

  .send-btn {
    background: var(--accent-dim);
    border: none;
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* -- Session cards in responses -- */
  .session-card {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    margin: 0.15rem 0;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .session-card:hover {
    border-color: var(--accent);
  }

  /* -- Scrollbar -- */
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* -- Active session banner -- */
  .active-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(31, 111, 235, 0.12);
    border: 1px solid rgba(88, 166, 255, 0.3);
    border-radius: var(--radius);
    padding: 0.6rem 1rem;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
  }

  .active-banner.visible { display: flex; }

  .active-banner .banner-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .active-banner .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(63, 185, 80, 0); }
  }

  .active-banner .banner-id { color: var(--accent); font-weight: 600; }
  .active-banner .banner-name { color: var(--text2); }
  .active-banner .banner-timer { color: var(--text2); font-family: monospace; font-size: 0.8rem; }

  .active-banner .end-btn {
    background: rgba(248, 81, 73, 0.15);
    border: 1px solid rgba(248, 81, 73, 0.3);
    color: var(--red);
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .active-banner .end-btn:hover {
    background: rgba(248, 81, 73, 0.25);
  }

  /* -- Quick action groups -- */
  .quick-group-label {
    font-size: 0.7rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 0.25rem;
  }

  .quick-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 0.25rem;
  }

  /* -- Empty state -- */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text3);
  }

  .empty-state h2 {
    color: var(--text2);
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }

  .empty-state p {
    font-size: 0.85rem;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* -- Mutation badge -- */
  .msg-body .mutation-badge {
    display: inline-block;
    background: var(--green);
    color: #000;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-right: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* -- Confirm bar -- */
  .confirm-bar {
    display: none;
    background: var(--surface);
    border: 1px solid var(--yellow);
    border-radius: var(--radius);
    padding: 0.6rem 1rem;
    margin: 0.5rem 0;
    font-size: 0.85rem;
    color: var(--yellow);
    align-items: center;
    gap: 0.75rem;
  }

  .confirm-bar.active { display: flex; }
  .confirm-bar .confirm-text { flex: 1; }

  .confirm-bar button {
    border: none;
    padding: 0.3rem 0.8rem;
    border-radius: 5px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }

  .confirm-yes { background: var(--yellow); color: #000; font-weight: 600; }
  .confirm-no { background: var(--surface2); color: var(--text2); }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>BoothApp Chat</h1>
    <p>Start sessions, tag leads, add notes -- all from one place</p>
  </div>

  <div class="active-banner" id="activeBanner">
    <div class="banner-left">
      <div class="pulse"></div>
      <span class="banner-id" id="bannerId">--</span>
      <span class="banner-name" id="bannerName">--</span>
      <span class="banner-timer" id="bannerTimer">00:00</span>
    </div>
    <button class="end-btn" id="bannerEndBtn">End Session</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <h2>Ready for visitors</h2>
      <p>Say "start session for [name]" to begin a demo, or "help" for all commands.</p>
    </div>
  </div>

  <div class="quick-actions" id="quickActions">
    <span class="quick-group-label">Session</span>
    <button class="quick-btn" data-msg="show sessions">List</button>
    <button class="quick-btn" data-msg="last 5">Recent</button>
    <button class="quick-btn" data-msg="active">Active</button>
    <div class="quick-divider"></div>
    <span class="quick-group-label">Tag</span>
    <button class="quick-btn" data-msg="hot lead">Hot Lead</button>
    <button class="quick-btn" data-msg="follow up">Follow Up</button>
    <div class="quick-divider"></div>
    <span class="quick-group-label">Batch</span>
    <button class="quick-btn" data-msg="mark all pending as completed">Close Pending</button>
    <div class="quick-divider"></div>
    <button class="quick-btn" data-msg="stats">Stats</button>
    <button class="quick-btn" data-msg="help">Help</button>
  </div>

  <div class="confirm-bar" id="confirmBar">
    <span class="confirm-text" id="confirmText"></span>
    <button class="confirm-yes" id="confirmYes">Confirm</button>
    <button class="confirm-no" id="confirmNo">Cancel</button>
  </div>

  <div class="typing" id="typing">
    <div class="msg-avatar" style="background:var(--surface2);color:var(--purple);border:1px solid var(--border);">BA</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <textarea id="chatInput" rows="1" placeholder="Ask about sessions, visitors, stats..." autofocus></textarea>
    <button class="send-btn" id="sendBtn" title="Send (Enter)">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var typingEl = document.getElementById('typing');
  var emptyState = document.getElementById('emptyState');
  var quickActions = document.getElementById('quickActions');
  var activeBanner = document.getElementById('activeBanner');
  var bannerId = document.getElementById('bannerId');
  var bannerName = document.getElementById('bannerName');
  var bannerTimer = document.getElementById('bannerTimer');
  var bannerEndBtn = document.getElementById('bannerEndBtn');
  var confirmBar = document.getElementById('confirmBar');
  var confirmText = document.getElementById('confirmText');
  var confirmYes = document.getElementById('confirmYes');
  var confirmNo = document.getElementById('confirmNo');
  var sending = false;
  var activeSession = null;
  var sessionStartTime = null;
  var timerInterval = null;

  // Command history
  var cmdHistory = [];
  var historyIdx = -1;
  var MAX_CMD_HISTORY = 50;
  var pendingConfirm = null;

  // --- Markdown-lite renderer ---
  function renderMarkdown(text) {
    // Tables
    text = text.replace(/\n\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g, function(match, header, rows) {
      var ths = header.split('|').map(function(h) { return '<th>' + h.trim() + '</th>'; }).join('');
      var trs = rows.trim().split('\n').map(function(row) {
        var tds = row.replace(/^\||\|$/g, '').split('|').map(function(d) { return '<td>' + d.trim() + '</td>'; }).join('');
        return '<tr>' + tds + '</tr>';
      }).join('');
      return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table>';
    });

    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Line breaks
    text = text.replace(/\n/g, '<br>');

    return text;
  }

  // --- Add message to UI ---
  function addMessage(type, text, meta) {
    if (emptyState) {
      emptyState.remove();
      emptyState = null;
    }

    var msg = document.createElement('div');
    msg.className = 'message ' + type;

    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = type === 'user' ? 'SE' : 'BA';

    var body = document.createElement('div');
    body.className = 'msg-body';
    var html = type === 'user' ? escapeHtml(text) : renderMarkdown(text);
    if (meta && meta.mutation) {
      html = '<span class="mutation-badge">Changed</span>' + html;
    }
    body.innerHTML = html;

    var time = document.createElement('div');
    time.className = 'msg-time';
    var now = new Date();
    time.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (meta && meta.duration_ms) {
      time.textContent += ' (' + meta.duration_ms + 'ms)';
    }

    msg.appendChild(avatar);
    var content = document.createElement('div');
    content.appendChild(body);
    content.appendChild(time);
    msg.appendChild(content);

    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function showTyping() { typingEl.classList.add('active'); scrollToBottom(); }
  function hideTyping() { typingEl.classList.remove('active'); }

  // --- Active session banner ---
  function updateBanner(sessionId, visitorName, startedAt) {
    if (sessionId) {
      activeSession = sessionId;
      sessionStartTime = startedAt ? new Date(startedAt).getTime() : Date.now();
      bannerId.textContent = sessionId;
      bannerName.textContent = visitorName || '';
      activeBanner.classList.add('visible');
      inputEl.placeholder = 'Add notes, tag lead, or "end" when done...';
      startTimer();
    } else {
      activeSession = null;
      sessionStartTime = null;
      activeBanner.classList.remove('visible');
      inputEl.placeholder = 'Say "start session for [name]" to begin...';
      stopTimer();
    }
  }

  function startTimer() {
    stopTimer();
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function updateTimerDisplay() {
    if (!sessionStartTime) return;
    var elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    bannerTimer.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  // End session from banner button
  bannerEndBtn.addEventListener('click', function() {
    inputEl.value = 'end session';
    sendMessage();
  });

  // --- Batch commands that need confirmation ---
  var BATCH_PATTERN = /^(?:set|mark|change)\s+all\s+/i;

  function showConfirm(text) {
    pendingConfirm = text;
    confirmText.textContent = 'Batch operation: "' + text + '" -- apply to all matching sessions?';
    confirmBar.classList.add('active');
    inputEl.disabled = true;
  }

  function hideConfirm() {
    pendingConfirm = null;
    confirmBar.classList.remove('active');
    inputEl.disabled = false;
    inputEl.focus();
  }

  confirmYes.addEventListener('click', function() {
    var text = pendingConfirm;
    hideConfirm();
    if (text) doSend(text);
  });

  confirmNo.addEventListener('click', function() {
    hideConfirm();
    addMessage('system', 'Cancelled.');
  });

  // --- Send message ---
  async function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || sending) return;

    // Save to command history
    if (cmdHistory[cmdHistory.length - 1] !== text) {
      cmdHistory.push(text);
      if (cmdHistory.length > MAX_CMD_HISTORY) cmdHistory.shift();
    }
    historyIdx = -1;

    inputEl.value = '';
    autoResize();

    // Confirm batch operations
    if (BATCH_PATTERN.test(text)) {
      addMessage('user', text);
      showConfirm(text);
      return;
    }

    doSend(text);
  }

  var MUTATION_INTENTS = /^(set_status|set_visitor|assign_se|add_note|add_tag|remove_tag|batch_status|session_started|session_ended)$/;

  async function doSend(text) {
    sending = true;
    sendBtn.disabled = true;

    addMessage('user', text);
    showTyping();

    try {
      var resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      hideTyping();

      if (!resp.ok) {
        var err = await resp.json().catch(function() { return { error: 'Request failed' }; });
        addMessage('system', 'Error: ' + (err.error || 'Something went wrong'));
        return;
      }

      var data = await resp.json();
      var isMutation = data.intent && MUTATION_INTENTS.test(data.intent);
      addMessage('system', data.text, { duration_ms: data.duration_ms, mutation: isMutation });

      // Update active session banner based on response
      if (data.data && data.data.type === 'session_started') {
        updateBanner(data.data.sessionId, data.data.metadata.visitor_name, data.data.metadata.started_at);
      } else if (data.data && data.data.type === 'session_ended') {
        updateBanner(null);
      } else if (data.data && data.data.type === 'session_switched') {
        updateBanner(data.data.sessionId, null, null);
      }

    } catch (e) {
      hideTyping();
      addMessage('system', 'Connection error. Is the server running?');
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // --- Auto-resize textarea ---
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  // --- Event listeners ---
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
      return;
    }
    // Command history: up/down arrows
    if (e.key === 'ArrowUp' && cmdHistory.length > 0) {
      e.preventDefault();
      if (historyIdx === -1) historyIdx = cmdHistory.length;
      if (historyIdx > 0) {
        historyIdx--;
        inputEl.value = cmdHistory[historyIdx];
        autoResize();
      }
      return;
    }
    if (e.key === 'ArrowDown' && historyIdx !== -1) {
      e.preventDefault();
      historyIdx++;
      if (historyIdx >= cmdHistory.length) {
        historyIdx = -1;
        inputEl.value = '';
      } else {
        inputEl.value = cmdHistory[historyIdx];
      }
      autoResize();
      return;
    }
  });

  inputEl.addEventListener('input', autoResize);

  // Quick action buttons
  quickActions.addEventListener('click', function(e) {
    var btn = e.target.closest('.quick-btn');
    if (!btn) return;
    var msg = btn.getAttribute('data-msg');
    if (msg) {
      inputEl.value = msg;
      sendMessage();
    }
  });

  // Load history and restore active session on page load
  fetch('/api/chat/history?limit=20')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.messages && data.messages.length > 0) {
        if (emptyState) { emptyState.remove(); emptyState = null; }
        data.messages.forEach(function(m) {
          addMessage('user', m.user_message);
          addMessage('system', m.response_text, { duration_ms: m.duration_ms });
        });
      }
      // Restore active session banner
      if (data.active_session) {
        updateBanner(data.active_session, null, null);
      }
    })
    .catch(function() { /* no history, that's fine */ });

})();
</script>
</body>
</html>
