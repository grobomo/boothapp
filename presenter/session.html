<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Session Detail</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
            --se-color:  #448AFF;
            --vis-color: #00E676;
            --highlight: rgba(255, 171, 0, 0.12);
            --highlight-border: rgba(255, 171, 0, 0.4);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
        }

        /* ---- HEADER ---- */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .back {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .header .back:hover { color: var(--text); }
        .header .session-id {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-left: auto;
        }

        /* ---- LAYOUT ---- */
        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            height: calc(100vh - 70px);
        }

        /* ---- TRANSCRIPT PANEL ---- */
        .transcript-panel {
            overflow-y: auto;
            padding: 1.5rem 2rem;
            border-right: 1px solid var(--border);
        }
        .transcript-panel h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .turn {
            display: flex;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: background 0.2s;
        }
        .turn:hover {
            background: var(--surface);
        }
        .turn.highlighted {
            background: var(--highlight);
            border-left: 3px solid var(--highlight-border);
        }
        .turn.scroll-target {
            animation: flashHighlight 1.5s ease-out;
        }
        @keyframes flashHighlight {
            0%   { background: rgba(255, 171, 0, 0.3); }
            100% { background: var(--highlight); }
        }

        .turn-time {
            flex-shrink: 0;
            width: 52px;
            font-size: 0.75rem;
            color: var(--text-dim);
            padding-top: 2px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .turn-speaker {
            flex-shrink: 0;
            width: 60px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding-top: 2px;
        }
        .turn-speaker.se      { color: var(--se-color); }
        .turn-speaker.visitor  { color: var(--vis-color); }

        .turn-text {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--text);
        }

        /* ---- ANALYSIS SIDEBAR ---- */
        .sidebar {
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--surface);
        }
        .sidebar h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .section {
            margin-bottom: 1.5rem;
        }
        .section h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .interest-chip {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            margin: 0.2rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(68, 138, 255, 0.12);
            color: var(--se-color);
            border: 1px solid rgba(68, 138, 255, 0.25);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .interest-chip:hover {
            background: rgba(68, 138, 255, 0.25);
            border-color: var(--se-color);
        }
        .interest-chip.active {
            background: rgba(68, 138, 255, 0.3);
            border-color: var(--se-color);
        }

        .engagement-bar {
            display: flex;
            gap: 2px;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .engagement-bar .seg {
            flex: 1;
            border-radius: 2px;
        }
        .seg-high   { background: var(--success); }
        .seg-medium { background: var(--amber); }
        .seg-low    { background: var(--border); }

        .summary-text {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text);
        }

        .topic-tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            margin: 0.15rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(215, 25, 32, 0.12);
            color: #FF6B6B;
            border: 1px solid rgba(215, 25, 32, 0.25);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .meta-row:last-child { border-bottom: none; }
        .meta-label { color: var(--text-dim); }
        .meta-value { color: var(--text); font-weight: 500; }

        /* ---- LEGEND ---- */
        .legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .legend-dot.se  { background: var(--se-color); }
        .legend-dot.vis { background: var(--vis-color); }
        .legend-dot.hi  { background: var(--amber); opacity: 0.6; }

        /* ---- LOADING / ERROR ---- */
        .loading, .error-msg {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }
        .error-msg { color: #FF6B6B; }

        /* ---- SCROLLBAR ---- */
        .transcript-panel::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .transcript-panel::-webkit-scrollbar-track,
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .transcript-panel::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }
            .transcript-panel { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <div class="header">
        <a class="back" href="/sessions.html">&larr; Sessions</a>
        <h1>Session Detail</h1>
        <span class="session-id" id="sessionIdLabel">--</span>
    </div>

    <div class="layout">
        <!-- TRANSCRIPT -->
        <div class="transcript-panel" id="transcriptPanel">
            <h2>Transcript</h2>
            <div class="legend">
                <div class="legend-item"><span class="legend-dot se"></span> SE (Sales Engineer)</div>
                <div class="legend-item"><span class="legend-dot vis"></span> Visitor</div>
                <div class="legend-item"><span class="legend-dot hi"></span> Referenced in Analysis</div>
            </div>
            <div id="transcriptBody">
                <div class="loading">Loading transcript...</div>
            </div>
        </div>

        <!-- ANALYSIS SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <h2>AI Analysis</h2>
            <div id="analysisBody">
                <div class="loading">Loading analysis...</div>
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------------
        // Helpers
        // ---------------------------------------------------------------
        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatMs(ms) {
            var s = Math.floor(ms / 1000);
            var m = Math.floor(s / 60);
            s = s % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function getSessionId() {
            var params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // ---------------------------------------------------------------
        // Data
        // ---------------------------------------------------------------
        var sessionId = getSessionId();
        var transcriptData = [];
        var analysisData = null;

        if (!sessionId) {
            document.getElementById('transcriptBody').innerHTML =
                '<div class="error-msg">No session ID provided. Go back to <a href="/sessions.html" style="color:var(--red)">Sessions</a>.</div>';
            document.getElementById('analysisBody').innerHTML = '';
        } else {
            document.getElementById('sessionIdLabel').textContent = sessionId;
            loadData();
        }

        async function loadData() {
            // Load transcript and analysis in parallel
            var transcriptPromise = fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/transcript')
                .then(function(r) { return r.ok ? r.json() : null; })
                .catch(function() { return null; });

            var analysisPromise = fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/analysis')
                .then(function(r) { return r.ok ? r.json() : null; })
                .catch(function() { return null; });

            var results = await Promise.all([transcriptPromise, analysisPromise]);
            transcriptData = results[0];
            analysisData = results[1];

            renderTranscript();
            renderAnalysis();
        }

        // ---------------------------------------------------------------
        // Find which transcript turns are referenced by analysis
        // ---------------------------------------------------------------
        function findReferencedTurnIndices(turns, analysis) {
            if (!analysis || !turns || !turns.length) return new Set();
            var referenced = new Set();

            // Gather all text snippets from analysis that might reference transcript
            var snippets = [];
            if (analysis.key_interests) {
                analysis.key_interests.forEach(function(ki) {
                    if (ki.quote) snippets.push(ki.quote);
                    if (ki.context) snippets.push(ki.context);
                    if (ki.transcript_ref) snippets.push(ki.transcript_ref);
                });
            }
            if (analysis.highlights) {
                analysis.highlights.forEach(function(h) {
                    if (h.quote) snippets.push(h.quote);
                    if (h.text) snippets.push(h.text);
                });
            }
            if (analysis.referenced_segments) {
                analysis.referenced_segments.forEach(function(seg) {
                    if (seg.text) snippets.push(seg.text);
                });
            }

            // For each snippet, find which turns contain a substantial substring match
            snippets.forEach(function(snippet) {
                if (!snippet || snippet.length < 10) return;
                // Normalize for comparison
                var normalized = snippet.toLowerCase().replace(/\s+/g, ' ').trim();
                // Try matching with a sliding window of words
                var words = normalized.split(' ');
                var searchPhrase = words.slice(0, Math.min(8, words.length)).join(' ');

                turns.forEach(function(turn, idx) {
                    if (!turn.text) return;
                    var turnNorm = turn.text.toLowerCase().replace(/\s+/g, ' ').trim();
                    if (turnNorm.indexOf(searchPhrase) !== -1) {
                        referenced.add(idx);
                    }
                });
            });

            return referenced;
        }

        // Map key interest to the first matching turn index
        function findTurnForInterest(interest, turns) {
            if (!turns || !turns.length) return -1;
            var searchTexts = [interest.quote, interest.context, interest.transcript_ref, interest.keyword].filter(Boolean);

            for (var s = 0; s < searchTexts.length; s++) {
                var snippet = searchTexts[s].toLowerCase().replace(/\s+/g, ' ').trim();
                var words = snippet.split(' ');
                var phrase = words.slice(0, Math.min(6, words.length)).join(' ');
                if (phrase.length < 5) continue;

                for (var i = 0; i < turns.length; i++) {
                    if (!turns[i].text) continue;
                    var turnNorm = turns[i].text.toLowerCase().replace(/\s+/g, ' ').trim();
                    if (turnNorm.indexOf(phrase) !== -1) return i;
                }
            }
            // Fallback: search by topic keyword in turn text
            if (interest.topic || interest.name) {
                var keyword = (interest.topic || interest.name).toLowerCase();
                for (var j = 0; j < turns.length; j++) {
                    if (!turns[j].text) continue;
                    if (turns[j].text.toLowerCase().indexOf(keyword) !== -1) return j;
                }
            }
            return -1;
        }

        // ---------------------------------------------------------------
        // Render transcript
        // ---------------------------------------------------------------
        function renderTranscript() {
            var container = document.getElementById('transcriptBody');

            if (!transcriptData) {
                container.innerHTML = '<div class="error-msg">Transcript not available for this session.</div>';
                return;
            }

            // Normalize: accept array or {segments: [...]} or {turns: [...]}
            var turns = Array.isArray(transcriptData) ? transcriptData
                : (transcriptData.segments || transcriptData.turns || []);

            if (turns.length === 0) {
                container.innerHTML = '<div class="error-msg">Transcript is empty.</div>';
                return;
            }

            var referencedIndices = findReferencedTurnIndices(turns, analysisData);

            var html = '';
            turns.forEach(function(turn, idx) {
                var speaker = (turn.speaker || 'unknown').toLowerCase();
                var isSE = speaker === 'se' || speaker === 'sales_engineer' || speaker === 'rep' || speaker === 'presenter';
                var speakerClass = isSE ? 'se' : 'visitor';
                var speakerLabel = isSE ? 'SE' : 'Visitor';
                var isHighlighted = referencedIndices.has(idx);

                html += '<div class="turn' + (isHighlighted ? ' highlighted' : '') + '" id="turn-' + idx + '">';
                html += '<span class="turn-time">' + (turn.start != null ? formatMs(turn.start) : '') + '</span>';
                html += '<span class="turn-speaker ' + speakerClass + '">' + speakerLabel + '</span>';
                html += '<span class="turn-text">' + escHtml(turn.text) + '</span>';
                html += '</div>';
            });

            container.innerHTML = html;
        }

        // ---------------------------------------------------------------
        // Render analysis sidebar
        // ---------------------------------------------------------------
        function renderAnalysis() {
            var container = document.getElementById('analysisBody');

            if (!analysisData) {
                container.innerHTML = '<div class="error-msg">Analysis not available for this session.</div>';
                return;
            }

            var turns = transcriptData
                ? (Array.isArray(transcriptData) ? transcriptData : (transcriptData.segments || transcriptData.turns || []))
                : [];

            var html = '';

            // Key interests (clickable)
            var interests = analysisData.key_interests || analysisData.interests || [];
            if (interests.length > 0) {
                html += '<div class="section"><h3>Key Interests</h3>';
                interests.forEach(function(ki, idx) {
                    var label = ki.topic || ki.name || ki.keyword || ('Interest ' + (idx + 1));
                    var turnIdx = findTurnForInterest(ki, turns);
                    html += '<span class="interest-chip" data-turn="' + turnIdx + '" title="Click to scroll to transcript">'
                         + escHtml(label) + '</span>';
                });
                html += '</div>';
            }

            // Topics detected
            var topics = analysisData.topics || analysisData.detected_topics || [];
            if (topics.length > 0) {
                html += '<div class="section"><h3>Topics Detected</h3>';
                topics.forEach(function(t) {
                    var name = typeof t === 'string' ? t : (t.name || t.topic || '');
                    html += '<span class="topic-tag">' + escHtml(name) + '</span>';
                });
                html += '</div>';
            }

            // Engagement summary
            if (analysisData.engagement || analysisData.summary) {
                var eng = analysisData.engagement || analysisData.summary;
                html += '<div class="section"><h3>Engagement</h3>';
                if (eng.avgEngagement || eng.avg_engagement || eng.level) {
                    var level = eng.avgEngagement || eng.avg_engagement || eng.level;
                    html += '<div class="meta-row"><span class="meta-label">Overall</span>'
                         + '<span class="meta-value">' + escHtml(level) + '</span></div>';
                }
                if (eng.scoreCounts || eng.score_counts) {
                    var sc = eng.scoreCounts || eng.score_counts;
                    html += '<div class="engagement-bar">';
                    for (var i = 0; i < (sc.high || 0); i++) html += '<div class="seg seg-high"></div>';
                    for (var j = 0; j < (sc.medium || 0); j++) html += '<div class="seg seg-medium"></div>';
                    for (var k = 0; k < (sc.low || 0); k++) html += '<div class="seg seg-low"></div>';
                    html += '</div>';
                }
                html += '</div>';
            }

            // Summary / notes
            if (analysisData.summary_text || analysisData.notes) {
                html += '<div class="section"><h3>Summary</h3>';
                html += '<div class="summary-text">' + escHtml(analysisData.summary_text || analysisData.notes) + '</div>';
                html += '</div>';
            }

            // Session metadata
            html += '<div class="section"><h3>Session Info</h3>';
            if (analysisData.visitor_name) {
                html += '<div class="meta-row"><span class="meta-label">Visitor</span>'
                     + '<span class="meta-value">' + escHtml(analysisData.visitor_name) + '</span></div>';
            }
            if (analysisData.duration_ms || analysisData.duration) {
                var dur = analysisData.duration_ms || analysisData.duration;
                html += '<div class="meta-row"><span class="meta-label">Duration</span>'
                     + '<span class="meta-value">' + formatMs(dur) + '</span></div>';
            }
            if (analysisData.total_turns || (turns && turns.length)) {
                html += '<div class="meta-row"><span class="meta-label">Turns</span>'
                     + '<span class="meta-value">' + (analysisData.total_turns || turns.length) + '</span></div>';
            }
            html += '</div>';

            container.innerHTML = html;

            // Attach click handlers to interest chips
            var chips = container.querySelectorAll('.interest-chip');
            chips.forEach(function(chip) {
                chip.addEventListener('click', function() {
                    var turnIdx = parseInt(this.getAttribute('data-turn'), 10);
                    scrollToTurn(turnIdx);

                    // Toggle active state
                    chips.forEach(function(c) { c.classList.remove('active'); });
                    this.classList.add('active');
                });
            });
        }

        // ---------------------------------------------------------------
        // Scroll to transcript turn
        // ---------------------------------------------------------------
        function scrollToTurn(idx) {
            if (idx < 0) return;
            var el = document.getElementById('turn-' + idx);
            if (!el) return;

            var panel = document.getElementById('transcriptPanel');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Flash animation
            el.classList.remove('scroll-target');
            void el.offsetWidth; // force reflow
            el.classList.add('scroll-target');
        }

        // ---------------------------------------------------------------
        // Keyboard: Escape goes back
        // ---------------------------------------------------------------
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.location.href = '/sessions.html';
            }
        });
    </script>
</body>
</html>
