<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoothApp -- Screenshot Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --red: #f85149;
    --green: #3fb950;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .header-left a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .header-left a:hover { color: var(--accent); }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .session-label {
    font-family: monospace;
    font-size: 0.9rem;
    color: var(--text-muted);
    background: var(--bg);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .setup {
    max-width: 400px;
    margin: 8rem auto;
    text-align: center;
  }
  .setup h2 {
    font-size: 1.3rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .setup input {
    width: 100%;
    font-size: 1rem;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: monospace;
    margin-bottom: 0.8rem;
  }
  .setup input:focus { outline: 2px solid var(--accent); }
  .setup button {
    font-size: 1rem;
    padding: 0.6rem 2rem;
    border-radius: 8px;
    border: none;
    background: #238636;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
  }
  .setup button:hover { background: #2ea043; }

  #gallery-container { flex: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="sessions.html">&larr; Sessions</a>
    <h1>Screenshot Gallery</h1>
    <span class="session-label hidden" id="sid-label"></span>
  </div>
</div>

<div id="setup" class="setup">
  <h2>Screenshot Gallery</h2>
  <input id="session-input" type="text" placeholder="Enter session ID (e.g. A726594)">
  <button id="load-btn">Load Screenshots</button>
</div>

<div id="gallery-container"></div>

<script src="components/gallery.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var sid = params.get('session');

  if (sid) {
    loadGallery(sid);
  }

  document.getElementById('load-btn').addEventListener('click', function () {
    var val = document.getElementById('session-input').value.trim();
    if (val) loadGallery(val);
  });

  document.getElementById('session-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      var val = this.value.trim();
      if (val) loadGallery(val);
    }
  });

  function loadGallery(sid) {
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('sid-label').textContent = sid;
    document.getElementById('sid-label').classList.remove('hidden');
    BoothGallery.init('gallery-container', sid);
  }
})();
</script>
</body>
</html>
