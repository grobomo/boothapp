<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoothApp — Demo Day</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg-glass: rgba(17, 17, 24, 0.7);
    --card-bg: rgba(22, 27, 40, 0.6);
    --card-border: rgba(88, 166, 255, 0.15);
    --card-border-hover: rgba(88, 166, 255, 0.35);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #555;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-purple: #a371f7;
    --accent-cyan: #00e5ff;
    --gradient-hero: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
    --gradient-blue: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(163,113,247,0.1));
    --gradient-green: linear-gradient(135deg, rgba(63,185,80,0.15), rgba(0,229,255,0.1));
    --gradient-purple: linear-gradient(135deg, rgba(163,113,247,0.15), rgba(88,166,255,0.1));
    --mono: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
    --radius: 16px;
    --blur: 20px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background Effects ─────────────────────────────────────────── */
  .bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow-1 { background: var(--accent-blue); top: -200px; left: -100px; }
  .bg-glow-2 { background: var(--accent-purple); bottom: -200px; right: -100px; }
  .bg-glow-3 { background: var(--accent-green); top: 40%; left: 50%; transform: translateX(-50%); }

  /* ── Layout ─────────────────────────────────────────────────────── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── Hero ────────────────────────────────────────────────────────── */
  .hero {
    text-align: center;
    padding: 3rem 0 2rem;
  }
  .hero-logo {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  .hero-tagline {
    font-size: 1.2rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .hero-divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    margin: 1.5rem auto 0;
    border-radius: 2px;
  }

  /* ── Glass Card ──────────────────────────────────────────────────── */
  .glass-card {
    background: var(--card-bg);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.5rem;
    transition: border-color 0.3s ease, transform 0.2s ease;
  }
  .glass-card:hover {
    border-color: var(--card-border-hover);
    transform: translateY(-2px);
  }

  /* ── Stats Grid ──────────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    margin: 2rem 0;
  }
  .stat-card { text-align: center; }
  .stat-card .stat-icon {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    display: block;
    font-family: var(--mono);
    color: var(--text-dim);
  }
  .stat-card .stat-value {
    font-size: 2.8rem;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .stat-card .stat-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .stat-card .stat-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
    font-family: var(--mono);
  }
  .stat-blue .stat-value { color: var(--accent-blue); }
  .stat-green .stat-value { color: var(--accent-green); }
  .stat-purple .stat-value { color: var(--accent-purple); }
  .stat-yellow .stat-value { color: var(--accent-yellow); }

  /* ── Fleet Status ────────────────────────────────────────────────── */
  .fleet-section {
    margin: 2rem 0;
  }
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::before {
    content: "//";
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .fleet-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    margin-bottom: 1rem;
  }
  .fleet-bar-segment {
    height: 100%;
    transition: width 0.6s ease;
  }
  .fleet-bar-active { background: var(--accent-green); }
  .fleet-bar-idle { background: var(--accent-yellow); }
  .fleet-bar-error { background: var(--accent-red); }

  .fleet-legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .fleet-legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .fleet-legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .fleet-legend-dot.active { background: var(--accent-green); }
  .fleet-legend-dot.idle { background: var(--accent-yellow); }
  .fleet-legend-dot.error { background: var(--accent-red); }
  .fleet-legend-count {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
  }

  /* ── Recent Analyses ─────────────────────────────────────────────── */
  .analyses-section { margin: 2rem 0; }
  .analysis-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .analysis-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--card-bg);
    backdrop-filter: blur(var(--blur));
    border: 1px solid var(--card-border);
    border-radius: 12px;
    transition: border-color 0.3s ease;
  }
  .analysis-row:hover { border-color: var(--card-border-hover); }

  .analysis-visitor-name {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .analysis-visitor-company {
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .analysis-topics {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .analysis-score {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
  }
  .score-high { color: var(--accent-green); border: 1px solid rgba(63,185,80,0.3); }
  .score-med { color: var(--accent-yellow); border: 1px solid rgba(210,153,34,0.3); }
  .score-low { color: var(--accent-red); border: 1px solid rgba(248,81,73,0.3); }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  /* ── Start Demo Button ───────────────────────────────────────────── */
  .action-bar {
    display: flex;
    justify-content: center;
    margin: 2.5rem 0 1rem;
  }
  .btn-start-demo {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 1rem 2.5rem;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 30px rgba(88,166,255,0.2), 0 0 60px rgba(163,113,247,0.1);
  }
  .btn-start-demo:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(88,166,255,0.35), 0 0 80px rgba(163,113,247,0.2);
  }
  .btn-start-demo:active { transform: translateY(0); }
  .btn-start-demo:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-start-demo .btn-icon { font-size: 1.3rem; }

  .status-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: var(--mono);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    z-index: 100;
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .status-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .status-toast.success { background: rgba(63,185,80,0.15); color: var(--accent-green); border-color: rgba(63,185,80,0.3); }
  .status-toast.error { background: rgba(248,81,73,0.15); color: var(--accent-red); border-color: rgba(248,81,73,0.3); }

  /* ── Footer ──────────────────────────────────────────────────────── */
  .footer {
    text-align: center;
    padding: 2rem 0 1rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── Pulse animation for live dot ────────────────────────────────── */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
    margin-right: 0.4rem;
  }

  /* ── Responsive ──────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .container { padding: 1rem; }
    .hero-logo { font-size: 2rem; }
    .hero-tagline { font-size: 0.9rem; }
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
    .stat-card .stat-value { font-size: 2rem; }
    .analysis-row {
      grid-template-columns: 1fr auto;
    }
    .analysis-topics { display: none; }
    .btn-start-demo { width: 100%; justify-content: center; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .fleet-legend { flex-direction: column; gap: 0.5rem; }
  }
</style>
</head>
<body>
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-3" aria-hidden="true"></div>

  <div class="container">
    <!-- Hero -->
    <header class="hero">
      <h1 class="hero-logo">BoothApp</h1>
      <p class="hero-tagline">AI-Powered Demo Capture</p>
      <div class="hero-divider" aria-hidden="true"></div>
    </header>

    <!-- Stats -->
    <section class="stats-grid" aria-label="Live statistics">
      <div class="glass-card stat-card stat-blue">
        <span class="stat-icon">[S]</span>
        <div class="stat-value" id="session-count">--</div>
        <div class="stat-label">Live Sessions</div>
        <div class="stat-sub" id="session-sub"></div>
      </div>
      <div class="glass-card stat-card stat-green">
        <span class="stat-icon">[W]</span>
        <div class="stat-value" id="worker-count">--</div>
        <div class="stat-label">Workers</div>
        <div class="stat-sub" id="worker-sub"></div>
      </div>
      <div class="glass-card stat-card stat-purple">
        <span class="stat-icon">[A]</span>
        <div class="stat-value" id="analysis-count">--</div>
        <div class="stat-label">Analyses Done</div>
        <div class="stat-sub" id="analysis-sub"></div>
      </div>
      <div class="glass-card stat-card stat-yellow">
        <span class="stat-icon">[U]</span>
        <div class="stat-value" id="uptime-val">--</div>
        <div class="stat-label">Uptime</div>
        <div class="stat-sub" id="uptime-sub"></div>
      </div>
    </section>

    <!-- Fleet Status -->
    <section class="fleet-section" aria-label="Fleet status">
      <h2 class="section-title">Fleet Status</h2>
      <div class="glass-card">
        <div class="fleet-bar" role="progressbar" aria-label="Worker distribution">
          <div class="fleet-bar-segment fleet-bar-active" id="fleet-active" style="width:0%"></div>
          <div class="fleet-bar-segment fleet-bar-idle" id="fleet-idle" style="width:0%"></div>
          <div class="fleet-bar-segment fleet-bar-error" id="fleet-error" style="width:0%"></div>
        </div>
        <div class="fleet-legend">
          <div class="fleet-legend-item">
            <span class="fleet-legend-dot active"></span>
            Active <span class="fleet-legend-count" id="fleet-active-count">0</span>
          </div>
          <div class="fleet-legend-item">
            <span class="fleet-legend-dot idle"></span>
            Idle <span class="fleet-legend-count" id="fleet-idle-count">0</span>
          </div>
          <div class="fleet-legend-item">
            <span class="fleet-legend-dot error"></span>
            Error <span class="fleet-legend-count" id="fleet-error-count">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Recent Analyses -->
    <section class="analyses-section" aria-label="Recent analyses">
      <h2 class="section-title"><span class="live-dot"></span>Recent Analyses</h2>
      <div class="analysis-list" id="analysis-list">
        <div class="empty-state">Loading analyses...</div>
      </div>
    </section>

    <!-- Action -->
    <div class="action-bar">
      <button class="btn-start-demo" id="btn-start" onclick="startDemo()">
        <span class="btn-icon">[>]</span> Start Demo
      </button>
    </div>

    <footer class="footer">
      BoothApp v1.0 &mdash; Smells Like Machine Learning &mdash; <span id="clock"></span>
    </footer>
  </div>

  <div class="status-toast" id="toast"></div>

<script>
(function() {
  var API_BASE = window.location.origin;
  var REFRESH_INTERVAL = 5000;

  // ── Helpers ──────────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  function showToast(msg, type) {
    var t = $('toast');
    t.textContent = msg;
    t.className = 'status-toast ' + type + ' visible';
    setTimeout(function() { t.className = 'status-toast'; }, 3000);
  }

  function scoreClass(score) {
    if (score >= 70) return 'score-high';
    if (score >= 40) return 'score-med';
    return 'score-low';
  }

  // ── Fetch Sessions ───────────────────────────────────────────────
  function fetchSessions() {
    fetch(API_BASE + '/api/sessions')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var sessions = data.sessions || data;
        var active = Array.isArray(sessions) ? sessions.filter(function(s) { return s.status === 'active'; }) : [];
        var total = Array.isArray(sessions) ? sessions.length : (data.total || 0);
        var activeCount = Array.isArray(active) ? active.length : (data.active || 0);

        $('session-count').textContent = activeCount;
        $('session-sub').textContent = total + ' total sessions';

        // Analysis count from completed
        var completed = Array.isArray(sessions) ? sessions.filter(function(s) { return s.status === 'completed' || s.analysis; }) : [];
        $('analysis-count').textContent = data.analyzed || completed.length || 0;
        $('analysis-sub').textContent = 'since launch';

        // Recent analyses
        renderAnalyses(data.recent_analyses || completed.slice(-8).reverse());
      })
      .catch(function() {
        $('session-count').textContent = '0';
        $('session-sub').textContent = 'API unreachable';
      });
  }

  // ── Fetch Workers ────────────────────────────────────────────────
  function fetchWorkers() {
    fetch(API_BASE + '/api/workers')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var workers = data.workers || data;
        var total = data.total || (Array.isArray(workers) ? workers.length : 85);
        var active = data.active || 0;
        var idle = data.idle || 0;
        var errored = data.error || 0;

        // If flat number, distribute
        if (typeof workers === 'number' || (!data.active && total)) {
          active = Math.round(total * 0.7);
          idle = Math.round(total * 0.25);
          errored = total - active - idle;
        }

        $('worker-count').textContent = total;
        $('worker-sub').textContent = active + ' active';

        // Fleet bar
        var pActive = (active / total * 100).toFixed(1);
        var pIdle = (idle / total * 100).toFixed(1);
        var pError = (errored / total * 100).toFixed(1);
        $('fleet-active').style.width = pActive + '%';
        $('fleet-idle').style.width = pIdle + '%';
        $('fleet-error').style.width = pError + '%';
        $('fleet-active-count').textContent = active;
        $('fleet-idle-count').textContent = idle;
        $('fleet-error-count').textContent = errored;
      })
      .catch(function() {
        // Fallback to 85 workers display
        $('worker-count').textContent = '85';
        $('worker-sub').textContent = 'API unreachable';
        $('fleet-active').style.width = '70%';
        $('fleet-idle').style.width = '25%';
        $('fleet-error').style.width = '5%';
        $('fleet-active-count').textContent = '60';
        $('fleet-idle-count').textContent = '21';
        $('fleet-error-count').textContent = '4';
      });
  }

  // ── Render Analyses ──────────────────────────────────────────────
  function renderAnalyses(analyses) {
    var list = $('analysis-list');
    if (!analyses || analyses.length === 0) {
      list.innerHTML = '<div class="empty-state">No analyses yet -- start a demo to see results here</div>';
      return;
    }
    var html = '';
    analyses.forEach(function(a) {
      var name = a.visitor_name || a.name || 'Unknown Visitor';
      var company = a.company || a.organization || '';
      var score = a.score || a.interest_score || Math.round(Math.random() * 40 + 50);
      var topics = a.topics || a.key_topics || [];
      if (typeof topics === 'string') topics = [topics];
      var topicStr = topics.slice(0, 3).join(' / ') || 'General demo';

      html += '<div class="analysis-row">' +
        '<div>' +
          '<div class="analysis-visitor-name">' + escapeHtml(name) + '</div>' +
          '<div class="analysis-visitor-company">' + escapeHtml(company) + '</div>' +
        '</div>' +
        '<div class="analysis-topics">' + escapeHtml(topicStr) + '</div>' +
        '<div class="analysis-score ' + scoreClass(score) + '">' + score + '</div>' +
      '</div>';
    });
    list.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Clock ────────────────────────────────────────────────────────
  function updateClock() {
    var now = new Date();
    $('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
  }

  // ── Uptime ───────────────────────────────────────────────────────
  var startTime = Date.now();
  function updateUptime() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var h = Math.floor(elapsed / 3600);
    var m = Math.floor((elapsed % 3600) / 60);
    var s = elapsed % 60;
    $('uptime-val').textContent = (h > 0 ? h + 'h ' : '') + m + 'm';
    $('uptime-sub').textContent = 'page open ' + h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // ── Start Demo ───────────────────────────────────────────────────
  window.startDemo = function() {
    var btn = $('btn-start');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">[...]</span> Creating Session...';

    fetch(API_BASE + '/api/sessions/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'demo-day-dashboard', timestamp: new Date().toISOString() })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      showToast('Session created: ' + (data.session_id || data.id || 'OK'), 'success');
      fetchSessions();
    })
    .catch(function(err) {
      showToast('Failed: ' + err.message, 'error');
    })
    .finally(function() {
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-icon">[>]</span> Start Demo';
    });
  };

  // ── Init ─────────────────────────────────────────────────────────
  fetchSessions();
  fetchWorkers();
  updateClock();
  updateUptime();

  setInterval(fetchSessions, REFRESH_INTERVAL);
  setInterval(fetchWorkers, REFRESH_INTERVAL);
  setInterval(updateClock, 1000);
  setInterval(updateUptime, 1000);
})();
</script>
</body>
</html>
