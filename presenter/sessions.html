<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Sessions</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { color: var(--text); }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-bar .count { color: var(--text); font-weight: 600; }

        #error-msg {
            display: none;
            background: rgba(215, 25, 32, 0.15);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #FF6B6B;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        thead th {
            background: var(--surface2);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        .session-id {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-complete { background: rgba(0,230,118,0.15); color: var(--success); }
        .badge-active   { background: rgba(68,138,255,0.15); color: #448AFF; }
        .badge-pending  { background: rgba(255,171,0,0.15);  color: var(--amber); }
        .badge-unknown  { background: rgba(107,115,133,0.15); color: var(--text-dim); }

        .analysis-yes { color: var(--success); }
        .analysis-no  { color: var(--text-dim); }

        .summary-link {
            color: var(--red);
            text-decoration: none;
            font-weight: 500;
        }
        .summary-link:hover { text-decoration: underline; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--success);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 320px;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 20px rgba(0,230,118,.08);
            transform: translateX(120%);
            opacity: 0;
            animation: toastIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
            overflow: hidden;
        }

        .toast.toast-out { animation: toastOut .3s ease-in forwards; }

        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0);    opacity: 1; }
            to   { transform: translateX(120%); opacity: 0; }
        }

        .toast-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .toast-icon {
            width: 28px; height: 28px;
            border-radius: 8px;
            background: rgba(0,230,118,.12);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .toast-icon svg { width: 16px; height: 16px; fill: var(--success); }

        .toast-title {
            font-size: 13px; font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toast-body { font-size: 14px; color: var(--text); line-height: 1.4; }
        .toast-body strong { color: #fff; }

        .toast-score {
            display: inline-block; margin-top: 6px;
            padding: 2px 10px; border-radius: 4px;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .toast-score--high   { background: rgba(0,230,118,.15); color: var(--success); }
        .toast-score--medium { background: rgba(68,138,255,.15); color: #448AFF; }
        .toast-score--low    { background: rgba(255,171,0,.15);  color: var(--amber); }

        .toast-progress {
            position: absolute; bottom: 0; left: 4px; right: 0;
            height: 2px; background: var(--success);
            border-radius: 0 0 12px 0;
            animation: toastProgress 5s linear forwards;
        }
        @keyframes toastProgress {
            from { width: calc(100% - 4px); }
            to   { width: 0%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sessions</h1>
        <a href="/demo.html">&larr; Back to Dashboard</a>
    </div>

    <div class="status-bar">
        <span>Total: <span class="count" id="total-count">--</span></span>
        <span>With Analysis: <span class="count" id="analysis-count">--</span></span>
    </div>

    <div id="error-msg"></div>

    <table>
        <thead>
            <tr>
                <th>Session ID</th>
                <th>Visitor</th>
                <th>Status</th>
                <th>Created</th>
                <th>Analysis</th>
                <th>Summary</th>
            </tr>
        </thead>
        <tbody id="sessions-body">
            <tr><td colspan="6" class="loading">Loading sessions...</td></tr>
        </tbody>
    </table>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // -- Notification chime (Web Audio API) --
        var audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playChime() {
            try {
                var ctx = getAudioContext();
                var now = ctx.currentTime;
                [523.25, 659.25].forEach(function (freq, i) {
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, now + i * 0.12);
                    gain.gain.linearRampToValueAtTime(0.15, now + i * 0.12 + 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.12);
                    osc.stop(now + i * 0.12 + 0.5);
                });
            } catch (e) { /* silent fallback */ }
        }
        function showToast(visitorName, score) {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast';
            var scoreClass = 'toast-score--' + (score || 'medium').toLowerCase();
            toast.innerHTML =
                '<div class="toast-header">' +
                    '<div class="toast-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>' +
                    '<div class="toast-title">Analysis Complete</div>' +
                '</div>' +
                '<div class="toast-body">' +
                    '<strong>' + escHtml(visitorName || 'Visitor') + '</strong> session analyzed' +
                    '<br><span class="toast-score ' + scoreClass + '">' + escHtml(score || 'Medium') + ' engagement</span>' +
                '</div>' +
                '<div class="toast-progress"></div>';
            container.appendChild(toast);
            playChime();
            setTimeout(function () {
                toast.classList.add('toast-out');
                setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
            }, 5000);
        }

        // Track sessions that already had analysis on previous poll
        var knownAnalyzedSessions = new Set();
        var isFirstLoad = true;

        function statusBadge(status) {
            var cls = 'badge-unknown';
            if (status === 'complete') cls = 'badge-complete';
            else if (status === 'active') cls = 'badge-active';
            else if (status === 'pending') cls = 'badge-pending';
            return '<span class="badge ' + cls + '">' + escHtml(status) + '</span>';
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '--';
            var d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        async function loadSessions() {
            try {
                var resp = await fetch('/api/sessions');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var sessions = data.sessions || [];

                document.getElementById('total-count').textContent = sessions.length;
                document.getElementById('analysis-count').textContent =
                    sessions.filter(function(s) { return s.has_analysis; }).length;

                // Detect newly completed analyses and show toasts
                sessions.forEach(function(s) {
                    if (s.has_analysis && !knownAnalyzedSessions.has(s.session_id)) {
                        if (!isFirstLoad) {
                            showToast(s.visitor_name || s.session_id, 'High');
                        }
                        knownAnalyzedSessions.add(s.session_id);
                    }
                });
                isFirstLoad = false;

                var tbody = document.getElementById('sessions-body');

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">No sessions found</td></tr>';
                    return;
                }

                tbody.innerHTML = sessions.map(function(s) {
                    var analysisCell = s.has_analysis
                        ? '<span class="analysis-yes">Yes</span>'
                        : '<span class="analysis-no">No</span>';
                    var summaryCell = s.summary_link
                        ? '<a class="summary-link" href="' + escHtml(s.summary_link) + '">View</a>'
                        : '--';
                    return '<tr>' +
                        '<td class="session-id">' + escHtml(s.session_id) + '</td>' +
                        '<td>' + (escHtml(s.visitor_name) || '<span style="color:var(--text-dim)">--</span>') + '</td>' +
                        '<td>' + statusBadge(s.status || 'unknown') + '</td>' +
                        '<td>' + formatDate(s.created_at) + '</td>' +
                        '<td>' + analysisCell + '</td>' +
                        '<td>' + summaryCell + '</td>' +
                        '</tr>';
                }).join('');
            } catch (err) {
                var errEl = document.getElementById('error-msg');
                errEl.style.display = 'block';
                errEl.textContent = 'Failed to load sessions: ' + err.message;
                document.getElementById('sessions-body').innerHTML =
                    '<tr><td colspan="6" class="empty">Could not load sessions</td></tr>';
            }
        }

        loadSessions();
        // Auto-refresh every 30 seconds
        setInterval(loadSessions, 30000);
    </script>
</body>
</html>
