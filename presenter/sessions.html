<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/error-boundary.js"></script>
<script src="components/nav.js"></script>
<title>BoothApp — Session Review</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
<script src="auth.js"></script>
<link rel="stylesheet" href="styles/mobile.css">
<link rel="stylesheet" href="styles/quality-badges.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.85rem;
    color: #484f58;
  }

  .refresh-badge {
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    background: #161b22;
    border: 1px solid #30363d;
    font-family: monospace;
  }

  .session-count {
    color: #8b949e;
  }

  /* -- Setup screen -- */
  .setup {
    max-width: 440px;
    margin: 6rem auto;
    text-align: center;
  }
  .setup h2 {
    font-size: 1.4rem;
    color: #8b949e;
    margin-bottom: 1.5rem;
  }
  .setup label {
    display: block;
    font-size: 0.95rem;
    color: #8b949e;
    margin-bottom: 0.4rem;
    text-align: left;
  }
  .setup input {
    width: 100%;
    font-size: 1rem;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #e6edf3;
    font-family: monospace;
    margin-bottom: 0.8rem;
  }
  .setup input:focus { outline: 2px solid #58a6ff; }
  .setup button {
    margin-top: 1rem;
    font-size: 1.1rem;
    padding: 0.6rem 2rem;
    border-radius: 8px;
    border: none;
    background: #238636;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
  }
  .setup button:hover { background: #2ea043; }
  .setup .hint {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #484f58;
  }

  /* -- Table -- */
  .table-wrap {
    max-width: 1100px;
    margin: 0 auto;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    padding: 0.7rem 1rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: #e6edf3; }
  thead th .sort-arrow { margin-left: 0.3rem; font-size: 0.7rem; }

  tbody tr {
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.15s;
  }
  tbody tr:hover { background: #161b22; }
  tbody tr.expanded { background: #161b22; border-bottom: none; }

  td {
    padding: 0.7rem 1rem;
    font-size: 0.95rem;
    vertical-align: middle;
    white-space: nowrap;
  }

  td.session-id-cell {
    font-family: monospace;
    color: #58a6ff;
    font-weight: 600;
  }

  /* -- Status badges -- */
  .badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-recording   { background: #f8514933; color: #f85149; }
  .badge-active      { background: #f8514933; color: #f85149; }
  .badge-completed   { background: #23863633; color: #3fb950; }
  .badge-ended       { background: #23863633; color: #3fb950; }
  .badge-analyzed    { background: #23863633; color: #3fb950; }
  .badge-waiting     { background: #d2992233; color: #d29922; }
  .badge-processing  { background: #58a6ff33; color: #58a6ff; }
  .badge-unknown     { background: #30363d;   color: #8b949e; }

  /* -- Tag pills -- */
  .tag-pill {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    margin: 0 0.2rem 0.1rem 0;
    white-space: nowrap;
    cursor: default;
    line-height: 1.4;
  }
  .tag-pill .tag-remove {
    margin-left: 0.3rem;
    cursor: pointer;
    opacity: 0.6;
    font-weight: bold;
  }
  .tag-pill .tag-remove:hover { opacity: 1; }

  .tag-add-btn {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 12px;
    font-size: 0.7rem;
    color: #8b949e;
    border: 1px dashed #30363d;
    cursor: pointer;
    background: transparent;
    vertical-align: middle;
  }
  .tag-add-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  .tag-input-wrap {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .tag-input-wrap input {
    font-size: 0.75rem;
    padding: 0.15rem 0.4rem;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #e6edf3;
    width: 100px;
    font-family: inherit;
  }
  .tag-input-wrap input:focus { outline: 1px solid #58a6ff; }

  /* -- Tag filter bar -- */
  .tag-filter-bar {
    max-width: 1100px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    min-height: 2rem;
  }
  .tag-filter-bar .filter-label {
    font-size: 0.8rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-filter-bar .tag-pill {
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .tag-filter-bar .tag-pill:hover,
  .tag-filter-bar .tag-pill.active { opacity: 1; }
  .tag-filter-bar .clear-filter {
    font-size: 0.75rem;
    color: #484f58;
    cursor: pointer;
    text-decoration: underline;
  }
  .tag-filter-bar .clear-filter:hover { color: #8b949e; }

  /* -- Engagement score bar -- */
  .score-bar {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .score-track {
    width: 60px;
    height: 6px;
    background: #30363d;
    border-radius: 3px;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .score-fill.low    { background: #f85149; }
  .score-fill.mid    { background: #d29922; }
  .score-fill.high   { background: #3fb950; }
  .score-label {
    font-size: 0.85rem;
    font-family: monospace;
    min-width: 2.5em;
    text-align: right;
  }

  /* -- Expanded detail row -- */
  .detail-row td {
    padding: 0;
    border-bottom: 1px solid #21262d;
  }
  .detail-row:hover { background: transparent; }

  .detail-panel {
    background: #0d1117;
    border: 1px solid #30363d;
    border-top: none;
    border-radius: 0 0 8px 8px;
    margin: 0 0.5rem 0.5rem;
    padding: 1.2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
  }

  .detail-item label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    margin-bottom: 0.2rem;
  }
  .detail-item span {
    font-size: 0.95rem;
    color: #e6edf3;
  }
  .detail-item span.mono { font-family: monospace; }

  .detail-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .detail-actions a {
    font-size: 0.85rem;
    color: #58a6ff;
    text-decoration: none;
    padding: 0.3rem 0.7rem;
    border: 1px solid #30363d;
    border-radius: 6px;
    transition: border-color 0.15s;
  }
  .detail-actions a:hover { border-color: #58a6ff; }

  /* -- Error / empty states -- */
  .error-banner {
    max-width: 1100px;
    margin: 0 auto 1rem;
    background: #f8514922;
    border: 1px solid #f85149;
    color: #f85149;
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
    display: none;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: #484f58;
    font-size: 1.1rem;
  }

  .loading {
    text-align: center;
    padding: 4rem;
    color: #8b949e;
  }
  .loading::after {
    content: "";
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 0.6rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* -- Compare mode -- */
  .compare-bar {
    max-width: 1100px;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 1rem;
    background: #161b22;
    border: 1px solid #1f6feb;
    border-radius: 8px;
  }
  .compare-bar .compare-status {
    color: #8b949e;
    font-size: 0.85rem;
    flex: 1;
  }
  .compare-bar .compare-status .sel-id {
    color: #58a6ff;
    font-family: monospace;
    font-weight: 600;
  }
  .btn-compare {
    font-size: 0.85rem;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    background: #1f6feb;
    color: #fff;
    transition: background 0.15s;
  }
  .btn-compare:hover { background: #388bfd; }
  .btn-compare:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-compare-outline {
    font-size: 0.85rem;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    border: 1px solid #30363d;
    cursor: pointer;
    font-weight: 600;
    background: transparent;
    color: #8b949e;
  }
  .btn-compare-outline:hover { color: #e6edf3; border-color: #484f58; }

  tbody tr.compare-selected {
    background: #1f6feb18 !important;
    border-left: 3px solid #58a6ff;
  }

  .compare-check {
    width: 16px;
    height: 16px;
    accent-color: #58a6ff;
    cursor: pointer;
  }

  /* -- Responsive -- */
  @media (max-width: 768px) {
    body { padding: 1rem; }
    h1 { font-size: 1.4rem; }
    td, th { padding: 0.5rem 0.6rem; font-size: 0.85rem; }
    .detail-panel { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    body { padding: 0.75rem; }
    header { flex-direction: column; align-items: flex-start; }
    .detail-panel { grid-template-columns: 1fr; }
    .score-track { width: 40px; }
  }

</style>
</head>

<script>if (!BoothAuth.requireAwsCreds()) { window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href); }
else if (!BoothAuth.requireLogin()) { /* redirects */ }</script>

<!-- Setup: API endpoint -->
<div id="setup" class="setup">
  <h1>BoothApp</h1>
  <h2>Session Review Dashboard</h2>
  <label for="api-url">API Endpoint URL</label>
  <input id="api-url" type="text" placeholder="https://your-api.example.com or http://localhost:3000">
  <button id="save-config">Connect</button>
  <div class="hint">Endpoint URL is stored in localStorage only.</div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <h1>Session Review</h1>
    <div class="header-right">
      <span class="session-count" id="session-count"></span>
      <span class="refresh-badge" id="refresh-badge">--s</span>
      <button class="btn-compare-outline" id="compare-mode-btn">Compare</button>
      <a href="analytics.html" style="color:#58a6ff;text-decoration:none;font-size:0.85rem;">Analytics</a>
      <a href="visitor-insights.html" style="color:#58a6ff;text-decoration:none;font-size:0.85rem;">Insights</a>
      <a href="workers.html" style="color:#58a6ff;text-decoration:none;font-size:0.85rem;">Workers</a>
      <span style="color:#8b949e;font-family:monospace;" id="auth-user"></span>
      <a href="admin.html" id="admin-link" style="color:#484f58;text-decoration:none;font-size:0.8rem;display:none;">[admin]</a>
      <a href="#" id="logout-link" style="color:#484f58;text-decoration:none;font-size:0.8rem;">[logout]</a>
    </div>
  </header>
  <script>
    document.getElementById("auth-user").textContent = BoothAuth.currentUser() || "";
    if (BoothAuth.isAdmin()) document.getElementById("admin-link").style.display = "";
  </script>

  <div class="error-banner" id="error-banner"></div>

  <div class="compare-bar hidden" id="compare-bar">
    <div class="compare-status" id="compare-status">Select 2 sessions to compare</div>
    <button class="btn-compare" id="compare-go-btn" disabled>Compare</button>
    <button class="btn-compare-outline" id="compare-cancel-btn">Cancel</button>
  </div>

  <div class="tag-filter-bar hidden" id="tag-filter-bar">
    <span class="filter-label">Filter by tag:</span>
    <span id="tag-filter-pills"></span>
    <span class="clear-filter hidden" id="clear-tag-filter">clear</span>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading">Loading sessions</div>
    <table id="session-table" class="hidden" aria-label="Session list" role="table">
      <thead>
        <tr>
          <th class="compare-col hidden" style="width:40px;cursor:default;"></th>
          <th data-col="id">Session ID <span class="sort-arrow"></span></th>
          <th data-col="name">Visitor <span class="sort-arrow"></span></th>
          <th data-col="date">Date <span class="sort-arrow"></span></th>
          <th data-col="status">Status <span class="sort-arrow"></span></th>
          <th data-col="tags">Tags</th>
          <th data-col="score">Engagement <span class="sort-arrow"></span></th>
          <th data-col="quality">Quality</th>
        </tr>
      </thead>
      <tbody id="session-body"></tbody>
    </table>
    <div class="empty-state hidden" id="empty-state">No sessions found.</div>
  </div>
</div>

<script>
(function () {
  var REFRESH_MS = 15000;
  var LS_KEY_API = "boothapp_api_url";

  // ── Elements ────────────────────────────────────────────────────────────────
  var dashboardEl  = document.getElementById("dashboard");
  var errorBanner  = document.getElementById("error-banner");
  var loadingEl    = document.getElementById("loading");
  var tableEl      = document.getElementById("session-table");
  var tbodyEl      = document.getElementById("session-body");
  var emptyEl      = document.getElementById("empty-state");
  var countEl      = document.getElementById("session-count");
  var refreshBadge = document.getElementById("refresh-badge");
  var saveBtn      = document.getElementById("save-config");
  var logoutLink   = document.getElementById("logout-link");
  var apiInput     = document.getElementById("api-url");

  var apiUrl = null;

  // ── Config ──────────────────────────────────────────────────────────────────
  function loadConfig() {
    var url = localStorage.getItem(LS_KEY_API);
    if (url) {
      apiUrl = url.replace(/\/+$/, "");
      return true;
    }
    return false;
  }

  function saveConfig(url) {
    localStorage.setItem(LS_KEY_API, url);
    apiUrl = url.replace(/\/+$/, "");
  }

  function clearConfig() {
    localStorage.removeItem(LS_KEY_API);
    apiUrl = null;
  }

  // ── Setup flow ──────────────────────────────────────────────────────────────
  if (loadConfig()) {
    showDashboard();
  }

  saveBtn.addEventListener("click", function () {
    var url = apiInput.value.trim();
    if (!url) return;
    saveConfig(url);
    showDashboard();
  });

  logoutLink.addEventListener("click", function (e) {
    e.preventDefault();
    clearConfig();
    BoothAuth.logout();
  });

  // ── Dashboard ───────────────────────────────────────────────────────────────
  var sessions = [];
  var sortCol = "date";
  var sortAsc = false;
  var expandedId = null;
  var refreshTimer = null;
  var countdown = 0;
  var countdownTimer = null;
  var activeTagFilter = null;
  var compareMode = false;
  var compareSelected = [];

  // ── Compare mode elements ──────────────────────────────────────────────
  var compareModeBtn = document.getElementById("compare-mode-btn");
  var compareBar = document.getElementById("compare-bar");
  var compareStatus = document.getElementById("compare-status");
  var compareGoBtn = document.getElementById("compare-go-btn");
  var compareCancelBtn = document.getElementById("compare-cancel-btn");

  compareModeBtn.addEventListener("click", function () {
    compareMode = true;
    compareSelected = [];
    compareBar.classList.remove("hidden");
    compareModeBtn.style.display = "none";
    updateCompareUI();
    renderTable();
  });

  compareCancelBtn.addEventListener("click", function () {
    compareMode = false;
    compareSelected = [];
    compareBar.classList.add("hidden");
    compareModeBtn.style.display = "";
    renderTable();
  });

  compareGoBtn.addEventListener("click", function () {
    if (compareSelected.length === 2) {
      window.location.href = "compare.html?a=" + encodeURIComponent(compareSelected[0]) +
        "&b=" + encodeURIComponent(compareSelected[1]);
    }
  });

  function updateCompareUI() {
    if (compareSelected.length === 0) {
      compareStatus.innerHTML = "Select 2 sessions to compare";
    } else if (compareSelected.length === 1) {
      compareStatus.innerHTML = 'Selected: <span class="sel-id">' + esc(compareSelected[0]) + '</span> -- pick one more';
    } else {
      compareStatus.innerHTML = 'Comparing: <span class="sel-id">' + esc(compareSelected[0]) +
        '</span> vs <span class="sel-id">' + esc(compareSelected[1]) + '</span>';
    }
    compareGoBtn.disabled = (compareSelected.length !== 2);
  }

  function toggleCompareSelect(sid) {
    var idx = compareSelected.indexOf(sid);
    if (idx !== -1) {
      compareSelected.splice(idx, 1);
    } else if (compareSelected.length < 2) {
      compareSelected.push(sid);
    }
    updateCompareUI();
    renderTable();
  }

  // ── Tag colors (deterministic hash) ──────────────────────────────────────
  var TAG_COLORS = [
    { bg: "#58a6ff33", fg: "#58a6ff" },
    { bg: "#3fb95033", fg: "#3fb950" },
    { bg: "#d2992233", fg: "#d29922" },
    { bg: "#f8514933", fg: "#f85149" },
    { bg: "#bc8cff33", fg: "#bc8cff" },
    { bg: "#f778ba33", fg: "#f778ba" },
    { bg: "#79c0ff33", fg: "#79c0ff" },
    { bg: "#56d36433", fg: "#56d364" },
  ];

  function tagColor(tag) {
    var hash = 0;
    for (var i = 0; i < tag.length; i++) {
      hash = ((hash << 5) - hash) + tag.charCodeAt(i);
      hash = hash & hash;
    }
    return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
  }

  function renderTagPill(tag, sessionId) {
    var c = tagColor(tag);
    var removeHtml = sessionId
      ? ' <span class="tag-remove" data-tag="' + esc(tag) + '" data-sid="' + esc(sessionId) + '">x</span>'
      : '';
    return '<span class="tag-pill" style="background:' + c.bg + ';color:' + c.fg + '">' +
      esc(tag) + removeHtml + '</span>';
  }

  // ── Tag filter elements ──────────────────────────────────────────────────
  var tagFilterBar = document.getElementById("tag-filter-bar");
  var tagFilterPills = document.getElementById("tag-filter-pills");
  var clearTagFilter = document.getElementById("clear-tag-filter");

  clearTagFilter.addEventListener("click", function () {
    activeTagFilter = null;
    renderTable();
  });

  // Auto-start dashboard (auth gate already passed)
  loadSessions();
  refreshTimer = setInterval(loadSessions, REFRESH_MS);
  startCountdown();

  function startCountdown() {
    countdown = Math.floor(REFRESH_MS / 1000);
    refreshBadge.textContent = countdown + "s";
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(function () {
      countdown = Math.max(0, countdown - 1);
      refreshBadge.textContent = countdown + "s";
    }, 1000);
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = "block";
  }
  function clearError() {
    errorBanner.style.display = "none";
  }

  // ── API: list sessions ────────────────────────────────────────────────────
  function loadSessions() {
    startCountdown();
    fetch(apiUrl + "/sessions?include=analysis")
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (data) {
        clearError();
        if (!Array.isArray(data) || data.length === 0) {
          loadingEl.classList.add("hidden");
          tableEl.classList.add("hidden");
          emptyEl.classList.remove("hidden");
          countEl.textContent = "0 sessions";
          return;
        }
        sessions = data.map(function (s) { return buildSessionRow(s); });
        renderTable();
      })
      .catch(function (err) {
        showError("API error: " + err.message);
        loadingEl.classList.add("hidden");
      });
  }

  // ── Build row data ──────────────────────────────────────────────────────────
  function buildSessionRow(s) {
    var score = computeScore(s);
    return {
      id: s.session_id,
      name: s.visitor_name || "Unknown",
      date: s.started_at || s.created_at || "",
      status: s.status || "unknown",
      score: score,
      se: s.se_name || "",
      duration: computeDuration(s),
      clicks: (s.click_count != null) ? s.click_count : "--",
      company: s.visitor_company || "",
      endedAt: s.ended_at || "",
      hasAnalysis: s.has_analysis || false,
      tags: Array.isArray(s.tags) ? s.tags : [],
      sessionScore: s.session_score != null ? Number(s.session_score) : null,
      productsCount: s.products_count || 0,
      followUpCount: s.follow_up_count || 0
    };
  }

  // ── Quality badge computation ──────────────────────────────────────────
  function computeQualityBadge(row) {
    if (row.sessionScore == null) return null;
    var sc = row.sessionScore;
    var pc = row.productsCount;
    var fc = row.followUpCount;
    if (sc >= 8 && pc >= 5 && fc >= 5) return "gold";
    if (sc >= 6 && pc >= 3) return "silver";
    if (sc >= 4) return "bronze";
    return null;
  }

  function renderQualityBadge(tier) {
    if (!tier) return '';
    var labels = { gold: "GOLD", silver: "SILVER", bronze: "BRONZE" };
    return '<span class="quality-badge quality-badge-' + tier + '">' + labels[tier] + '</span>';
  }

  function computeScore(s) {
    var clicks = s.click_count || 0;
    var dur = 0;
    if (s.started_at) {
      var end = s.ended_at ? new Date(s.ended_at).getTime() : Date.now();
      dur = Math.max(0, (end - new Date(s.started_at).getTime()) / 60000);
    }
    var raw = Math.sqrt(clicks * dur) * 5;
    return Math.min(100, Math.round(raw));
  }

  function computeDuration(s) {
    if (!s.started_at) return "--";
    var start = new Date(s.started_at).getTime();
    var end = s.ended_at ? new Date(s.ended_at).getTime() : Date.now();
    var sec = Math.max(0, Math.floor((end - start) / 1000));
    var m = Math.floor(sec / 60);
    var ss = sec % 60;
    return (m < 10 ? "0" : "") + m + ":" + (ss < 10 ? "0" : "") + ss;
  }

  // ── Sorting ─────────────────────────────────────────────────────────────────
  document.querySelectorAll("thead th").forEach(function (th) {
    th.addEventListener("click", function () {
      var col = th.getAttribute("data-col");
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      renderTable();
    });
  });

  function sortSessions(list) {
    var copy = list.slice();
    copy.sort(function (a, b) {
      var va, vb;
      switch (sortCol) {
        case "id":    va = a.id;    vb = b.id;    break;
        case "name":  va = a.name;  vb = b.name;  break;
        case "date":  va = a.date;  vb = b.date;  break;
        case "status":va = a.status;vb = b.status;break;
        case "score": va = a.score; vb = b.score; break;
        default:      va = a.date;  vb = b.date;
      }
      if (typeof va === "number") return sortAsc ? va - vb : vb - va;
      va = (va || "").toString().toLowerCase();
      vb = (vb || "").toString().toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
    return copy;
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function esc(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function badgeClass(status) {
    if (status === "recording" || status === "active") return "badge-active";
    if (status === "completed" || status === "ended" || status === "analyzed" || status === "reviewed" || status === "sent") return "badge-completed";
    if (status === "processing") return "badge-processing";
    if (status === "waiting") return "badge-waiting";
    return "badge-unknown";
  }

  function scoreColor(s) {
    if (s >= 60) return "high";
    if (s >= 25) return "mid";
    return "low";
  }

  function formatDate(iso) {
    if (!iso) return "--";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "--";
    var mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return mon[d.getMonth()] + " " + d.getDate() + ", " +
      (d.getHours() < 10 ? "0" : "") + d.getHours() + ":" +
      (d.getMinutes() < 10 ? "0" : "") + d.getMinutes();
  }

  function renderTable() {
    var sorted = sortSessions(sessions);

    // Build tag filter bar from all unique tags
    var allTags = {};
    sessions.forEach(function (s) {
      (s.tags || []).forEach(function (t) { allTags[t] = (allTags[t] || 0) + 1; });
    });
    var tagKeys = Object.keys(allTags).sort();
    if (tagKeys.length > 0) {
      tagFilterBar.classList.remove("hidden");
      tagFilterPills.innerHTML = tagKeys.map(function (t) {
        var c = tagColor(t);
        var active = (activeTagFilter === t) ? " active" : "";
        return '<span class="tag-pill' + active + '" data-filter-tag="' + esc(t) +
          '" style="background:' + c.bg + ';color:' + c.fg + '">' + esc(t) +
          ' <span style="opacity:0.6;font-size:0.65rem">(' + allTags[t] + ')</span></span>';
      }).join(" ");
      // Bind click on filter pills
      tagFilterPills.querySelectorAll(".tag-pill").forEach(function (el) {
        el.addEventListener("click", function () {
          var t = el.getAttribute("data-filter-tag");
          activeTagFilter = (activeTagFilter === t) ? null : t;
          renderTable();
        });
      });
      if (activeTagFilter) {
        clearTagFilter.classList.remove("hidden");
      } else {
        clearTagFilter.classList.add("hidden");
      }
    } else {
      tagFilterBar.classList.add("hidden");
    }

    // Apply tag filter
    if (activeTagFilter) {
      sorted = sorted.filter(function (s) {
        return (s.tags || []).indexOf(activeTagFilter) !== -1;
      });
    }

    loadingEl.classList.add("hidden");
    emptyEl.classList.add("hidden");
    tableEl.classList.remove("hidden");
    countEl.textContent = sorted.length + " session" + (sorted.length !== 1 ? "s" : "");

    // Update sort arrows
    document.querySelectorAll("thead th").forEach(function (th) {
      var arrow = th.querySelector(".sort-arrow");
      if (!arrow) return;
      if (th.getAttribute("data-col") === sortCol) {
        arrow.textContent = sortAsc ? " ^" : " v";
      } else {
        arrow.textContent = "";
      }
    });

    // Show/hide compare column
    document.querySelectorAll(".compare-col").forEach(function (el) {
      if (compareMode) el.classList.remove("hidden");
      else el.classList.add("hidden");
    });

    tbodyEl.innerHTML = "";
    sorted.forEach(function (s) {
      // Main row
      var tr = document.createElement("tr");
      tr.setAttribute("data-sid", s.id);
      if (s.id === expandedId) tr.classList.add("expanded");
      if (compareMode && compareSelected.indexOf(s.id) !== -1) tr.classList.add("compare-selected");

      var tagsHtml = (s.tags || []).map(function (t) { return renderTagPill(t, s.id); }).join(" ");
      tagsHtml += ' <span class="tag-add-btn" data-sid="' + esc(s.id) + '">+ tag</span>';

      var checkboxTd = compareMode
        ? '<td class="compare-col"><input type="checkbox" class="compare-check" data-sid="' + esc(s.id) + '"' +
          (compareSelected.indexOf(s.id) !== -1 ? ' checked' : '') +
          (compareSelected.length >= 2 && compareSelected.indexOf(s.id) === -1 ? ' disabled' : '') +
          '></td>'
        : '';

      tr.innerHTML =
        checkboxTd +
        '<td class="session-id-cell">' + esc(s.id) + '</td>' +
        '<td>' + esc(s.name) + '</td>' +
        '<td>' + esc(formatDate(s.date)) + '</td>' +
        '<td><span class="badge ' + badgeClass(s.status) + '">' + esc(s.status) + '</span></td>' +
        '<td style="white-space:normal;max-width:250px">' + tagsHtml + '</td>' +
        '<td>' +
          '<div class="score-bar">' +
            '<div class="score-track"><div class="score-fill ' + scoreColor(s.score) + '" style="width:' + s.score + '%"></div></div>' +
            '<span class="score-label">' + s.score + '</span>' +
          '</div>' +
        '</td>' +
        '<td>' + renderQualityBadge(computeQualityBadge(s)) + '</td>';

      // Bind tag remove buttons
      tr.querySelectorAll(".tag-remove").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          removeTag(btn.getAttribute("data-sid"), btn.getAttribute("data-tag"));
        });
      });

      // Bind tag add button
      var addBtn = tr.querySelector(".tag-add-btn");
      if (addBtn) {
        addBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          showTagInput(addBtn);
        });
      }

      // Bind compare checkboxes
      var chk = tr.querySelector(".compare-check");
      if (chk) {
        chk.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleCompareSelect(chk.getAttribute("data-sid"));
        });
      }

      tr.addEventListener("click", function () {
        if (compareMode) {
          toggleCompareSelect(s.id);
          return;
        }
        toggleExpand(s.id);
      });
      tbodyEl.appendChild(tr);

      // Detail row (expanded)
      if (s.id === expandedId) {
        var detailTr = document.createElement("tr");
        detailTr.classList.add("detail-row");
        var detailTd = document.createElement("td");
        detailTd.setAttribute("colspan", compareMode ? "8" : "7");
        detailTd.innerHTML =
          '<div class="detail-panel">' +
            '<div class="detail-item"><label>SE</label><span>' + esc(s.se || "--") + '</span></div>' +
            '<div class="detail-item"><label>Company</label><span>' + esc(s.company || "--") + '</span></div>' +
            '<div class="detail-item"><label>Duration</label><span class="mono">' + esc(s.duration) + '</span></div>' +
            '<div class="detail-item"><label>Clicks</label><span class="mono">' + esc(String(s.clicks)) + '</span></div>' +
            '<div class="detail-item"><label>Started</label><span class="mono">' + esc(formatDate(s.date)) + '</span></div>' +
            '<div class="detail-item"><label>Ended</label><span class="mono">' + esc(formatDate(s.endedAt)) + '</span></div>' +
            '<div class="detail-item"><label>Analysis</label><span>' + (s.hasAnalysis ? '<span class="badge badge-completed">ready</span>' : '<span class="badge badge-waiting">pending</span>') + '</span></div>' +
            '<div class="detail-actions">' +
              '<a href="session.html?session=' + encodeURIComponent(s.id) + '">Live View</a>' +
              '<a href="session-viewer.html?session=' + encodeURIComponent(s.id) + '">Session Data</a>' +
              '<a href="replay.html?session=' + encodeURIComponent(s.id) + '">Replay</a>' +
              '<a href="processing-dashboard.html?session=' + encodeURIComponent(s.id) + '">Pipeline</a>' +
            '</div>' +
          '</div>';
        detailTr.appendChild(detailTd);
        tbodyEl.appendChild(detailTr);
      }
    });
  }

  // ── Tag add/remove ──────────────────────────────────────────────────────
  function showTagInput(addBtn) {
    var sid = addBtn.getAttribute("data-sid");
    var wrap = document.createElement("span");
    wrap.className = "tag-input-wrap";
    var input = document.createElement("input");
    input.type = "text";
    input.placeholder = "new tag...";
    input.maxLength = 50;
    wrap.appendChild(input);
    addBtn.replaceWith(wrap);
    input.focus();

    function submit() {
      var val = input.value.trim().toLowerCase();
      if (val) addTag(sid, val);
      else wrap.replaceWith(addBtn);
    }
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); submit(); }
      if (e.key === "Escape") { wrap.replaceWith(addBtn); }
    });
    input.addEventListener("blur", submit);
  }

  function addTag(sessionId, tag) {
    fetch(apiUrl + "/sessions/" + encodeURIComponent(sessionId) + "/tags", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tag: tag })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.tags) {
        updateLocalTags(sessionId, data.tags);
        renderTable();
      }
    })
    .catch(function (err) { showError("Failed to add tag: " + err.message); });
  }

  function removeTag(sessionId, tag) {
    fetch(apiUrl + "/sessions/" + encodeURIComponent(sessionId) + "/tags/" + encodeURIComponent(tag), {
      method: "DELETE"
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.tags) {
        updateLocalTags(sessionId, data.tags);
        renderTable();
      }
    })
    .catch(function (err) { showError("Failed to remove tag: " + err.message); });
  }

  function updateLocalTags(sessionId, tags) {
    sessions.forEach(function (s) {
      if (s.id === sessionId) s.tags = tags;
    });
  }

  function toggleExpand(sid) {
    expandedId = (expandedId === sid) ? null : sid;
    renderTable();
  }

})();
</script>
<script src="lib/shortcuts.js"></script>
</body>
</html>
