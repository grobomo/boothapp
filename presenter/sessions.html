<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Sessions</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
        }

        [data-theme="light"] {
            --bg:        #F5F6FA;
            --surface:   #FFFFFF;
            --surface2:  #EEF0F4;
            --border:    #D8DCE5;
            --text:      #1A1D26;
            --text-dim:  #5A6170;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { color: var(--text); }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-bar .count { color: var(--text); font-weight: 600; }

        #error-msg {
            display: none;
            background: rgba(215, 25, 32, 0.15);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #FF6B6B;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        thead th {
            background: var(--surface2);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        .session-id {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-complete { background: rgba(0,230,118,0.15); color: var(--success); }
        .badge-active   { background: rgba(68,138,255,0.15); color: #448AFF; }
        .badge-pending  { background: rgba(255,171,0,0.15);  color: var(--amber); }
        .badge-unknown  { background: rgba(107,115,133,0.15); color: var(--text-dim); }

        .analysis-yes { color: var(--success); }
        .analysis-no  { color: var(--text-dim); }

        .summary-link {
            color: var(--red);
            text-decoration: none;
            font-weight: 500;
        }
        .summary-link:hover { text-decoration: underline; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        /* Light Mode Overrides */
        [data-theme="light"] .header h1 {
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        [data-theme="light"] .toast-body strong { color: #1A1D26; }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, border-color .2s, transform .2s;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        .theme-toggle:hover {
            transform: scale(1.08);
            border-color: var(--red);
        }
        .theme-toggle svg { width: 22px; height: 22px; fill: currentColor; }
        .theme-toggle .icon-sun  { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun  { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }
    </style>
</head>
<body>
    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
    </button>
    <script>
    (function(){
        var key = 'boothapp-theme';
        var saved = localStorage.getItem(key) || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeToggle').addEventListener('click', function(){
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem(key, next);
        });
    })();
    </script>

    <div class="header">
        <h1>Sessions</h1>
        <a href="/demo.html">&larr; Back to Dashboard</a>
    </div>

    <div class="status-bar">
        <span>Total: <span class="count" id="total-count">--</span></span>
        <span>With Analysis: <span class="count" id="analysis-count">--</span></span>
    </div>

    <div id="error-msg"></div>

    <table>
        <thead>
            <tr>
                <th>Session ID</th>
                <th>Visitor</th>
                <th>Status</th>
                <th>Created</th>
                <th>Analysis</th>
                <th>Summary</th>
            </tr>
        </thead>
        <tbody id="sessions-body">
            <tr><td colspan="6" class="loading">Loading sessions...</td></tr>
        </tbody>
    </table>

    <script>
        function statusBadge(status) {
            var cls = 'badge-unknown';
            if (status === 'complete') cls = 'badge-complete';
            else if (status === 'active') cls = 'badge-active';
            else if (status === 'pending') cls = 'badge-pending';
            return '<span class="badge ' + cls + '">' + escHtml(status) + '</span>';
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '--';
            var d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        async function loadSessions() {
            try {
                var resp = await fetch('/api/sessions');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var sessions = data.sessions || [];

                document.getElementById('total-count').textContent = sessions.length;
                document.getElementById('analysis-count').textContent =
                    sessions.filter(function(s) { return s.has_analysis; }).length;

                var tbody = document.getElementById('sessions-body');

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">No sessions found</td></tr>';
                    return;
                }

                tbody.innerHTML = sessions.map(function(s) {
                    var analysisCell = s.has_analysis
                        ? '<span class="analysis-yes">Yes</span>'
                        : '<span class="analysis-no">No</span>';
                    var summaryCell = s.summary_link
                        ? '<a class="summary-link" href="' + escHtml(s.summary_link) + '">View</a>'
                        : '--';
                    return '<tr>' +
                        '<td class="session-id">' + escHtml(s.session_id) + '</td>' +
                        '<td>' + (escHtml(s.visitor_name) || '<span style="color:var(--text-dim)">--</span>') + '</td>' +
                        '<td>' + statusBadge(s.status || 'unknown') + '</td>' +
                        '<td>' + formatDate(s.created_at) + '</td>' +
                        '<td>' + analysisCell + '</td>' +
                        '<td>' + summaryCell + '</td>' +
                        '</tr>';
                }).join('');
            } catch (err) {
                var errEl = document.getElementById('error-msg');
                errEl.style.display = 'block';
                errEl.textContent = 'Failed to load sessions: ' + err.message;
                document.getElementById('sessions-body').innerHTML =
                    '<tr><td colspan="6" class="empty">Could not load sessions</td></tr>';
            }
        }

        loadSessions();
        // Auto-refresh every 30 seconds
        setInterval(loadSessions, 30000);
    </script>
</body>
</html>
