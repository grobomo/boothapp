<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Sessions</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { color: var(--text); }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-bar .count { color: var(--text); font-weight: 600; }

        #error-msg {
            display: none;
            background: rgba(215, 25, 32, 0.15);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #FF6B6B;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        thead th {
            background: var(--surface2);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }
        tbody tr { cursor: pointer; }
        tbody tr.selected { background: var(--surface2); border-left: 3px solid var(--red); }

        .session-id {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-complete { background: rgba(0,230,118,0.15); color: var(--success); }
        .badge-active   { background: rgba(68,138,255,0.15); color: #448AFF; }
        .badge-pending  { background: rgba(255,171,0,0.15);  color: var(--amber); }
        .badge-unknown  { background: rgba(107,115,133,0.15); color: var(--text-dim); }

        .analysis-yes { color: var(--success); }
        .analysis-no  { color: var(--text-dim); }

        .summary-link {
            color: var(--red);
            text-decoration: none;
            font-weight: 500;
        }
        .summary-link:hover { text-decoration: underline; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        /* ============================================================
           SESSION DETAIL PANEL
           ============================================================ */
        #session-detail {
            display: none;
            margin-top: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        #session-detail .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        #session-detail .detail-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #session-detail .detail-close {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        #session-detail .detail-close:hover { color: var(--text); border-color: var(--text-dim); }

        .detail-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            flex-wrap: wrap;
        }
        .detail-meta span strong { color: var(--text); }

        /* ============================================================
           SCREENSHOT GALLERY
           ============================================================ */
        .gallery-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .gallery-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
        }
        .gallery-card:hover {
            border-color: var(--red);
            transform: translateY(-2px);
        }

        .gallery-card .thumb-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gallery-card .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .gallery-card .thumb-wrap img.loaded { opacity: 1; }

        .gallery-card .thumb-wrap .placeholder {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .gallery-card .card-info {
            padding: 0.5rem 0.75rem;
        }

        .gallery-card .card-info .click-num {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--red);
        }

        .gallery-card .card-info .click-time {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.15rem;
        }

        .gallery-card .card-info .click-element {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .gallery-empty {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* ============================================================
           LIGHTBOX
           ============================================================ */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox.open { display: flex; }

        .lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            z-index: 20001;
        }
        .lightbox-close:hover { opacity: 1; }

        .lightbox-img-wrap {
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img-wrap img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.5);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        .lightbox-caption {
            color: #ccc;
            font-size: 0.85rem;
            margin-top: 1rem;
            text-align: center;
        }
        .lightbox-caption strong { color: #fff; }

        .lightbox-counter {
            color: #888;
            font-size: 0.75rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sessions</h1>
        <a href="/demo.html">&larr; Back to Dashboard</a>
    </div>

    <div class="status-bar">
        <span>Total: <span class="count" id="total-count">--</span></span>
        <span>With Analysis: <span class="count" id="analysis-count">--</span></span>
    </div>

    <div id="error-msg"></div>

    <table>
        <thead>
            <tr>
                <th>Session ID</th>
                <th>Visitor</th>
                <th>Status</th>
                <th>Created</th>
                <th>Analysis</th>
                <th>Summary</th>
            </tr>
        </thead>
        <tbody id="sessions-body">
            <tr><td colspan="6" class="loading">Loading sessions...</td></tr>
        </tbody>
    </table>

    <!-- Session Detail Panel (screenshot gallery) -->
    <div id="session-detail">
        <div class="detail-header">
            <h2 id="detail-title">Session</h2>
            <button class="detail-close" onclick="closeDetail()">Close</button>
        </div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="gallery-title">Screenshots</div>
        <div id="gallery-container">
            <div class="gallery-empty">Loading screenshots...</div>
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
        <div class="lightbox-img-wrap">
            <img id="lightbox-img" src="" alt="Screenshot">
        </div>
        <div class="lightbox-caption" id="lightbox-caption"></div>
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <script>
        // -- State --
        var currentScreenshots = [];
        var lightboxIndex = 0;
        var selectedSessionId = null;
        var sessionsCache = [];

        function statusBadge(status) {
            var cls = 'badge-unknown';
            if (status === 'complete') cls = 'badge-complete';
            else if (status === 'active') cls = 'badge-active';
            else if (status === 'pending') cls = 'badge-pending';
            return '<span class="badge ' + cls + '">' + escHtml(status) + '</span>';
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '--';
            var d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        function formatTime(iso) {
            if (!iso) return '--';
            var d = new Date(iso);
            return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        // -- Sessions Table --
        async function loadSessions() {
            try {
                var resp = await fetch('/api/sessions');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var sessions = data.sessions || [];
                sessionsCache = sessions;

                document.getElementById('total-count').textContent = sessions.length;
                document.getElementById('analysis-count').textContent =
                    sessions.filter(function(s) { return s.has_analysis; }).length;

                var tbody = document.getElementById('sessions-body');

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">No sessions found</td></tr>';
                    return;
                }

                tbody.innerHTML = sessions.map(function(s) {
                    var analysisCell = s.has_analysis
                        ? '<span class="analysis-yes">Yes</span>'
                        : '<span class="analysis-no">No</span>';
                    var summaryCell = s.summary_link
                        ? '<a class="summary-link" href="' + escHtml(s.summary_link) + '" onclick="event.stopPropagation()">View</a>'
                        : '--';
                    var sel = s.session_id === selectedSessionId ? ' class="selected"' : '';
                    return '<tr' + sel + ' onclick="selectSession(\'' + escHtml(s.session_id) + '\')">' +
                        '<td class="session-id">' + escHtml(s.session_id) + '</td>' +
                        '<td>' + (escHtml(s.visitor_name) || '<span style="color:var(--text-dim)">--</span>') + '</td>' +
                        '<td>' + statusBadge(s.status || 'unknown') + '</td>' +
                        '<td>' + formatDate(s.created_at) + '</td>' +
                        '<td>' + analysisCell + '</td>' +
                        '<td>' + summaryCell + '</td>' +
                        '</tr>';
                }).join('');
            } catch (err) {
                var errEl = document.getElementById('error-msg');
                errEl.style.display = 'block';
                errEl.textContent = 'Failed to load sessions: ' + err.message;
                document.getElementById('sessions-body').innerHTML =
                    '<tr><td colspan="6" class="empty">Could not load sessions</td></tr>';
            }
        }

        // -- Session Detail / Gallery --
        function selectSession(sessionId) {
            if (selectedSessionId === sessionId) {
                closeDetail();
                return;
            }
            selectedSessionId = sessionId;

            // Highlight selected row
            var rows = document.querySelectorAll('#sessions-body tr');
            rows.forEach(function(r) { r.classList.remove('selected'); });
            var clicked = document.querySelector('#sessions-body tr[onclick*="' + sessionId + '"]');
            if (clicked) clicked.classList.add('selected');

            // Find session metadata
            var session = sessionsCache.find(function(s) { return s.session_id === sessionId; }) || {};

            var detail = document.getElementById('session-detail');
            detail.style.display = 'block';
            document.getElementById('detail-title').textContent = 'Session: ' + sessionId;

            var meta = '';
            if (session.visitor_name) meta += '<span><strong>Visitor:</strong> ' + escHtml(session.visitor_name) + '</span>';
            if (session.status) meta += '<span><strong>Status:</strong> ' + escHtml(session.status) + '</span>';
            if (session.created_at) meta += '<span><strong>Created:</strong> ' + formatDate(session.created_at) + '</span>';
            if (session.summary_link) meta += '<span><a class="summary-link" href="' + escHtml(session.summary_link) + '">View Analysis</a></span>';
            document.getElementById('detail-meta').innerHTML = meta;

            loadScreenshots(sessionId);

            detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeDetail() {
            selectedSessionId = null;
            document.getElementById('session-detail').style.display = 'none';
            var rows = document.querySelectorAll('#sessions-body tr');
            rows.forEach(function(r) { r.classList.remove('selected'); });
        }

        async function loadScreenshots(sessionId) {
            var container = document.getElementById('gallery-container');
            container.innerHTML = '<div class="gallery-empty">Loading screenshots...</div>';
            currentScreenshots = [];

            try {
                var resp = await fetch('/api/sessions/' + encodeURIComponent(sessionId) + '/screenshots');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var shots = data.screenshots || [];
                currentScreenshots = shots;

                if (shots.length === 0) {
                    container.innerHTML = '<div class="gallery-empty">No screenshots captured for this session</div>';
                    return;
                }

                container.innerHTML = '<div class="gallery-grid">' + shots.map(function(s, idx) {
                    return '<div class="gallery-card" onclick="openLightbox(' + idx + ')">' +
                        '<div class="thumb-wrap">' +
                            '<span class="placeholder">Loading...</span>' +
                            '<img data-src="' + escHtml(s.url) + '" alt="Click ' + s.click_number + '" loading="lazy">' +
                        '</div>' +
                        '<div class="card-info">' +
                            '<div class="click-num">Click #' + s.click_number + '</div>' +
                            '<div class="click-time">' + formatTime(s.timestamp) + '</div>' +
                            (s.element ? '<div class="click-element" title="' + escHtml(s.element) + '">' + escHtml(s.element) + '</div>' : '') +
                        '</div>' +
                    '</div>';
                }).join('') + '</div>';

                lazyLoadImages();
            } catch (err) {
                container.innerHTML = '<div class="gallery-empty">Failed to load screenshots: ' + escHtml(err.message) + '</div>';
            }
        }

        // -- Lazy Loading --
        function lazyLoadImages() {
            var images = document.querySelectorAll('.gallery-card img[data-src]');
            if ('IntersectionObserver' in window) {
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            var img = entry.target;
                            img.src = img.getAttribute('data-src');
                            img.removeAttribute('data-src');
                            img.onload = function() { img.classList.add('loaded'); };
                            img.onerror = function() {
                                img.style.display = 'none';
                                img.parentElement.querySelector('.placeholder').textContent = 'Failed';
                            };
                            observer.unobserve(img);
                        }
                    });
                }, { rootMargin: '200px' });

                images.forEach(function(img) { observer.observe(img); });
            } else {
                // Fallback: load all immediately
                images.forEach(function(img) {
                    img.src = img.getAttribute('data-src');
                    img.removeAttribute('data-src');
                    img.onload = function() { img.classList.add('loaded'); };
                });
            }
        }

        // -- Lightbox --
        function openLightbox(idx) {
            if (!currentScreenshots.length) return;
            lightboxIndex = idx;
            renderLightbox();
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        function lightboxNav(dir) {
            lightboxIndex = (lightboxIndex + dir + currentScreenshots.length) % currentScreenshots.length;
            renderLightbox();
        }

        function renderLightbox() {
            var s = currentScreenshots[lightboxIndex];
            if (!s) return;
            document.getElementById('lightbox-img').src = s.url;
            var caption = '<strong>Click #' + s.click_number + '</strong>';
            if (s.timestamp) caption += ' &mdash; ' + formatTime(s.timestamp);
            if (s.element) caption += '<br>' + escHtml(s.element);
            document.getElementById('lightbox-caption').innerHTML = caption;
            document.getElementById('lightbox-counter').textContent =
                (lightboxIndex + 1) + ' / ' + currentScreenshots.length;
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            var lb = document.getElementById('lightbox');
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            else if (e.key === 'ArrowLeft') lightboxNav(-1);
            else if (e.key === 'ArrowRight') lightboxNav(1);
        });

        // Close lightbox on backdrop click
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        loadSessions();
        setInterval(loadSessions, 30000);
    </script>
</body>
</html>
