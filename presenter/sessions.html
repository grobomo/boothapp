<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Sessions</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-dark:  #A8131A;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--red), #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { color: var(--text); }

        .status-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-bar .count { color: var(--text); font-weight: 600; }

        #error-msg {
            display: none;
            background: rgba(215, 25, 32, 0.15);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #FF6B6B;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        thead th {
            background: var(--surface2);
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        .session-id {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-complete { background: rgba(0,230,118,0.15); color: var(--success); }
        .badge-active   { background: rgba(68,138,255,0.15); color: #448AFF; }
        .badge-pending  { background: rgba(255,171,0,0.15);  color: var(--amber); }
        .badge-unknown  { background: rgba(107,115,133,0.15); color: var(--text-dim); }

        .analysis-yes { color: var(--success); }
        .analysis-no  { color: var(--text-dim); }

        .summary-link {
            color: var(--red);
            text-decoration: none;
            font-weight: 500;
        }
        .summary-link:hover { text-decoration: underline; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        /* i18n switcher */
        .lang-bar { position: absolute; top: 2rem; right: 2rem; z-index: 10; }
        .i18n-switcher { position: relative; display: inline-block; }
        .i18n-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background .2s;
        }
        .i18n-btn:hover { background: var(--border); }
        .i18n-flag { font-weight: 800; letter-spacing: 1px; }
        .i18n-menu {
            position: absolute; top: 100%; right: 0; margin-top: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; min-width: 140px;
            z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.4);
        }
        .i18n-menu-item {
            padding: 10px 16px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: background .15s;
        }
        .i18n-menu-item:hover { background: var(--surface2); }
    </style>
</head>
<body style="position:relative;">
    <div class="lang-bar" id="langSwitcher"></div>

    <div class="header">
        <h1 data-i18n="sessions.title">Sessions</h1>
        <a href="/demo.html" data-i18n="sessions.backToDashboard">&larr; Back to Dashboard</a>
    </div>

    <div class="status-bar">
        <span><span data-i18n="sessions.total">Total</span>: <span class="count" id="total-count">--</span></span>
        <span><span data-i18n="sessions.withAnalysis">With Analysis</span>: <span class="count" id="analysis-count">--</span></span>
    </div>

    <div id="error-msg"></div>

    <table>
        <thead>
            <tr>
                <th data-i18n="table.sessionId">Session ID</th>
                <th data-i18n="table.visitor">Visitor</th>
                <th data-i18n="table.status">Status</th>
                <th data-i18n="table.created">Created</th>
                <th data-i18n="table.analysis">Analysis</th>
                <th data-i18n="table.summary">Summary</th>
            </tr>
        </thead>
        <tbody id="sessions-body">
            <tr><td colspan="6" class="loading" data-i18n="sessions.loading">Loading sessions...</td></tr>
        </tbody>
    </table>

    <script src="../infra/i18n/translations.js"></script>
    <script>
    i18n.register('en', {"app.title":"BoothApp","app.tagline":"AI-Powered Trade Show Demo Capture","app.live":"Live","app.footer":"Powered by Trend Micro Vision One","nav.dashboard":"Dashboard","nav.sessions":"Sessions","nav.language":"Language","card.activeSessions":"Active Sessions","card.totalDemos":"Total Demos","card.reportsGenerated":"Reports Generated","feed.title":"Live Activity Feed","feed.refreshing":"Refreshing in {n}s","sessions.title":"Sessions","sessions.backToDashboard":"Back to Dashboard","sessions.total":"Total","sessions.withAnalysis":"With Analysis","sessions.loading":"Loading sessions...","sessions.empty":"No sessions found","sessions.loadError":"Could not load sessions","table.sessionId":"Session ID","table.visitor":"Visitor","table.status":"Status","table.created":"Created","table.analysis":"Analysis","table.summary":"Summary","table.viewSummary":"View","status.complete":"complete","status.active":"active","status.pending":"pending","status.unknown":"unknown","analysis.yes":"Yes","analysis.no":"No"});
    i18n.register('ja', {"app.title":"BoothApp","app.tagline":"AI搭載 展示会デモキャプチャ","app.live":"ライブ","app.footer":"Trend Micro Vision One 搭載","nav.dashboard":"ダッシュボード","nav.sessions":"セッション","nav.language":"言語","card.activeSessions":"アクティブセッション","card.totalDemos":"デモ合計","card.reportsGenerated":"レポート生成数","feed.title":"リアルタイム アクティビティ","feed.refreshing":"{n}秒後に更新","sessions.title":"セッション","sessions.backToDashboard":"ダッシュボードに戻る","sessions.total":"合計","sessions.withAnalysis":"分析済み","sessions.loading":"セッションを読み込み中...","sessions.empty":"セッションが見つかりません","sessions.loadError":"セッションの読み込みに失敗しました","table.sessionId":"セッションID","table.visitor":"来場者","table.status":"ステータス","table.created":"作成日時","table.analysis":"分析","table.summary":"概要","table.viewSummary":"表示","status.complete":"完了","status.active":"進行中","status.pending":"待機中","status.unknown":"不明","analysis.yes":"はい","analysis.no":"いいえ"});
    i18n.init();
    i18n.applyAll();
    i18n.createSwitcher('langSwitcher');
    </script>
    <script>
        function statusBadge(status) {
            var cls = 'badge-unknown';
            if (status === 'complete') cls = 'badge-complete';
            else if (status === 'active') cls = 'badge-active';
            else if (status === 'pending') cls = 'badge-pending';
            var statusKey = 'status.' + status;
            return '<span class="badge ' + cls + '">' + escHtml(i18n.t(statusKey)) + '</span>';
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDate(iso) {
            if (!iso) return '--';
            var d = new Date(iso);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }

        async function loadSessions() {
            try {
                var resp = await fetch('/api/sessions');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                var data = await resp.json();
                var sessions = data.sessions || [];

                document.getElementById('total-count').textContent = sessions.length;
                document.getElementById('analysis-count').textContent =
                    sessions.filter(function(s) { return s.has_analysis; }).length;

                var tbody = document.getElementById('sessions-body');

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">' + escHtml(i18n.t('sessions.empty')) + '</td></tr>';
                    return;
                }

                tbody.innerHTML = sessions.map(function(s) {
                    var analysisCell = s.has_analysis
                        ? '<span class="analysis-yes">' + escHtml(i18n.t('analysis.yes')) + '</span>'
                        : '<span class="analysis-no">' + escHtml(i18n.t('analysis.no')) + '</span>';
                    var summaryCell = s.summary_link
                        ? '<a class="summary-link" href="' + escHtml(s.summary_link) + '">' + escHtml(i18n.t('table.viewSummary')) + '</a>'
                        : '--';
                    return '<tr>' +
                        '<td class="session-id">' + escHtml(s.session_id) + '</td>' +
                        '<td>' + (escHtml(s.visitor_name) || '<span style="color:var(--text-dim)">--</span>') + '</td>' +
                        '<td>' + statusBadge(s.status || 'unknown') + '</td>' +
                        '<td>' + formatDate(s.created_at) + '</td>' +
                        '<td>' + analysisCell + '</td>' +
                        '<td>' + summaryCell + '</td>' +
                        '</tr>';
                }).join('');
            } catch (err) {
                var errEl = document.getElementById('error-msg');
                errEl.style.display = 'block';
                errEl.textContent = 'Failed to load sessions: ' + err.message;
                document.getElementById('sessions-body').innerHTML =
                    '<tr><td colspan="6" class="empty">' + escHtml(i18n.t('sessions.loadError')) + '</td></tr>';
            }
        }

        loadSessions();
        // Auto-refresh every 30 seconds
        setInterval(loadSessions, 30000);
    </script>
</body>
</html>
