<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/error-boundary.js"></script>
<script src="components/nav.js"></script>
<title>BoothApp — Session Import & Review</title>
<script src="auth.js"></script>
<link rel="stylesheet" href="styles/mobile.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  h1 { font-size: 1.8rem; font-weight: 600; color: var(--accent); }
  h2 { font-size: 1.3rem; font-weight: 600; color: var(--text); margin-bottom: 0.8rem; }
  h3 { font-size: 1.1rem; font-weight: 600; color: var(--text2); margin-bottom: 0.5rem; }

  .header-controls {
    display: flex; gap: 0.8rem; align-items: center;
  }

  .btn {
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--surface2); border-color: var(--accent); }
  .btn-primary { background: #238636; border-color: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { background: #da3633; border-color: #da3633; color: #fff; }
  .btn-danger:hover { background: #f85149; }
  .btn-warn { background: var(--yellow); border-color: var(--yellow); color: #000; }

  .container { max-width: 1200px; margin: 0 auto; }

  /* -- Tabs -- */
  .tabs {
    display: flex; gap: 0; margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    font-weight: 500;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count {
    display: inline-block;
    background: var(--surface2);
    color: var(--text2);
    font-size: 0.75rem;
    padding: 0.1rem 0.5rem;
    border-radius: 10px;
    margin-left: 0.4rem;
  }

  /* -- Queue table -- */
  .queue-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  .queue-table th {
    text-align: left;
    padding: 0.6rem 0.8rem;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .queue-table td {
    padding: 0.7rem 0.8rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .queue-table tr:hover td { background: var(--surface); }
  .queue-table tr { cursor: pointer; }

  .status-badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .status-pending { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
  .status-approved { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  .status-rejected { background: rgba(248, 81, 73, 0.15); color: var(--red); }
  .status-needs_edit { background: rgba(188, 140, 255, 0.15); color: var(--purple); }

  /* -- Detail panel -- */
  .detail-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 1rem;
  }
  .detail-panel.visible { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .card-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
    margin-bottom: 0.5rem;
  }

  .summary-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
  }

  .score-display {
    font-size: 2.5rem;
    font-weight: 700;
    text-align: center;
    padding: 0.5rem;
  }
  .score-high { color: var(--green); }
  .score-mid { color: var(--yellow); }
  .score-low { color: var(--red); }

  /* -- Timeline -- */
  .timeline {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
  }
  .timeline-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    transition: background 0.1s;
  }
  .timeline-item:hover { background: var(--surface); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-time {
    color: var(--text2);
    font-family: monospace;
    font-size: 0.8rem;
    min-width: 80px;
  }
  .timeline-action { flex: 1; color: var(--text); }
  .timeline-thumb {
    width: 48px; height: 32px;
    border-radius: 4px;
    object-fit: cover;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  /* -- Follow-up actions -- */
  .action-list { list-style: none; }
  .action-list li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .action-list li:last-child { border-bottom: none; }
  .action-priority {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-high { background: var(--red); }
  .priority-medium { background: var(--yellow); }
  .priority-low { background: var(--green); }

  /* -- Approval bar -- */
  .approval-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-top: 1rem;
  }
  .approval-bar textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.5rem 0.8rem;
    font-family: inherit;
    font-size: 0.9rem;
    resize: vertical;
    min-height: 40px;
    max-height: 120px;
  }
  .approval-bar textarea:focus { outline: 2px solid var(--accent); }

  /* -- Empty state -- */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text2);
  }
  .empty-state h3 { color: var(--text2); font-size: 1.2rem; margin-bottom: 0.5rem; }

  /* -- Loading -- */
  .loading { text-align: center; padding: 3rem; color: var(--text2); }

  /* -- Products list -- */
  .products-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .product-tag {
    padding: 0.2rem 0.6rem;
    background: rgba(88, 166, 255, 0.1);
    border: 1px solid rgba(88, 166, 255, 0.2);
    border-radius: 12px;
    font-size: 0.8rem;
    color: var(--accent);
  }

  @media (max-width: 768px) {
    .detail-grid { grid-template-columns: 1fr; }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Session Import & Review</h1>
  <div class="header-controls">
    <span id="queue-count" style="color: var(--text2); font-size: 0.85rem;"></span>
    <button class="btn" onclick="refreshData()">Refresh</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="queue" onclick="switchTab('queue')">
      Review Queue <span class="count" id="tab-queue-count">0</span>
    </div>
    <div class="tab" data-tab="all" onclick="switchTab('all')">
      All Sessions <span class="count" id="tab-all-count">0</span>
    </div>
    <div class="tab" data-tab="approved" onclick="switchTab('approved')">
      Approved <span class="count" id="tab-approved-count">0</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">Loading sessions...</div>
  </div>

  <div id="detail-panel" class="detail-panel">
    <!-- Populated by JS when a session row is clicked -->
  </div>
</div>

<script>
const API = '';
let allSessions = [];
let reviewQueue = [];
let currentTab = 'queue';
let selectedSession = null;

// ── Data Fetch ──────────────────────────────────────────

async function fetchSessions() {
  try {
    const res = await fetch(`${API}/api/sessions?include=analysis`);
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) {
    console.error('Failed to fetch sessions:', e);
    return [];
  }
}

async function fetchReviewQueue() {
  try {
    const res = await fetch(`${API}/api/review/queue`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    return data.queue || [];
  } catch (e) {
    console.error('Failed to fetch review queue:', e);
    return [];
  }
}

async function fetchSessionReview(sessionId) {
  try {
    const res = await fetch(`${API}/api/sessions/${sessionId}/review`);
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) {
    console.error('Failed to fetch review:', e);
    return null;
  }
}

async function fetchSessionDetail(sessionId) {
  try {
    const res = await fetch(`${API}/api/sessions/${sessionId}`);
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) {
    console.error('Failed to fetch session detail:', e);
    return null;
  }
}

async function submitReview(sessionId, status, notes) {
  try {
    const res = await fetch(`${API}/api/sessions/${sessionId}/review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, reviewer: 'presenter', notes })
    });
    if (!res.ok) throw new Error(res.statusText);
    return await res.json();
  } catch (e) {
    console.error('Failed to submit review:', e);
    return null;
  }
}

// ── Rendering ───────────────────────────────────────────

async function refreshData() {
  const [sessions, queue] = await Promise.all([fetchSessions(), fetchReviewQueue()]);
  allSessions = sessions;
  reviewQueue = queue;
  updateCounts();
  renderCurrentTab();
}

function updateCounts() {
  const pending = reviewQueue.filter(q => q.review_status === 'pending').length;
  const approved = reviewQueue.filter(q => q.review_status === 'approved').length;

  document.getElementById('tab-queue-count').textContent = pending;
  document.getElementById('tab-all-count').textContent = allSessions.length;
  document.getElementById('tab-approved-count').textContent = approved;
  document.getElementById('queue-count').textContent =
    pending > 0 ? `${pending} pending review` : 'All reviewed';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  hideDetail();
  renderCurrentTab();
}

function renderCurrentTab() {
  const el = document.getElementById('content');
  if (currentTab === 'queue') {
    const pending = reviewQueue.filter(q => q.review_status === 'pending' || q.review_status === 'needs_edit');
    renderTable(el, pending);
  } else if (currentTab === 'approved') {
    const approved = reviewQueue.filter(q => q.review_status === 'approved');
    renderTable(el, approved);
  } else {
    renderSessionsTable(el, allSessions);
  }
}

function renderTable(el, items) {
  if (items.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <h3>${currentTab === 'queue' ? 'No sessions pending review' : 'No approved sessions'}</h3>
        <p>Sessions will appear here once AI analysis completes.</p>
      </div>`;
    return;
  }

  el.innerHTML = `
    <table class="queue-table">
      <thead>
        <tr>
          <th>Session</th>
          <th>Visitor</th>
          <th>Date</th>
          <th>Status</th>
          <th>Reviewer</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(item => `
          <tr onclick="openReview('${esc(item.session_id)}')">
            <td style="font-family: monospace; color: var(--accent);">${esc(item.session_id)}</td>
            <td>${esc(item.visitor_name)}</td>
            <td style="color: var(--text2);">${formatDate(item.ended_at)}</td>
            <td><span class="status-badge status-${esc(item.review_status)}">${esc(item.review_status)}</span></td>
            <td style="color: var(--text2);">${esc(item.reviewer || '--')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function renderSessionsTable(el, sessions) {
  if (sessions.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <h3>No sessions found</h3>
        <p>Sessions appear here as demo PCs upload data to S3.</p>
      </div>`;
    return;
  }

  el.innerHTML = `
    <table class="queue-table">
      <thead>
        <tr>
          <th>Session</th>
          <th>Visitor</th>
          <th>Status</th>
          <th>Score</th>
          <th>Analysis</th>
        </tr>
      </thead>
      <tbody>
        ${sessions.map(s => `
          <tr onclick="openReview('${esc(s.session_id)}')">
            <td style="font-family: monospace; color: var(--accent);">${esc(s.session_id)}</td>
            <td>${esc(s.visitor_name || 'Unknown')}</td>
            <td><span class="status-badge status-${statusClass(s.status)}">${esc(s.status || 'unknown')}</span></td>
            <td>${s.session_score ? scoreHtml(s.session_score) : '--'}</td>
            <td style="color: var(--text2);">${s.has_analysis ? 'Ready' : 'Pending'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

// ── Detail View ─────────────────────────────────────────

async function openReview(sessionId) {
  selectedSession = sessionId;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  panel.innerHTML = '<div class="loading">Loading session details...</div>';

  const [detail, review] = await Promise.all([
    fetchSessionDetail(sessionId),
    fetchSessionReview(sessionId)
  ]);

  if (!detail && !review) {
    panel.innerHTML = '<div class="empty-state"><h3>Session not found</h3></div>';
    return;
  }

  const summary = (review && review.summary) || {};
  const followUp = (review && review.follow_up) || {};
  const reviewStatus = (review && review.review) || { status: 'pending', notes: '' };
  const clicks = (detail && detail.clicks && detail.clicks.events) || [];
  const meta = (detail && detail.metadata) || {};

  panel.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
      <h2 style="margin-bottom: 0;">
        ${esc(meta.visitor_name || sessionId)}
        <span style="font-size: 0.85rem; color: var(--text2); font-weight: 400; margin-left: 0.5rem;">
          ${esc(sessionId)}
        </span>
      </h2>
      <button class="btn" onclick="hideDetail()">Close</button>
    </div>

    <div class="detail-grid">
      <!-- Score + Summary -->
      <div class="card">
        <div class="card-label">Session Score</div>
        ${summary.session_score
          ? `<div class="score-display ${scoreClass(summary.session_score)}">${summary.session_score}/100</div>`
          : '<div style="color: var(--text2); text-align: center; padding: 1rem;">No score yet</div>'
        }
      </div>

      <div class="card">
        <div class="card-label">Executive Summary</div>
        <div class="summary-text">
          ${esc(summary.executive_summary || 'AI analysis not available yet.')}
        </div>
      </div>

      <!-- Products Demonstrated -->
      <div class="card">
        <div class="card-label">Products Demonstrated</div>
        ${Array.isArray(summary.products_demonstrated) && summary.products_demonstrated.length > 0
          ? `<div class="products-list">${summary.products_demonstrated.map(p => `<span class="product-tag">${esc(p)}</span>`).join('')}</div>`
          : '<div style="color: var(--text2);">None detected</div>'
        }
      </div>

      <!-- Key Interests -->
      <div class="card">
        <div class="card-label">Key Interests</div>
        ${Array.isArray(summary.key_interests) && summary.key_interests.length > 0
          ? `<ul style="list-style: disc; padding-left: 1.2rem; color: var(--text);">
              ${summary.key_interests.map(i => `<li>${esc(i)}</li>`).join('')}
            </ul>`
          : '<div style="color: var(--text2);">None detected</div>'
        }
      </div>
    </div>

    <!-- Follow-Up Actions -->
    <div class="card" style="margin-bottom: 1rem;">
      <div class="card-label">Follow-Up Actions</div>
      ${renderFollowUpActions(summary.follow_up_actions || followUp.actions || [])}
    </div>

    <!-- Click Timeline -->
    <div class="card" style="margin-bottom: 1rem;">
      <div class="card-label">Click Timeline (${clicks.length} events)</div>
      ${renderTimeline(clicks, sessionId)}
    </div>

    <!-- Approval Bar -->
    <div class="approval-bar">
      <textarea id="review-notes" placeholder="Review notes (optional)...">${esc(reviewStatus.notes || '')}</textarea>
      <button class="btn btn-primary" onclick="doReview('approved')">Approve</button>
      <button class="btn btn-warn" onclick="doReview('needs_edit')">Needs Edit</button>
      <button class="btn btn-danger" onclick="doReview('rejected')">Reject</button>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--text2);">
      Current status: <span class="status-badge status-${esc(reviewStatus.status)}">${esc(reviewStatus.status)}</span>
      ${reviewStatus.reviewed_at ? ` | Reviewed ${formatDate(reviewStatus.reviewed_at)} by ${esc(reviewStatus.reviewer || '?')}` : ''}
    </div>
  `;
}

function renderFollowUpActions(actions) {
  if (!Array.isArray(actions) || actions.length === 0) {
    return '<div style="color: var(--text2);">No follow-up actions generated yet.</div>';
  }

  return `<ul class="action-list">
    ${actions.map(a => {
      const priority = (typeof a === 'object' && a.priority) || 'medium';
      const text = typeof a === 'string' ? a : (a.action || a.description || JSON.stringify(a));
      return `<li>
        <span class="action-priority priority-${esc(priority)}"></span>
        ${esc(text)}
      </li>`;
    }).join('')}
  </ul>`;
}

function renderTimeline(clicks, sessionId) {
  if (clicks.length === 0) {
    return '<div style="color: var(--text2); padding: 1rem;">No click events recorded.</div>';
  }

  const displayed = clicks.slice(0, 50);
  return `
    <div class="timeline">
      ${displayed.map(c => {
        const time = c.timestamp ? new Date(c.timestamp).toLocaleTimeString() : '--:--';
        const action = c.element ? (c.element.text || c.element.tag || 'click') : 'click';
        const page = c.page_title || '';
        const hasScreenshot = !!c.screenshot_file;
        return `
          <div class="timeline-item">
            <span class="timeline-time">${esc(time)}</span>
            <span class="timeline-action">
              ${esc(action.slice(0, 60))}
              ${page ? `<span style="color: var(--text2); font-size: 0.8rem;"> | ${esc(page.slice(0, 40))}</span>` : ''}
            </span>
            ${hasScreenshot
              ? `<img class="timeline-thumb" src="/api/sessions/${esc(sessionId)}/files/screenshots?file=${esc(c.screenshot_file)}" alt="screenshot" onerror="this.style.display='none'">`
              : ''}
          </div>`;
      }).join('')}
      ${clicks.length > 50 ? `<div class="timeline-item" style="color: var(--text2); justify-content: center;">+ ${clicks.length - 50} more events</div>` : ''}
    </div>`;
}

function hideDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  selectedSession = null;
}

async function doReview(status) {
  if (!selectedSession) return;
  const notes = document.getElementById('review-notes').value;
  const result = await submitReview(selectedSession, status, notes);
  if (result) {
    await refreshData();
    // Reopen to show updated status
    openReview(selectedSession);
  }
}

// ── Helpers ─────────────────────────────────────────────

function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function formatDate(d) {
  if (!d) return '--';
  try {
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch (e) { return d; }
}

function scoreHtml(score) {
  const cls = score >= 70 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
  return `<span class="${cls}" style="font-weight: 600;">${score}</span>`;
}

function scoreClass(score) {
  return score >= 70 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
}

function statusClass(status) {
  const s = (status || '').toLowerCase();
  if (['completed', 'analyzed', 'ended'].includes(s)) return 'approved';
  if (['active', 'recording'].includes(s)) return 'pending';
  if (['error', 'failed'].includes(s)) return 'rejected';
  return 'pending';
}

// ── Init ────────────────────────────────────────────────

refreshData();
// Auto-refresh every 30s
setInterval(refreshData, 30000);
</script>
</body>
</html>
