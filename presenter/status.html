<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - System Status</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --green:     #00E676;
            --red:       #FF5252;
            --amber:     #FFAB00;
            --blue:      #448AFF;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header .version {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.ok {
            background: rgba(0, 230, 118, 0.12);
            color: var(--green);
        }

        .status-badge.error {
            background: rgba(255, 82, 82, 0.12);
            color: var(--red);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.ok { background: var(--green); }
        .status-dot.error { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }

        .service-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }

        .service-row:last-child { border-bottom: none; }

        .service-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .service-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .service-status .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.green { background: var(--green); box-shadow: 0 0 8px rgba(0, 230, 118, 0.4); }
        .dot.red { background: var(--red); box-shadow: 0 0 8px rgba(255, 82, 82, 0.4); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--blue);
            line-height: 1.1;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        .stat-row {
            display: flex;
            gap: 2rem;
            margin-top: 0.75rem;
        }

        .stat-item { flex: 1; }

        .error-log {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .error-log .card-title { margin-bottom: 0.5rem; }

        .error-entry {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .error-entry:last-child { border-bottom: none; }

        .error-ts {
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 200px;
        }

        .error-msg { color: var(--red); }

        .empty-state {
            color: var(--text-dim);
            font-style: italic;
            padding: 1rem 0;
            font-size: 0.85rem;
        }

        .refresh-info {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 2rem;
        }

        .uptime-value {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 1.1rem;
            color: var(--green);
        }

        #connection-error {
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid var(--red);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            color: var(--red);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>BoothApp System Status</h1>
            <span class="version" id="version">v--</span>
        </div>
        <span class="status-badge ok" id="overall-badge">
            <span class="status-dot ok" id="overall-dot"></span>
            <span id="overall-text">Operational</span>
        </span>
    </div>

    <div id="connection-error">Cannot reach health endpoint. Retrying...</div>

    <div class="grid">
        <!-- Services -->
        <div class="card">
            <div class="card-title">Services</div>
            <div class="service-row">
                <span class="service-name">S3 Storage</span>
                <span class="service-status">
                    <span class="dot green" id="s3-dot"></span>
                    <span id="s3-text">--</span>
                </span>
            </div>
            <div class="service-row">
                <span class="service-name">Watcher</span>
                <span class="service-status">
                    <span class="dot green" id="watcher-dot"></span>
                    <span id="watcher-text">--</span>
                </span>
            </div>
            <div class="service-row">
                <span class="service-name">Presenter</span>
                <span class="service-status">
                    <span class="dot green" id="presenter-dot"></span>
                    <span id="presenter-text">--</span>
                </span>
            </div>
        </div>

        <!-- Uptime -->
        <div class="card">
            <div class="card-title">Uptime</div>
            <div class="uptime-value" id="uptime">--</div>
        </div>

        <!-- Sessions -->
        <div class="card">
            <div class="card-title">Sessions</div>
            <div class="stat-row">
                <div class="stat-item">
                    <div class="stat-value" id="sess-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sess-active">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sess-completed">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Log -->
    <div class="error-log">
        <div class="card-title">Recent Errors</div>
        <div id="error-list">
            <div class="empty-state">No errors recorded</div>
        </div>
    </div>

    <div class="refresh-info">Auto-refreshes every 5 seconds</div>

    <script>
        var API_BASE = window.BOOTHAPP_API || '';

        function formatUptime(seconds) {
            var d = Math.floor(seconds / 86400);
            var h = Math.floor((seconds % 86400) / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = Math.floor(seconds % 60);
            var parts = [];
            if (d > 0) parts.push(d + 'd');
            if (h > 0) parts.push(h + 'h');
            if (m > 0) parts.push(m + 'm');
            parts.push(s + 's');
            return parts.join(' ');
        }

        function setServiceStatus(prefix, value) {
            var dot = document.getElementById(prefix + '-dot');
            var text = document.getElementById(prefix + '-text');
            var isGood = (value === 'connected' || value === 'running');
            dot.className = 'dot ' + (isGood ? 'green' : 'red');
            text.textContent = value;
        }

        function updateOverall(services) {
            var hasError = (services.s3 === 'error' || services.watcher === 'stopped');
            var badge = document.getElementById('overall-badge');
            var dot = document.getElementById('overall-dot');
            var text = document.getElementById('overall-text');
            badge.className = 'status-badge ' + (hasError ? 'error' : 'ok');
            dot.className = 'status-dot ' + (hasError ? 'error' : 'ok');
            text.textContent = hasError ? 'Degraded' : 'Operational';
        }

        function renderErrors(errors) {
            var el = document.getElementById('error-list');
            if (!errors || errors.length === 0) {
                el.innerHTML = '<div class="empty-state">No errors recorded</div>';
                return;
            }
            var html = '';
            for (var i = errors.length - 1; i >= 0; i--) {
                html += '<div class="error-entry">' +
                    '<span class="error-ts">' + errors[i].timestamp + '</span>' +
                    '<span class="error-msg">' + escapeHtml(errors[i].message) + '</span>' +
                    '</div>';
            }
            el.innerHTML = html;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function fetchHealth() {
            fetch(API_BASE + '/api/health')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('connection-error').style.display = 'none';
                    document.getElementById('version').textContent = 'v' + data.version;
                    document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds);
                    setServiceStatus('s3', data.services.s3);
                    setServiceStatus('watcher', data.services.watcher);
                    setServiceStatus('presenter', data.services.presenter);
                    updateOverall(data.services);
                    document.getElementById('sess-total').textContent = data.sessions.total;
                    document.getElementById('sess-active').textContent = data.sessions.active;
                    document.getElementById('sess-completed').textContent = data.sessions.completed;
                })
                .catch(function() {
                    document.getElementById('connection-error').style.display = 'block';
                });
        }

        function fetchErrors() {
            fetch(API_BASE + '/api/errors')
                .then(function(r) { return r.json(); })
                .then(function(data) { renderErrors(data.errors); })
                .catch(function() {});
        }

        function refresh() {
            fetchHealth();
            fetchErrors();
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
