<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Executive Briefing</title>
    <style>
        /* ============================================================
           RESET & BASE  (matches demo.html branding)
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-glow:  rgba(215, 25, 32, .35);
            --red-dark:  #A8131A;
            --red-light: #FF4D52;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --blue:      #448AFF;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           BACKGROUND
           ============================================================ */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(215,25,32,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(215,25,32,.03) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridPulse 10s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: .3; }
            50%      { opacity: .7; }
        }

        .bg-glow {
            position: fixed; z-index: 0;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .12;
            animation: drift 25s ease-in-out infinite;
        }
        .bg-glow--1 { top: -300px; left: -200px; width: 800px; height: 800px; background: var(--red); }
        .bg-glow--2 { bottom: -300px; right: -200px; width: 700px; height: 700px; background: var(--red); animation-delay: -12s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(50px, 30px) scale(1.05); }
            66%      { transform: translate(-30px, 50px) scale(.95); }
        }

        /* ============================================================
           LAYOUT
           ============================================================ */
        .container {
            position: relative; z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 48px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 44px; height: 44px;
            background: var(--red);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 20px; color: #fff;
            box-shadow: 0 0 24px var(--red-glow);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--red); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all .15s;
        }
        .btn:hover { border-color: var(--red); background: var(--surface2); }
        .btn--red { background: var(--red); border-color: var(--red); }
        .btn--red:hover { background: var(--red-dark); }

        /* ============================================================
           KPI CARDS
           ============================================================ */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            transition: border-color .2s;
        }
        .kpi-card:hover { border-color: var(--red); }

        .kpi-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }
        .kpi-value--red { color: var(--red); }
        .kpi-value--blue { color: var(--blue); }
        .kpi-value--green { color: var(--success); }
        .kpi-value--amber { color: var(--amber); }

        .kpi-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ============================================================
           GRID SECTIONS
           ============================================================ */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .grid-3col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* ============================================================
           BAR CHART (horizontal)
           ============================================================ */
        .bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .bar-item:last-child { margin-bottom: 0; }

        .bar-label {
            width: 180px;
            font-size: 13px;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            height: 24px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--red-dark), var(--red));
            transition: width .6s ease;
            min-width: 2px;
        }
        .bar-fill--blue { background: linear-gradient(90deg, #1565C0, var(--blue)); }
        .bar-fill--amber { background: linear-gradient(90deg, #FF8F00, var(--amber)); }

        .bar-count {
            width: 36px;
            text-align: right;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ============================================================
           LIST ITEMS
           ============================================================ */
        .list-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.5;
        }
        .list-item:last-child { border-bottom: none; }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .list-item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .badge--high { background: rgba(215,25,32,.2); color: var(--red-light); }
        .badge--medium { background: rgba(255,171,0,.15); color: var(--amber); }
        .badge--low { background: rgba(68,138,255,.15); color: var(--blue); }

        .list-item-detail {
            color: var(--text-dim);
            font-size: 12px;
        }

        /* ============================================================
           COMPETITOR TABLE
           ============================================================ */
        .comp-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .comp-table th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--text-dim);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .comp-table td {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .comp-table tr:last-child td { border-bottom: none; }
        .comp-table .count-cell {
            text-align: center;
            font-weight: 700;
            color: var(--amber);
        }

        /* ============================================================
           INDUSTRY PILLS
           ============================================================ */
        .pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .pill .pill-count {
            color: var(--red);
            margin-left: 6px;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            padding: 24px 0 16px;
            font-size: 12px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
        }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
        }
        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--text-dim);
        }
        .empty-state p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* ============================================================
           DATA CONTROLS
           ============================================================ */
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .file-input { display: none; }

        .refresh-indicator {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* ============================================================
           PRINT
           ============================================================ */
        @media print {
            body { background: #fff; color: #222; }
            .bg-grid, .bg-glow { display: none; }
            .kpi-card, .card { border-color: #ddd; background: #fff; }
            .header-right .controls { display: none; }
            .kpi-value--red, .kpi-value--blue,
            .kpi-value--green, .kpi-value--amber { color: #222; }
            .bar-fill { background: #D71920 !important; }
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow bg-glow--1"></div>
<div class="bg-glow bg-glow--2"></div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="logo">B</div>
            <h1>Executive <span>Briefing</span></h1>
        </div>
        <div class="header-right">
            <span class="refresh-indicator">
                <span class="status-dot"></span>
                Auto-refresh <span id="refreshInterval">30</span>s
            </span>
            <span id="lastUpdate" style="font-size:12px; color:var(--text-dim);">--</span>
            <div class="controls">
                <button class="btn" onclick="document.getElementById('fileInput').click()">Load JSON</button>
                <input type="file" id="fileInput" class="file-input" accept=".json" multiple>
                <button class="btn" onclick="loadDemo()">Demo Data</button>
                <button class="btn btn--red" onclick="window.print()">Print</button>
            </div>
        </div>
    </div>

    <!-- CONTENT (rendered by JS) -->
    <div id="content">
        <div class="empty-state">
            <h2>No Session Data Loaded</h2>
            <p>Load analyzed session JSON files or click "Demo Data" to see a sample briefing.</p>
        </div>
    </div>

    <div class="footer">
        BoothApp Executive Briefing -- Generated <span id="footerTime">--</span>
    </div>
</div>

<script>
/* ================================================================
   DATA STORE
   ================================================================ */
var sessions = [];
var STORAGE_KEY = 'boothapp_briefing_sessions';
var REFRESH_MS = 30000;
var refreshTimer = null;

/* ================================================================
   KNOWN COMPETITOR PATTERNS
   ================================================================ */
var COMPETITORS = [
    { name: 'CrowdStrike',  rx: /crowdstrike|falcon/i },
    { name: 'Palo Alto Networks', rx: /palo\s*alto|prisma|cortex\s*xdr|panw/i },
    { name: 'SentinelOne',  rx: /sentinelone|singularity/i },
    { name: 'Microsoft Defender', rx: /microsoft\s*defender|ms\s*defender|mde/i },
    { name: 'Fortinet',     rx: /fortinet|fortigate|fortiedr/i },
    { name: 'Zscaler',      rx: /zscaler/i },
    { name: 'Wiz',          rx: /\bwiz\b/i },
    { name: 'Splunk',       rx: /splunk/i },
    { name: 'CyberArk',     rx: /cyberark/i },
    { name: 'Proofpoint',   rx: /proofpoint/i },
    { name: 'Mimecast',     rx: /mimecast/i },
    { name: 'Cisco',        rx: /cisco\s*(umbrella|secure|ise)/i },
    { name: 'Darktrace',    rx: /darktrace/i },
    { name: 'Cloudflare',   rx: /cloudflare/i },
    { name: 'Trellix',      rx: /trellix|fireeye/i },
    { name: 'Symantec',     rx: /symantec|broadcom\s*security/i },
    { name: 'Carbon Black', rx: /carbon\s*black/i },
    { name: 'Orca Security', rx: /orca\s*security/i },
    { name: 'Snyk',         rx: /\bsnyk\b/i },
    { name: 'Veracode',     rx: /veracode/i },
];

/* ================================================================
   AGGREGATION
   ================================================================ */
function aggregate(sessions) {
    var totalVisitors = sessions.length;
    var interestMap = {};   // topic -> { count, highConf, details[] }
    var productMap = {};    // product -> count
    var compMap = {};       // competitor -> { count, contexts[] }
    var industryMap = {};   // industry -> count
    var improvements = [];  // deduped recommendations
    var improvementSet = {};
    var totalDuration = 0;
    var durCount = 0;

    sessions.forEach(function(s) {
        // --- interests ---
        (s.interests || []).forEach(function(i) {
            var key = i.topic;
            if (!interestMap[key]) interestMap[key] = { count: 0, highConf: 0, details: [] };
            interestMap[key].count++;
            if (i.confidence === 'high') interestMap[key].highConf++;
            if (i.detail) interestMap[key].details.push(i.detail);
        });

        // --- products ---
        (s.products_demonstrated || []).forEach(function(p) {
            var name = p.name;
            productMap[name] = (productMap[name] || 0) + 1;
        });

        // --- competitor mentions (scan all text fields) ---
        var blob = JSON.stringify(s).toLowerCase();
        COMPETITORS.forEach(function(c) {
            if (c.rx.test(blob)) {
                if (!compMap[c.name]) compMap[c.name] = { count: 0, contexts: [] };
                compMap[c.name].count++;
                // grab context from interests/notes
                (s.interests || []).forEach(function(i) {
                    if (c.rx.test(i.detail || '')) {
                        compMap[c.name].contexts.push(i.detail);
                    }
                });
                (s.products_demonstrated || []).forEach(function(p) {
                    if (c.rx.test(p.note || '')) {
                        compMap[c.name].contexts.push(p.note);
                    }
                });
            }
        });

        // --- industry ---
        var industry = (s.visitor && s.visitor.industry) || 'Unknown';
        industryMap[industry] = (industryMap[industry] || 0) + 1;

        // --- recommendations -> booth improvements ---
        (s.recommendations || []).forEach(function(r) {
            var key = r.action.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
            if (!improvementSet[key]) {
                improvementSet[key] = true;
                improvements.push({ action: r.action, priority: r.priority });
            }
        });

        // --- duration ---
        if (s.visitor && s.visitor.visit_duration) {
            var m = s.visitor.visit_duration.match(/(\d+)/);
            if (m) { totalDuration += parseInt(m[1], 10); durCount++; }
        }
    });

    // sort helpers
    function sortDesc(obj) {
        return Object.keys(obj).map(function(k) { return { name: k, count: obj[k].count || obj[k] }; })
            .sort(function(a, b) { return b.count - a.count; });
    }

    return {
        totalVisitors: totalVisitors,
        avgDuration: durCount ? Math.round(totalDuration / durCount) : 0,
        interests: Object.keys(interestMap).map(function(k) {
            return { topic: k, count: interestMap[k].count, highConf: interestMap[k].highConf };
        }).sort(function(a, b) { return b.count - a.count; }),
        products: sortDesc(productMap),
        competitors: Object.keys(compMap).map(function(k) {
            return { name: k, count: compMap[k].count, contexts: compMap[k].contexts };
        }).sort(function(a, b) { return b.count - a.count; }),
        industries: sortDesc(industryMap),
        improvements: improvements,
        uniqueCompanies: (function() {
            var seen = {};
            sessions.forEach(function(s) {
                if (s.visitor && s.visitor.company) seen[s.visitor.company] = true;
            });
            return Object.keys(seen).length;
        })(),
    };
}

/* ================================================================
   RENDER
   ================================================================ */
function render() {
    var el = document.getElementById('content');
    if (sessions.length === 0) {
        el.innerHTML = '<div class="empty-state"><h2>No Session Data Loaded</h2>' +
            '<p>Load analyzed session JSON files or click "Demo Data" to see a sample briefing.</p></div>';
        return;
    }

    var d = aggregate(sessions);
    var maxInterest = d.interests.length ? d.interests[0].count : 1;
    var maxProduct = d.products.length ? d.products[0].count : 1;
    var html = '';

    // --- KPI CARDS ---
    html += '<div class="kpi-row">';
    html += kpiCard('Total Visitors', d.totalVisitors, 'red', d.uniqueCompanies + ' companies');
    html += kpiCard('Avg Duration', d.avgDuration + 'm', 'blue', 'per session');
    html += kpiCard('Products Shown', d.products.length, 'green', d.products.reduce(function(s, p) { return s + p.count; }, 0) + ' total demos');
    html += kpiCard('Competitors Cited', d.competitors.length, 'amber', d.competitors.reduce(function(s, c) { return s + c.count; }, 0) + ' mentions');
    html += '</div>';

    // --- TOP INTERESTS + TOP PRODUCTS ---
    html += '<div class="grid-2col">';

    // interests
    html += '<div class="card"><div class="card-title">Top Interests Across All Sessions</div>';
    d.interests.slice(0, 8).forEach(function(i) {
        html += barItem(i.topic, i.count, maxInterest, '', i.highConf + ' high-conf');
    });
    html += '</div>';

    // products
    html += '<div class="card"><div class="card-title">Most Requested Products</div>';
    d.products.slice(0, 8).forEach(function(p) {
        html += barItem(p.name, p.count, maxProduct, 'blue');
    });
    html += '</div>';

    html += '</div>';

    // --- COMPETITORS + INDUSTRIES + IMPROVEMENTS ---
    html += '<div class="grid-3col">';

    // competitors
    html += '<div class="card"><div class="card-title">Competitor Mentions</div>';
    if (d.competitors.length === 0) {
        html += '<div style="color:var(--text-dim); font-size:13px; padding:16px 0;">No competitor mentions detected.</div>';
    } else {
        html += '<table class="comp-table"><thead><tr><th>Vendor</th><th style="text-align:center">Sessions</th><th>Context</th></tr></thead><tbody>';
        d.competitors.slice(0, 8).forEach(function(c) {
            var ctx = c.contexts.length ? c.contexts[0] : '--';
            if (ctx.length > 60) ctx = ctx.substring(0, 57) + '...';
            html += '<tr><td>' + esc(c.name) + '</td><td class="count-cell">' + c.count + '</td><td style="color:var(--text-dim); font-size:12px;">' + esc(ctx) + '</td></tr>';
        });
        html += '</tbody></table>';
    }
    html += '</div>';

    // industries
    html += '<div class="card"><div class="card-title">Visitor Industries</div>';
    html += '<div class="pill-row">';
    d.industries.forEach(function(ind) {
        html += '<div class="pill">' + esc(ind.name) + '<span class="pill-count">' + ind.count + '</span></div>';
    });
    html += '</div></div>';

    // improvements
    html += '<div class="card"><div class="card-title">Recommended Booth Improvements</div>';
    var priOrder = { high: 0, medium: 1, low: 2 };
    var sorted = d.improvements.slice().sort(function(a, b) {
        return (priOrder[a.priority] || 9) - (priOrder[b.priority] || 9);
    });
    sorted.slice(0, 8).forEach(function(imp) {
        html += '<div class="list-item"><div class="list-item-header">' +
            '<span class="list-item-title">' + esc(imp.action) + '</span>' +
            '<span class="badge badge--' + imp.priority + '">' + imp.priority + '</span>' +
            '</div></div>';
    });
    html += '</div>';

    html += '</div>';

    el.innerHTML = html;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    document.getElementById('footerTime').textContent = new Date().toLocaleString();
}

function kpiCard(label, value, color, sub) {
    return '<div class="kpi-card">' +
        '<div class="kpi-label">' + esc(label) + '</div>' +
        '<div class="kpi-value kpi-value--' + color + '">' + value + '</div>' +
        '<div class="kpi-sub">' + esc(sub) + '</div></div>';
}

function barItem(label, count, max, variant, sub) {
    var pct = max > 0 ? Math.round((count / max) * 100) : 0;
    var cls = variant ? 'bar-fill bar-fill--' + variant : 'bar-fill';
    var h = '<div class="bar-item">' +
        '<div class="bar-label" title="' + esc(label) + '">' + esc(label) + '</div>' +
        '<div class="bar-track"><div class="' + cls + '" style="width:' + pct + '%"></div></div>' +
        '<div class="bar-count">' + count + '</div></div>';
    return h;
}

function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
}

/* ================================================================
   DATA LOADING
   ================================================================ */
function addSessions(arr) {
    if (!Array.isArray(arr)) arr = [arr];
    arr.forEach(function(s) {
        // dedupe by report_id
        var dominated = sessions.some(function(existing) {
            return existing.report_id && existing.report_id === s.report_id;
        });
        if (!dominated) sessions.push(s);
    });
    persist();
    render();
}

function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch(e) {}
}

function restore() {
    try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { sessions = JSON.parse(raw); render(); }
    } catch(e) {}
}

/* file input */
document.getElementById('fileInput').addEventListener('change', function(e) {
    var files = e.target.files;
    var pending = files.length;
    for (var i = 0; i < files.length; i++) {
        (function(file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                try {

                if (loaded.length !== sessions.length) {
                    sessions = loaded;
                    render();
                }
            }
        } catch(e) {}
    }, REFRESH_MS);
}
