<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - AI-Powered Trade Show Demo Capture</title>
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-glow:  rgba(215, 25, 32, .35);
            --red-dark:  #A8131A;
            --red-light: #FF4D52;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --blue:      #448AFF;
            --amber:     #FFAB00;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           PARTICLE CANVAS
           ============================================================ */
        #particles {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
        }

        /* ============================================================
           ANIMATED BACKGROUND
           ============================================================ */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(215,25,32,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(215,25,32,.03) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridPulse 10s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: .3; }
            50%      { opacity: .7; }
        }

        .bg-glow {
            position: fixed; z-index: 0;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .12;
            animation: drift 25s ease-in-out infinite;
        }
        .bg-glow--1 { top: -300px; left: -200px; width: 800px; height: 800px; background: var(--red); }
        .bg-glow--2 { bottom: -300px; right: -200px; width: 700px; height: 700px; background: var(--red); animation-delay: -12s; }
        .bg-glow--3 { top: 40%; left: 50%; width: 500px; height: 500px; background: var(--blue); opacity: .06; animation-delay: -6s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(50px, 30px) scale(1.05); }
            66%      { transform: translate(-30px, 50px) scale(.95); }
        }

        /* ============================================================
           LAYOUT
           ============================================================ */
        .container {
            position: relative; z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 48px 56px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--red-glow), 0 10px 40px rgba(0,0,0,.5);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }
        .logo-icon::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 23px;
            background: linear-gradient(135deg, var(--red-light), transparent, var(--red));
            z-index: -1;
            opacity: .5;
            animation: logoRing 4s linear infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 50px var(--red-glow), 0 10px 40px rgba(0,0,0,.5); transform: scale(1); }
            50%      { box-shadow: 0 0 70px var(--red-glow), 0 12px 50px rgba(0,0,0,.6); transform: scale(1.03); }
        }
        @keyframes logoRing {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-icon svg { width: 44px; height: 44px; fill: #fff; }

        .logo-text {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--red-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 20px;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 8px 24px;
            background: rgba(215,25,32,.08);
            border: 1px solid rgba(215,25,32,.25);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--red-glow);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--red-glow); }
            50%      { opacity: .2; box-shadow: 0 0 2px var(--red-glow); }
        }

        /* ============================================================
           STATUS CARDS
           ============================================================ */
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-bottom: 48px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px;
        }
        .card::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.03) 0%, transparent 70%);
            pointer-events: none;
        }
        .card--sessions::before  { background: linear-gradient(90deg, var(--red), var(--red-light)); }
        .card--demos::before     { background: linear-gradient(90deg, var(--blue), #82B1FF); }
        .card--reports::before   { background: linear-gradient(90deg, var(--success), #69F0AE); }

        .card-icon {
            width: 60px; height: 60px;
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .card--sessions .card-icon  { background: rgba(215,25,32,.1); }
        .card--demos .card-icon     { background: rgba(68,138,255,.1); }
        .card--reports .card-icon   { background: rgba(0,230,118,.1); }
        .card-icon svg { width: 28px; height: 28px; }

        .card-value {
            font-size: 64px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }
        .card--sessions .card-value  { color: var(--red); text-shadow: 0 0 30px var(--red-glow); }
        .card--demos .card-value     { color: var(--blue); text-shadow: 0 0 30px rgba(68,138,255,.3); }
        .card--reports .card-value   { color: var(--success); text-shadow: 0 0 30px rgba(0,230,118,.3); }

        .card-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .card-value[data-animate] {
            animation: countPop .4s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes countPop {
            0%   { transform: scale(.7); opacity: .3; }
            100% { transform: scale(1);  opacity: 1;  }
        }

        /* ============================================================
           MAIN CONTENT GRID (feed + chart)
           ============================================================ */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 28px;
        }

        /* ============================================================
           ACTIVITY FEED
           ============================================================ */
        .feed-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 28px;
            border-bottom: 1px solid var(--border);
        }
        .feed-title {
            font-size: 16px;
            font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .feed-title svg { width: 18px; height: 18px; fill: var(--red); }

        .feed-refresh {
            font-size: 12px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .feed-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .feed-list::-webkit-scrollbar { width: 4px; }
        .feed-list::-webkit-scrollbar-track { background: transparent; }
        .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 28px;
            border-bottom: 1px solid rgba(255,255,255,.03);
            animation: slideIn .5s cubic-bezier(.25,.46,.45,.94);
        }
        .feed-item:last-child { border-bottom: none; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .feed-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .feed-dot--session  { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
        .feed-dot--analysis { background: var(--blue); box-shadow: 0 0 10px rgba(68,138,255,.4); }
        .feed-dot--report   { background: var(--success); box-shadow: 0 0 10px rgba(0,230,118,.4); }
        .feed-dot--email    { background: var(--amber); box-shadow: 0 0 10px rgba(255,171,0,.4); }

        .feed-content { flex: 1; min-width: 0; }
        .feed-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }
        .feed-text strong { color: #fff; font-weight: 600; }

        .feed-time {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ============================================================
           SIDE PANEL
           ============================================================ */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .panel-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            overflow: hidden;
        }
        .panel-box-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-box-title svg { width: 16px; height: 16px; }

        /* Ring chart */
        .ring-chart {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 16px;
        }
        .ring-chart svg { width: 160px; height: 160px; }
        .ring-chart-label {
            position: absolute;
            text-align: center;
        }
        .ring-chart-label .ring-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--text);
        }
        .ring-chart-label .ring-sub {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ring-legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ring-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .ring-legend-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Top products */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .product-rank {
            width: 24px; height: 24px;
            border-radius: 6px;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .product-info { flex: 1; }
        .product-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }
        .product-bar {
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .product-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s cubic-bezier(.25,.46,.45,.94);
        }
        .product-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            letter-spacing: 1px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1100px) {
            .content-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .cards { grid-template-columns: 1fr; }
            .container { padding: 24px 20px; }
            .logo-text { font-size: 36px; }
            .tagline { font-size: 14px; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<!-- Particle background -->
<canvas id="particles"></canvas>

<!-- Animated background layers -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow--1"></div>
<div class="bg-glow bg-glow--2"></div>
<div class="bg-glow bg-glow--3"></div>

<div class="container">

    <!-- ============ HEADER ============ -->
    <header class="header">
        <div class="logo-mark">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
            <span class="logo-text">BoothApp</span>
        </div>
        <p class="tagline">AI-Powered Trade Show Demo Capture</p>
        <div class="live-badge">
            <span class="live-dot"></span>
            Live Dashboard
        </div>
    </header>

    <!-- ============ STATUS CARDS ============ -->
    <div class="cards">
        <div class="card card--sessions">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="#D71920"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </div>
            <div class="card-value" id="activeSessions">0</div>
            <div class="card-label">Active Sessions</div>
        </div>
        <div class="card card--demos">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="#448AFF"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7v2H8v2h8v-2h-2v-2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            </div>
            <div class="card-value" id="totalDemos">0</div>
            <div class="card-label">Total Demos</div>
        </div>
        <div class="card card--reports">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="#00E676"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <div class="card-value" id="reportsGenerated">0</div>
            <div class="card-label">Reports Generated</div>
        </div>
    </div>

    <!-- ============ CONTENT GRID ============ -->
    <div class="content-grid">

        <!-- Activity Feed -->
        <section class="feed-section">
            <div class="feed-header">
                <div class="feed-title">
                    <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                    Live Activity
                </div>
                <div class="feed-refresh" id="refreshTimer">Refreshing in 5s</div>
            </div>
            <ul class="feed-list" id="feedList"></ul>
        </section>

        <!-- Side Panel -->
        <div class="side-panel">

            <!-- Conversion Ring Chart -->
            <div class="panel-box">
                <div class="panel-box-title">
                    <svg viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2 0v9h9c-.47-4.68-4.32-8.53-9-9zm0 11v9c4.68-.47 8.53-4.32 9-9h-9z"/></svg>
                    Pipeline
                </div>
                <div class="ring-chart">
                    <svg viewBox="0 0 160 160" id="ringChart">
                        <circle cx="80" cy="80" r="60" fill="none" stroke="var(--surface2)" stroke-width="14"/>
                        <circle cx="80" cy="80" r="60" fill="none" stroke="var(--red)" stroke-width="14"
                                stroke-dasharray="0 377" stroke-linecap="round" transform="rotate(-90 80 80)"
                                id="ringSession" style="transition: stroke-dasharray 1s ease"/>
                        <circle cx="80" cy="80" r="60" fill="none" stroke="var(--blue)" stroke-width="14"
                                stroke-dasharray="0 377" stroke-linecap="round" transform="rotate(-90 80 80)"
                                id="ringDemo" style="transition: stroke-dasharray 1s ease"/>
                        <circle cx="80" cy="80" r="60" fill="none" stroke="var(--success)" stroke-width="14"
                                stroke-dasharray="0 377" stroke-linecap="round" transform="rotate(-90 80 80)"
                                id="ringReport" style="transition: stroke-dasharray 1s ease"/>
                    </svg>
                    <div class="ring-chart-label">
                        <div class="ring-value" id="ringTotal">0</div>
                        <div class="ring-sub">Total</div>
                    </div>
                </div>
                <div class="ring-legend">
                    <div class="ring-legend-item">
                        <span class="ring-legend-dot" style="background:var(--red)"></span>
                        Sessions <span id="legendSessions" style="margin-left:auto;font-weight:700;color:var(--text)">0</span>
                    </div>
                    <div class="ring-legend-item">
                        <span class="ring-legend-dot" style="background:var(--blue)"></span>
                        Demos <span id="legendDemos" style="margin-left:auto;font-weight:700;color:var(--text)">0</span>
                    </div>
                    <div class="ring-legend-item">
                        <span class="ring-legend-dot" style="background:var(--success)"></span>
                        Reports <span id="legendReports" style="margin-left:auto;font-weight:700;color:var(--text)">0</span>
                    </div>
                </div>
            </div>

            <!-- Top Products -->
            <div class="panel-box">
                <div class="panel-box-title">
                    <svg viewBox="0 0 24 24" fill="var(--text-dim)"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                    Top Products
                </div>
                <div class="product-list" id="productList"></div>
            </div>

        </div>
    </div>

    <!-- ============ SESSION TIMELINE ============ -->
    <div id="timeline-mount"></div>

    <!-- ============ FOOTER ============ -->
    <div class="footer">
        <span>Powered by Trend Micro Vision One</span>
        <span>|</span>
        <span id="clock"></span>
    </div>

</div>

<script>
(function () {
    'use strict';

    // ------------------------------------------------------------------
    // CONFIG
    // ------------------------------------------------------------------
    var API_URL = '';  // Set to Lambda endpoint when available
    var REFRESH_INTERVAL = 5000;
    var CIRC = 2 * Math.PI * 60; // ring circumference

    // ------------------------------------------------------------------
    // PARTICLE SYSTEM
    // ------------------------------------------------------------------
    var canvas = document.getElementById('particles');
    var ctx = canvas.getContext('2d');
    var particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createParticle() {
        return {
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 1.5 + 0.5,
            a: Math.random() * 0.3 + 0.05
        };
    }

    for (var i = 0; i < 60; i++) particles.push(createParticle());

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(215, 25, 32, ' + p.a + ')';
            ctx.fill();

            // Draw connections
            for (var j = i + 1; j < particles.length; j++) {
                var p2 = particles[j];
                var dx = p.x - p2.x;
                var dy = p.y - p2.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = 'rgba(215, 25, 32, ' + (0.06 * (1 - dist / 150)) + ')';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // ------------------------------------------------------------------
    // MOCK DATA
    // ------------------------------------------------------------------
    var NAMES = [
        'Sarah Mitchell', 'James Chen', 'Maria Rodriguez', 'David Kim',
        'Emily Nakamura', 'Alex Thompson', 'Priya Sharma', 'Michael Brown',
        'Lisa Wang', 'Robert Garcia', 'Jennifer Lee', 'Thomas Anderson',
        'Yuki Tanaka', 'Carlos Mendez', 'Anna Petrov', 'Marcus Johnson'
    ];

    var COMPANIES = [
        'Acme Corp', 'TechVault', 'CloudNine Solutions', 'DataForge Inc',
        'SecureStack', 'NexGen Systems', 'CyberShield', 'Quantum Networks',
        'Atlas Financial', 'Pinnacle Health', 'Meridian Energy', 'Vertex Labs'
    ];

    var PRODUCTS = [
        { name: 'Vision One XDR', color: 'var(--red)' },
        { name: 'Cloud One',      color: 'var(--blue)' },
        { name: 'Apex One',       color: 'var(--amber)' },
        { name: 'Deep Security',  color: 'var(--success)' },
        { name: 'Email Security', color: '#AB47BC' },
        { name: 'Network One',    color: '#26C6DA' },
        { name: 'Zero Trust',     color: '#FF7043' }
    ];

    var EVENT_TEMPLATES = [
        { type: 'session',  tpl: 'Session started for <strong>{name}</strong> from {company}' },
        { type: 'session',  tpl: '<strong>{name}</strong> began a {product} demo' },
        { type: 'analysis', tpl: 'AI analysis complete for <strong>{name}</strong> -- report ready' },
        { type: 'analysis', tpl: 'Threat landscape assessment generated for <strong>{company}</strong>' },
        { type: 'report',   tpl: 'Executive report delivered to <strong>{name}</strong>' },
        { type: 'report',   tpl: 'ROI analysis report generated for <strong>{company}</strong>' },
        { type: 'email',    tpl: 'Follow-up email generated for <strong>{name}</strong>' },
        { type: 'email',    tpl: 'Personalized demo summary sent to <strong>{name}</strong> at {company}' }
    ];

    // ------------------------------------------------------------------
    // STATE
    // ------------------------------------------------------------------
    var state = {
        activeSessions: 0,
        totalDemos: 0,
        reportsGenerated: 0,
        events: [],
        productCounts: {}
    };
    var countdown = 5;

    // Initialize product counts
    PRODUCTS.forEach(function (p) { state.productCounts[p.name] = 0; });

    // ------------------------------------------------------------------
    // HELPERS
    // ------------------------------------------------------------------
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function timeAgo(ts) {
        var diff = Math.floor((Date.now() - ts) / 1000);
        if (diff < 5)  return 'just now';
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        return Math.floor(diff / 3600) + 'h ago';
    }

    function generateMockEvent() {
        var t = pick(EVENT_TEMPLATES);
        var prod = pick(PRODUCTS);
        var text = t.tpl
            .replace('{name}', pick(NAMES))
            .replace('{company}', pick(COMPANIES))
            .replace('{product}', prod.name);

        // Track product popularity
        if (t.type === 'session') {
            state.productCounts[prod.name] = (state.productCounts[prod.name] || 0) + 1;
        }

        return { type: t.type, text: text, ts: Date.now() };
    }

    function generateMockState() {
        state.activeSessions = Math.max(1, state.activeSessions + Math.floor(Math.random() * 3) - 1);
        state.totalDemos += Math.floor(Math.random() * 2);
        state.reportsGenerated += Math.floor(Math.random() * 2);

        if (state.totalDemos < state.activeSessions) state.totalDemos = state.activeSessions;
        if (state.reportsGenerated > state.totalDemos) state.reportsGenerated = state.totalDemos;

        var n = 1 + Math.floor(Math.random() * 2);
        for (var i = 0; i < n; i++) {
            state.events.unshift(generateMockEvent());
        }
        if (state.events.length > 25) state.events.length = 25;
    }

    // ------------------------------------------------------------------
    // RENDERING
    // ------------------------------------------------------------------
    function animateValue(el, newVal) {
        var old = parseInt(el.textContent, 10) || 0;
        if (old === newVal) return;
        el.textContent = newVal;
        el.setAttribute('data-animate', '');
        setTimeout(function () { el.removeAttribute('data-animate'); }, 400);
    }

    function renderCards() {
        animateValue(document.getElementById('activeSessions'),   state.activeSessions);
        animateValue(document.getElementById('totalDemos'),       state.totalDemos);
        animateValue(document.getElementById('reportsGenerated'), state.reportsGenerated);
    }

    function renderRingChart() {
        var total = state.activeSessions + state.totalDemos + state.reportsGenerated;
        if (total === 0) total = 1;

        var s = (state.activeSessions / total) * CIRC;
        var d = (state.totalDemos / total) * CIRC;
        var r = (state.reportsGenerated / total) * CIRC;

        document.getElementById('ringSession').setAttribute('stroke-dasharray', s + ' ' + (CIRC - s));
        document.getElementById('ringDemo').setAttribute('stroke-dasharray', d + ' ' + (CIRC - d));
        document.getElementById('ringDemo').setAttribute('stroke-dashoffset', -s + '');
        document.getElementById('ringReport').setAttribute('stroke-dasharray', r + ' ' + (CIRC - r));
        document.getElementById('ringReport').setAttribute('stroke-dashoffset', -(s + d) + '');

        document.getElementById('ringTotal').textContent = state.activeSessions + state.totalDemos + state.reportsGenerated;
        document.getElementById('legendSessions').textContent = state.activeSessions;
        document.getElementById('legendDemos').textContent = state.totalDemos;
        document.getElementById('legendReports').textContent = state.reportsGenerated;
    }

    function renderProducts() {
        var sorted = PRODUCTS.slice().sort(function (a, b) {
            return (state.productCounts[b.name] || 0) - (state.productCounts[a.name] || 0);
        });
        var max = state.productCounts[sorted[0].name] || 1;

        var list = document.getElementById('productList');
        list.innerHTML = '';
        sorted.slice(0, 5).forEach(function (p, i) {
            var count = state.productCounts[p.name] || 0;
            var pct = Math.round((count / max) * 100);
            var div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML =
                '<div class="product-rank">' + (i + 1) + '</div>' +
                '<div class="product-info">' +
                    '<div class="product-name">' + p.name + '</div>' +
                    '<div class="product-bar"><div class="product-bar-fill" style="width:' + pct + '%;background:' + p.color + '"></div></div>' +
                '</div>' +
                '<div class="product-count">' + count + '</div>';
            list.appendChild(div);
        });
    }

    function renderFeed() {
        var list = document.getElementById('feedList');
        list.innerHTML = '';
        state.events.forEach(function (ev) {
            var li = document.createElement('li');
            li.className = 'feed-item';
            li.innerHTML =
                '<span class="feed-dot feed-dot--' + ev.type + '"></span>' +
                '<div class="feed-content">' +
                    '<div class="feed-text">' + ev.text + '</div>' +
                    '<div class="feed-time">' + timeAgo(ev.ts) + '</div>' +
                '</div>';
            list.appendChild(li);
        });
    }

    function renderClock() {
        var now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderAll() {
        renderCards();
        renderRingChart();
        renderProducts();
        renderFeed();
    }

    // ------------------------------------------------------------------
    // DATA FETCH (with mock fallback)
    // ------------------------------------------------------------------
    function fetchData() {
        if (!API_URL) {
            generateMockState();
            renderAll();
            return;
        }

        fetch(API_URL + '/status')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.activeSessions  !== undefined) state.activeSessions  = data.activeSessions;
                if (data.totalDemos      !== undefined) state.totalDemos      = data.totalDemos;
                if (data.reportsGenerated !== undefined) state.reportsGenerated = data.reportsGenerated;
                if (data.events && data.events.length) {
                    state.events = data.events.map(function (e) {
                        return { type: e.type || 'session', text: e.text || e.message, ts: e.ts || Date.now() };
                    });
                }
                renderAll();
            })
            .catch(function () {
                generateMockState();
                renderAll();
            });
    }

    // ------------------------------------------------------------------
    // REFRESH COUNTDOWN
    // ------------------------------------------------------------------
    function tickCountdown() {
        countdown--;
        if (countdown <= 0) {
            fetchData();
            countdown = 5;
        }
        document.getElementById('refreshTimer').textContent = 'Refreshing in ' + countdown + 's';
    }

    // ------------------------------------------------------------------
    // BOOT
    // ------------------------------------------------------------------
    for (var i = 0; i < 8; i++) {
        var ev = generateMockEvent();
        ev.ts = Date.now() - (i * 15000);
        state.events.push(ev);
    }
    state.activeSessions   = 3;
    state.totalDemos       = 14;
    state.reportsGenerated = 9;

    // Seed product counts
    PRODUCTS.forEach(function (p, i) {
        state.productCounts[p.name] = Math.max(1, Math.floor(Math.random() * 8) + (7 - i));
    });

    renderAll();
    renderClock();
    setInterval(renderClock, 1000);
    setInterval(tickCountdown, 1000);

})();
</script>

<script src="components/timeline.js"></script>
<script>
    new BoothTimeline({ container: '#timeline-mount' });
</script>
