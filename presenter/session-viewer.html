<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="components/error-boundary.js"></script>
<script src="components/nav.js"></script>
<script src="components/annotator-overlay.js"></script>
<title>BoothApp — Session Viewer</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
<script src="auth.js"></script>
<link rel="stylesheet" href="styles/mobile.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f78166;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Loading / Error ─────────────────────────────────── */
  #loading, #error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    padding: 24px;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error { color: var(--red); }
  #error .msg { max-width: 500px; text-align: center; color: var(--text2); }

  .hidden { display: none !important; }

  /* ── Top bar ───────────────────────────────────────────── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-left a {
    color: var(--text2);
    text-decoration: none;
    font-size: 14px;
  }
  .topbar-left a:hover { color: var(--accent); }
  .topbar-left .sep { color: var(--text3); }
  .topbar-left .session-id {
    font-family: monospace;
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text3);
  }
  .topbar-right a {
    color: var(--text3);
    text-decoration: none;
  }
  .topbar-right a:hover { color: var(--accent); }

  /* ── Layout ────────────────────────────────────────────── */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 20px;
  }

  /* ── Card ──────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .icon { font-size: 15px; }
  .card-body { padding: 20px; }

  /* ── Visitor Card (spans full width) ───────────────────── */
  .visitor-card { grid-column: 1 / -1; }
  .visitor-info {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .visitor-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    overflow: hidden;
  }
  .visitor-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .visitor-details h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .visitor-details .subtitle {
    font-size: 14px;
    color: var(--text2);
  }
  .visitor-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .chip.accent { background: #1f6feb33; border-color: var(--accent-dim); color: var(--accent); }
  .chip.green  { background: #23863633; border-color: #238636; color: var(--green); }
  .chip.yellow { background: #d2992233; border-color: #d29922; color: var(--yellow); }
  .chip.red    { background: #f8514933; border-color: #f85149; color: var(--red); }
  .chip.purple { background: #bc8cff22; border-color: #8b5cf6; color: var(--purple); }

  /* ── Score Badge ───────────────────────────────────────── */
  .score-badge {
    margin-left: auto;
    text-align: center;
    padding: 0 16px;
  }
  .score-badge .score-value {
    font-size: 36px;
    font-weight: 700;
    font-family: monospace;
    line-height: 1;
  }
  .score-badge .score-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* ── Timeline ──────────────────────────────────────────── */
  .timeline-card { grid-column: 1; grid-row: 2 / 4; }
  .timeline-scroll {
    max-height: 700px;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 6px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .tl-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #21262d;
    position: relative;
  }
  .tl-item:last-child { border-bottom: none; }

  .tl-time {
    font-family: monospace;
    font-size: 12px;
    color: var(--text3);
    min-width: 50px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .tl-body { flex: 1; min-width: 0; }
  .tl-desc {
    font-size: 14px;
    color: var(--text);
    word-wrap: break-word;
  }
  .tl-page {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tl-thumb {
    width: 120px;
    height: 68px;
    border-radius: 6px;
    border: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface2);
    cursor: pointer;
  }
  .tl-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Transcript ────────────────────────────────────────── */
  .transcript-card { grid-column: 2; grid-row: 2; }
  .transcript-scroll {
    max-height: 340px;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .transcript-scroll::-webkit-scrollbar { width: 6px; }
  .transcript-scroll::-webkit-scrollbar-track { background: transparent; }
  .transcript-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .t-entry {
    display: flex;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
    line-height: 1.5;
  }
  .t-ts {
    font-family: monospace;
    font-size: 11px;
    color: var(--text3);
    min-width: 65px;
    flex-shrink: 0;
    padding-top: 3px;
  }
  .t-speaker {
    font-weight: 700;
    min-width: 55px;
    flex-shrink: 0;
  }
  .t-speaker.se { color: var(--accent); }
  .t-speaker.visitor { color: var(--green); }
  .t-text { color: var(--text); }

  /* ── Analysis Summary ──────────────────────────────────── */
  .analysis-card { grid-column: 2; grid-row: 3; }
  .analysis-scroll {
    max-height: 340px;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .analysis-scroll::-webkit-scrollbar { width: 6px; }
  .analysis-scroll::-webkit-scrollbar-track { background: transparent; }
  .analysis-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .summary-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .section-label:first-child { margin-top: 0; }

  /* products list */
  .products-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  /* interests table */
  .interests-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .interests-tbl th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .interests-tbl td {
    padding: 8px;
    border-bottom: 1px solid #21262d;
    vertical-align: top;
  }
  .confidence-high   { color: var(--green); }
  .confidence-medium { color: var(--yellow); }
  .confidence-low    { color: var(--text3); }

  /* follow-up actions */
  .actions-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .actions-list li {
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .actions-list li:last-child { border-bottom: none; }
  .actions-list .arrow {
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* key moments */
  .moment-item {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }
  .moment-ts {
    font-family: monospace;
    font-size: 12px;
    color: var(--text3);
    min-width: 60px;
    flex-shrink: 0;
  }
  .moment-desc {
    font-size: 13px;
    color: var(--text);
  }
  .moment-impact {
    font-size: 12px;
    color: var(--yellow);
    margin-top: 2px;
  }

  /* ── Lightbox ──────────────────────────────────────────── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  /* ── Notes Panel ──────────────────────────────────────── */
  .notes-card { grid-column: 1 / -1; }
  .notes-textarea {
    width: 100%;
    min-height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    padding: 12px;
    resize: vertical;
  }
  .notes-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .notes-textarea::placeholder { color: var(--text3); }
  .notes-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }
  .notes-save-btn {
    background: var(--accent-dim);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .notes-save-btn:hover { background: var(--accent); }
  .notes-save-btn:disabled { opacity: 0.5; cursor: default; }
  .notes-status {
    font-size: 12px;
    color: var(--text3);
  }
  .notes-status.ok { color: var(--green); }
  .notes-status.err { color: var(--red); }

  /* ── Empty state ───────────────────────────────────────── */
  .empty {
    color: var(--text3);
    font-style: italic;
    font-size: 14px;
    padding: 12px 0;
  }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
      padding: 16px;
    }
    .timeline-card { grid-column: 1; grid-row: auto; }
    .transcript-card { grid-column: 1; grid-row: auto; }
    .analysis-card { grid-column: 1; grid-row: auto; }
    .timeline-scroll, .transcript-scroll, .analysis-scroll { max-height: 500px; }
    .visitor-info { flex-wrap: wrap; }
    .score-badge { margin-left: 0; margin-top: 12px; }
  }
  @media (max-width: 480px) {
    .topbar { padding: 10px 12px; flex-wrap: wrap; }
    .layout { padding: 10px; gap: 12px; }
    .tl-thumb { width: 80px; height: 45px; }
    .visitor-avatar { width: 56px; height: 56px; font-size: 22px; }
    .visitor-details h2 { font-size: 18px; }
  }

  /* ── Event Feed Sidebar ────────────────────────────────── */
  .event-feed-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .event-feed-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .event-feed-toggle.active { border-color: var(--accent); color: var(--accent); background: #1f6feb22; }
  .event-feed-toggle .feed-count {
    background: var(--accent-dim);
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    min-width: 18px;
    text-align: center;
  }

  .event-feed {
    position: fixed;
    top: 0;
    right: 0;
    width: 360px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .event-feed.open { transform: translateX(0); }
  body.feed-open .layout { margin-right: 360px; }
  body.feed-open .topbar { margin-right: 360px; }

  .feed-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .feed-header-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text2);
  }
  .feed-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .feed-close:hover { color: var(--text); background: var(--surface2); }

  .feed-filters {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .feed-filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    cursor: pointer;
  }
  .feed-filter-btn:hover { color: var(--text2); border-color: var(--text3); }
  .feed-filter-btn.active { color: var(--accent); border-color: var(--accent-dim); background: #1f6feb22; }

  .feed-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .feed-scroll::-webkit-scrollbar { width: 5px; }
  .feed-scroll::-webkit-scrollbar-track { background: transparent; }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .feed-item {
    padding: 8px 16px;
    border-bottom: 1px solid #21262d;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 13px;
    transition: background 0.15s;
  }
  .feed-item:hover { background: var(--surface2); }
  .feed-item.new-item { animation: feedFlash 1s ease; }
  @keyframes feedFlash {
    0% { background: #1f6feb33; }
    100% { background: transparent; }
  }

  .feed-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .feed-icon.click { background: #58a6ff22; color: var(--accent); }
  .feed-icon.transcript { background: #3fb95022; color: var(--green); }
  .feed-icon.screenshot { background: #bc8cff22; color: var(--purple); }
  .feed-icon.analysis { background: #d2992222; color: var(--yellow); }
  .feed-icon.session { background: #f8514922; color: var(--red); }

  .feed-content { flex: 1; min-width: 0; }
  .feed-text {
    color: var(--text);
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .feed-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .feed-ts {
    font-family: monospace;
    font-size: 11px;
    color: var(--text3);
    min-width: 50px;
    flex-shrink: 0;
    text-align: right;
    padding-top: 2px;
  }

  .feed-status {
    padding: 6px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .feed-status .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .feed-status .pulse.inactive { background: var(--text3); animation: none; }

  @media (max-width: 900px) {
    .event-feed { width: 300px; }
    body.feed-open .layout { margin-right: 300px; }
    body.feed-open .topbar { margin-right: 300px; }
  }
  @media (max-width: 600px) {
    .event-feed { width: 100vw; }
    body.feed-open .layout { margin-right: 0; }
    body.feed-open .topbar { margin-right: 0; }
  }
</style>
</head>
<body>
<script>
if (!BoothAuth.requireAwsCreds()) {
  window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
} else if (!BoothAuth.requireLogin()) { /* redirects */ }
</script>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--text2)">Loading session data...</div>
</div>

<!-- Error -->
<div id="error" class="hidden">
  <div style="font-size:18px;font-weight:600">Failed to load session</div>
  <div class="msg" id="error-msg"></div>
  <a href="sessions.html" style="color:var(--accent);margin-top:12px">Back to Sessions</a>
</div>

<!-- Main Content -->
<div id="app" class="hidden">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="sessions.html">Sessions</a>
      <span class="sep">/</span>
      <span class="session-id" id="topbar-sid"></span>
    </div>
    <div class="topbar-right">
      <a href="timeline.html" id="link-timeline">Timeline</a>
      <a href="replay.html" id="link-replay">Replay</a>
      <a href="session.html" id="link-live">Live View</a>
      <a href="email-generator.html" id="link-email">Email</a>
      <a href="#" id="link-print" style="cursor:pointer">Print Report</a>
      <button class="event-feed-toggle" id="feed-toggle">[&gt;] Feed <span class="feed-count" id="feed-count">0</span></button>
      <span id="auth-user" style="font-family:monospace"></span>
      <a href="#" id="logout-link">logout</a>
    </div>
  </div>

  <div class="layout">
    <!-- Visitor Info Card -->
    <div class="card visitor-card">
      <div class="card-header"><span class="icon">[i]</span> Visitor</div>
      <div class="card-body">
        <div class="visitor-info" id="visitor-info">
          <div class="visitor-avatar" id="visitor-avatar">?</div>
          <div class="visitor-details">
            <h2 id="v-name">--</h2>
            <div class="subtitle" id="v-subtitle"></div>
            <div class="visitor-meta" id="v-meta"></div>
          </div>
          <div class="score-badge" id="score-badge" class="hidden">
            <div class="score-value" id="score-value">--</div>
            <div class="score-label">Engagement</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card timeline-card">
      <div class="card-header"><span class="icon">[~]</span> Session Timeline</div>
      <div class="timeline-scroll" id="timeline"></div>
    </div>

    <!-- Transcript -->
    <div class="card transcript-card">
      <div class="card-header"><span class="icon">["]</span> Transcript</div>
      <div class="transcript-scroll" id="transcript"></div>
    </div>

    <!-- Analysis Summary + Products + Follow-up -->
    <div class="card analysis-card">
      <div class="card-header"><span class="icon">[*]</span> Analysis</div>
      <div class="analysis-scroll" id="analysis"></div>
    </div>

    <!-- Session Notes -->
    <div class="card notes-card">
      <div class="card-header"><span class="icon">[#]</span> Session Notes</div>
      <div class="card-body">
        <textarea class="notes-textarea" id="notes-text" placeholder="Add follow-up notes, deal stage, next steps..."></textarea>
        <div class="notes-footer">
          <button class="notes-save-btn" id="notes-save">Save Notes</button>
          <span class="notes-status" id="notes-status"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Event Feed Sidebar -->
<div class="event-feed" id="event-feed">
  <div class="feed-header">
    <span class="feed-header-title">Event Feed</span>
    <button class="feed-close" id="feed-close">x</button>
  </div>
  <div class="feed-filters" id="feed-filters">
    <button class="feed-filter-btn active" data-type="all">All</button>
    <button class="feed-filter-btn" data-type="click">Clicks</button>
    <button class="feed-filter-btn" data-type="transcript">Transcript</button>
    <button class="feed-filter-btn" data-type="screenshot">Screenshots</button>
    <button class="feed-filter-btn" data-type="analysis">Analysis</button>
    <button class="feed-filter-btn" data-type="session">Session</button>
  </div>
  <div class="feed-scroll" id="feed-scroll"></div>
  <div class="feed-status" id="feed-status">
    <span class="pulse" id="feed-pulse"></span>
    <span id="feed-status-text">Loading...</span>
  </div>
</div>

<script>
(function () {
  // ── Config ──────────────────────────────────────────────────────
  var BUCKET = "boothapp-sessions-752266476357";
  var REGION = "us-east-1";

  var ak = localStorage.getItem("boothapp_aws_ak");
  var sk = localStorage.getItem("boothapp_aws_sk");
  if (ak && sk) {
    AWS.config.update({ accessKeyId: ak, secretAccessKey: sk, region: REGION });
  }
  var s3 = new AWS.S3({ params: { Bucket: BUCKET } });

  // ── URL Params ──────────────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get("session") || "";

  if (!sessionId) {
    showError("No session ID provided. Add ?session=<id> to the URL.");
    return;
  }

  // ── Elements ────────────────────────────────────────────────────
  var loadingEl = document.getElementById("loading");
  var errorEl   = document.getElementById("error");
  var appEl     = document.getElementById("app");

  document.getElementById("topbar-sid").textContent = sessionId;
  document.getElementById("link-timeline").href = "timeline.html?session=" + encodeURIComponent(sessionId);
  document.getElementById("link-replay").href = "replay.html?session=" + encodeURIComponent(sessionId);
  document.getElementById("link-live").href = "session.html?session=" + encodeURIComponent(sessionId);
  document.getElementById("link-email").href = "email-generator.html?session=" + encodeURIComponent(sessionId);
  document.getElementById("link-print").addEventListener("click", function (e) {
    e.preventDefault();
    openPrintReport();
  });
  document.getElementById("auth-user").textContent = BoothAuth.currentUser() || "";
  document.getElementById("logout-link").addEventListener("click", function (e) {
    e.preventDefault();
    BoothAuth.logout();
  });

  // ── Helpers ─────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return "";
    var d = document.createElement("div");
    d.textContent = String(str);
    return d.innerHTML;
  }

  function show(screen) {
    loadingEl.style.display = screen === "loading" ? "flex" : "none";
    errorEl.style.display   = screen === "error"   ? "flex" : "none";
    appEl.style.display     = screen === "app"     ? "block" : "none";
  }

  function showError(msg) {
    document.getElementById("error-msg").textContent = msg;
    show("error");
  }

  function fetchS3Json(key) {
    return new Promise(function (resolve, reject) {
      s3.getObject({ Key: key }, function (err, data) {
        if (err) { reject(err); return; }
        try { resolve(JSON.parse(data.Body.toString())); }
        catch (e) { reject(e); }
      });
    });
  }

  function fetchS3ImageUrl(key) {
    return new Promise(function (resolve) {
      s3.getObject({ Key: key }, function (err, data) {
        if (err) { resolve(null); return; }
        try {
          var blob = new Blob([data.Body], { type: "image/jpeg" });
          resolve(URL.createObjectURL(blob));
        } catch (e) { resolve(null); }
      });
    });
  }

  function formatRelTime(isoStr, startIso) {
    var start = new Date(startIso).getTime();
    var t = new Date(isoStr).getTime();
    var diff = Math.max(0, Math.floor((t - start) / 1000));
    var m = Math.floor(diff / 60);
    var ss = diff % 60;
    return (m < 10 ? "0" : "") + m + ":" + (ss < 10 ? "0" : "") + ss;
  }

  function formatDuration(startIso, endIso) {
    if (!startIso) return "--";
    var end = endIso || new Date().toISOString();
    var ms = new Date(end).getTime() - new Date(startIso).getTime();
    var mins = Math.round(ms / 60000);
    return mins + " min";
  }

  function formatDate(iso) {
    if (!iso) return "--";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "--";
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) +
      " " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  }

  // ── Lightbox / Annotator ─────────────────────────────────────────
  var _screenshotFileMap = {}; // url -> screenshotFile name mapping
  function openLightbox(src, screenshotFile) {
    if (typeof BoothAnnotator !== 'undefined') {
      new BoothAnnotator(document.body, src, {
        sessionId: sessionId,
        screenshotFile: screenshotFile || _screenshotFileMap[src] || '',
        s3: s3,
        bucket: BUCKET
      });
    } else {
      var lb = document.createElement("div");
      lb.className = "lightbox";
      var img = document.createElement("img");
      img.src = src;
      img.alt = "Screenshot";
      lb.appendChild(img);
      lb.addEventListener("click", function () { document.body.removeChild(lb); });
      document.body.appendChild(lb);
    }
  }
  window.openLightbox = openLightbox;

  // ── Load All Data ───────────────────────────────────────────────
  var prefix = "sessions/" + sessionId + "/";

  var metadataP   = fetchS3Json(prefix + "metadata.json").catch(function () { return null; });
  var clicksP     = fetchS3Json(prefix + "clicks/clicks.json").catch(function () { return null; });
  var transcriptP = fetchS3Json(prefix + "transcript/transcript.json").catch(function () { return null; });
  var summaryP    = fetchS3Json(prefix + "output/summary.json").catch(function () { return null; });
  var followUpP   = fetchS3Json(prefix + "output/follow-up.json").catch(function () { return null; });

  Promise.all([metadataP, clicksP, transcriptP, summaryP, followUpP])
    .then(function (results) {
      var metadata   = results[0];
      var clicks     = results[1];
      var transcript = results[2];
      var summary    = results[3];
      var followUp   = results[4];

      if (!metadata) {
        showError("Session not found: " + sessionId);
        return;
      }

      show("app");
      renderVisitorCard(metadata, summary);
      renderTimeline(clicks, metadata);
      renderTranscript(transcript);
      renderAnalysis(summary, followUp);
      renderEventFeed(clicks, transcript, metadata, summary);
    })
    .catch(function (err) {
      showError("Error loading session data: " + (err.message || err));
    });

  // ── Render: Visitor Card ────────────────────────────────────────
  function renderVisitorCard(meta, summary) {
    var nameEl = document.getElementById("v-name");
    var subEl  = document.getElementById("v-subtitle");
    var metaEl = document.getElementById("v-meta");
    var avatarEl = document.getElementById("visitor-avatar");

    nameEl.textContent = meta.visitor_name || "Unknown Visitor";

    // Build subtitle from company + title
    var parts = [];
    if (meta.visitor_title) parts.push(meta.visitor_title);
    if (meta.visitor_company) parts.push(meta.visitor_company);
    subEl.textContent = parts.join(" at ") || "";

    // Avatar initials
    var initials = (meta.visitor_name || "?").split(" ").map(function (w) { return w[0]; }).join("").substring(0, 2).toUpperCase();
    avatarEl.textContent = initials;

    // Try loading badge photo
    fetchS3ImageUrl(prefix + "badge.jpg").then(function (url) {
      if (url) {
        avatarEl.textContent = "";
        var img = document.createElement("img");
        img.src = url;
        img.alt = "Badge";
        avatarEl.appendChild(img);
      }
    });

    // Meta chips
    var chips = [];
    chips.push('<span class="chip accent">' + esc(formatDuration(meta.started_at, meta.ended_at)) + '</span>');
    chips.push('<span class="chip">' + esc(formatDate(meta.started_at)) + '</span>');
    if (meta.se_name) chips.push('<span class="chip">SE: ' + esc(meta.se_name) + '</span>');
    if (meta.demo_pc) chips.push('<span class="chip">' + esc(meta.demo_pc) + '</span>');
    if (meta.status) {
      var st = meta.status.toLowerCase();
      var cls = "chip";
      if (st === "completed" || st === "analyzed" || st === "ended") cls = "chip green";
      else if (st === "recording" || st === "active") cls = "chip red";
      else if (st === "processing") cls = "chip yellow";
      chips.push('<span class="' + cls + '">' + esc(meta.status) + '</span>');
    }
    metaEl.innerHTML = chips.join("");

    // Score badge
    if (summary && summary.session_score != null) {
      var scoreEl = document.getElementById("score-value");
      scoreEl.textContent = summary.session_score;
      var scoreNum = Number(summary.session_score);
      if (scoreNum >= 7) scoreEl.style.color = "var(--green)";
      else if (scoreNum >= 4) scoreEl.style.color = "var(--yellow)";
      else scoreEl.style.color = "var(--red)";
    }
  }

  // ── Render: Timeline ────────────────────────────────────────────
  function renderTimeline(clicks, meta) {
    var container = document.getElementById("timeline");
    var events = (clicks && clicks.events) ? clicks.events : [];

    if (events.length === 0) {
      container.innerHTML = '<div class="empty">No click events recorded</div>';
      return;
    }

    var startIso = meta.started_at || "";

    // First pass: render with placeholder thumbnails, then load images async
    var html = "";
    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      var relTime = startIso ? formatRelTime(ev.timestamp, startIso) : "#" + ev.index;
      var desc = ev.element ? (ev.element.text || ev.dom_path || "Click") : "Click";
      var pageInfo = ev.page_title || ev.page_url || "";

      html += '<div class="tl-item">' +
        '<div class="tl-time">' + esc(relTime) + '</div>' +
        '<div class="tl-body">' +
          '<div class="tl-desc">' + esc(desc) + '</div>' +
          (pageInfo ? '<div class="tl-page">' + esc(pageInfo) + '</div>' : '') +
        '</div>';

      if (ev.screenshot_file) {
        var ssFile = ev.screenshot_file.replace(/^screenshots\//, "");
        html += '<div class="tl-thumb" data-ss="' + esc(ssFile) + '" id="thumb-' + i + '">' +
          '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;color:var(--text3)">...</div>' +
          '</div>';
      }

      html += '</div>';
    }
    container.innerHTML = html;

    // Async load screenshot thumbnails
    for (var j = 0; j < events.length; j++) {
      if (events[j].screenshot_file) {
        (function (idx) {
          var ssFile = events[idx].screenshot_file.replace(/^screenshots\//, "");
          var key = prefix + "screenshots/" + ssFile;
          fetchS3ImageUrl(key).then(function (url) {
            if (!url) return;
            var thumbEl = document.getElementById("thumb-" + idx);
            if (!thumbEl) return;
            thumbEl.innerHTML = "";
            var img = document.createElement("img");
            img.src = url;
            img.alt = "Screenshot";
            img.loading = "lazy";
            thumbEl.appendChild(img);
            _screenshotFileMap[url] = ssFile;
            thumbEl.addEventListener("click", function () { openLightbox(url, ssFile); });
          });
        })(j);
      }
    }
  }

  // ── Render: Transcript ──────────────────────────────────────────
  function renderTranscript(transcript) {
    var container = document.getElementById("transcript");

    if (!transcript || !transcript.entries || transcript.entries.length === 0) {
      container.innerHTML = '<div class="empty" style="padding:16px 20px">No transcript available</div>';
      return;
    }

    var html = "";
    for (var i = 0; i < transcript.entries.length; i++) {
      var entry = transcript.entries[i];
      var speakerCls = (entry.speaker || "").toLowerCase() === "se" ? "se" : "visitor";
      html += '<div class="t-entry">' +
        '<span class="t-ts">' + esc(entry.timestamp) + '</span>' +
        '<span class="t-speaker ' + speakerCls + '">' + esc(entry.speaker) + '</span>' +
        '<span class="t-text">' + esc(entry.text) + '</span>' +
        '</div>';
    }
    container.innerHTML = html;
  }

  // ── Render: Analysis (summary + products + follow-up) ───────────
  function renderAnalysis(summary, followUp) {
    var container = document.getElementById("analysis");

    if (!summary && !followUp) {
      container.innerHTML = '<div class="empty" style="padding:16px 20px">Analysis not yet available</div>';
      return;
    }

    var html = "";

    // Executive summary
    if (summary && summary.executive_summary) {
      html += '<div class="summary-text">' + esc(summary.executive_summary) + '</div>';
    }

    // Products demonstrated
    if (summary && summary.products_demonstrated && summary.products_demonstrated.length) {
      html += '<div class="section-label">Products Demonstrated</div>';
      html += '<div class="products-list">';
      for (var i = 0; i < summary.products_demonstrated.length; i++) {
        html += '<span class="chip purple">' + esc(summary.products_demonstrated[i]) + '</span>';
      }
      html += '</div>';
    }

    // Key interests
    if (summary && summary.key_interests && summary.key_interests.length) {
      html += '<div class="section-label">Visitor Interests</div>';
      html += '<table class="interests-tbl"><thead><tr><th>Topic</th><th>Confidence</th><th>Evidence</th></tr></thead><tbody>';
      for (var k = 0; k < summary.key_interests.length; k++) {
        var interest = summary.key_interests[k];
        var confCls = "confidence-" + (interest.confidence || "low").toLowerCase();
        html += '<tr>' +
          '<td style="font-weight:500;color:var(--text)">' + esc(interest.topic) + '</td>' +
          '<td><span class="' + confCls + '" style="font-size:12px;text-transform:uppercase;letter-spacing:0.05em">' + esc(interest.confidence) + '</span></td>' +
          '<td style="color:var(--text2);font-size:13px">' + esc(interest.evidence) + '</td>' +
          '</tr>';
      }
      html += '</tbody></table>';
    }

    // Key moments
    if (summary && summary.key_moments && summary.key_moments.length) {
      html += '<div class="section-label">Key Moments</div>';
      for (var m = 0; m < summary.key_moments.length; m++) {
        var moment = summary.key_moments[m];
        html += '<div class="moment-item">' +
          '<span class="moment-ts">' + esc(moment.timestamp) + '</span>' +
          '<div>' +
            '<div class="moment-desc">' + esc(moment.description) + '</div>' +
            (moment.impact ? '<div class="moment-impact">' + esc(moment.impact) + '</div>' : '') +
          '</div>' +
          '</div>';
      }
    }

    // Follow-up actions
    var actions = (summary && summary.follow_up_actions) ? summary.follow_up_actions : [];
    if (actions.length > 0) {
      html += '<div class="section-label">Follow-up Actions</div>';
      html += '<ul class="actions-list">';
      for (var a = 0; a < actions.length; a++) {
        html += '<li><span class="arrow">></span><span>' + esc(actions[a]) + '</span></li>';
      }
      html += '</ul>';
    }

    // Follow-up metadata (priority, tags)
    if (followUp) {
      if (followUp.priority) {
        var pColor = { high: "var(--red)", medium: "var(--yellow)", low: "var(--text3)" };
        var pc = pColor[(followUp.priority || "").toLowerCase()] || pColor.medium;
        html += '<div style="margin-top:16px;display:flex;gap:10px;align-items:center">' +
          '<span class="section-label" style="margin:0">Priority</span>' +
          '<span style="color:' + pc + ';font-weight:700;text-transform:uppercase;font-size:13px">' + esc(followUp.priority) + '</span>' +
          '</div>';
      }
      if (followUp.tags && followUp.tags.length) {
        html += '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">';
        for (var t = 0; t < followUp.tags.length; t++) {
          html += '<span class="chip">' + esc(followUp.tags[t]) + '</span>';
        }
        html += '</div>';
      }
      if (followUp.sdr_notes) {
        html += '<div class="section-label">SDR Notes</div>' +
          '<div style="font-size:13px;color:var(--text2);background:var(--surface2);padding:12px;border-radius:8px;border:1px solid var(--border)">' +
          esc(followUp.sdr_notes) + '</div>';
      }
    }

    container.innerHTML = html || '<div class="empty">No analysis data</div>';
  }

  // ── Notes ──────────────────────────────────────────────────────────
  var notesKey = prefix + "output/notes.json";
  var notesTextEl = document.getElementById("notes-text");
  var notesSaveBtn = document.getElementById("notes-save");
  var notesStatusEl = document.getElementById("notes-status");

  // Load existing notes
  fetchS3Json(notesKey).then(function (data) {
    if (data && data.text) {
      notesTextEl.value = data.text;
    }
  }).catch(function () { /* no notes yet */ });

  notesSaveBtn.addEventListener("click", function () {
    var text = notesTextEl.value;
    notesSaveBtn.disabled = true;
    notesStatusEl.textContent = "Saving...";
    notesStatusEl.className = "notes-status";

    var payload = JSON.stringify({
      session_id: sessionId,
      text: text,
      updated_at: new Date().toISOString(),
      updated_by: BoothAuth.currentUser() || "unknown"
    });

    s3.putObject({
      Key: notesKey,
      Body: payload,
      ContentType: "application/json"
    }, function (err) {
      notesSaveBtn.disabled = false;
      if (err) {
        notesStatusEl.textContent = "Error: " + (err.message || "save failed");
        notesStatusEl.className = "notes-status err";
      } else {
        notesStatusEl.textContent = "Saved";
        notesStatusEl.className = "notes-status ok";
        setTimeout(function () { notesStatusEl.textContent = ""; }, 3000);
      }
    });
  });

  // ── Print Report ─────────────────────────────────────────────────
  function openPrintReport() {
    var nameEl = document.getElementById("v-name");
    var subEl = document.getElementById("v-subtitle");
    var visitorName = nameEl ? nameEl.textContent : "Unknown Visitor";
    var visitorSub = subEl ? subEl.textContent : "";
    var metaEl = document.getElementById("v-meta");
    var metaChips = metaEl ? metaEl.innerText.replace(/\s+/g, " ").trim() : "";

    // Gather score
    var scoreVal = document.getElementById("score-value");
    var score = scoreVal ? scoreVal.textContent : "--";

    // Gather analysis content
    var analysisEl = document.getElementById("analysis");
    var summaryText = "";
    var interestsHtml = "";
    var momentsHtml = "";
    var actionsHtml = "";
    var productsText = "";

    if (analysisEl) {
      // Executive summary
      var summaryDiv = analysisEl.querySelector(".summary-text");
      if (summaryDiv) summaryText = summaryDiv.textContent;

      // Products
      var prodList = analysisEl.querySelector(".products-list");
      if (prodList) productsText = prodList.innerText.replace(/\s+/g, ", ").trim();

      // Key interests table
      var intTbl = analysisEl.querySelector(".interests-tbl");
      if (intTbl) {
        var rows = intTbl.querySelectorAll("tbody tr");
        interestsHtml = '<table class="pr-table"><thead><tr><th>Topic</th><th>Confidence</th><th>Evidence</th></tr></thead><tbody>';
        for (var i = 0; i < rows.length; i++) {
          var cells = rows[i].querySelectorAll("td");
          interestsHtml += '<tr>';
          for (var c = 0; c < cells.length; c++) {
            interestsHtml += '<td>' + esc(cells[c].textContent) + '</td>';
          }
          interestsHtml += '</tr>';
        }
        interestsHtml += '</tbody></table>';
      }

      // Key moments
      var moments = analysisEl.querySelectorAll(".moment-item");
      if (moments.length) {
        momentsHtml = '<div class="pr-moments">';
        for (var m = 0; m < moments.length; m++) {
          var ts = moments[m].querySelector(".moment-ts");
          var desc = moments[m].querySelector(".moment-desc");
          var impact = moments[m].querySelector(".moment-impact");
          momentsHtml += '<div class="pr-moment">' +
            '<span class="pr-moment-ts">' + esc(ts ? ts.textContent : "") + '</span>' +
            '<span class="pr-moment-desc">' + esc(desc ? desc.textContent : "") +
            (impact ? ' <em class="pr-moment-impact">(' + esc(impact.textContent) + ')</em>' : '') +
            '</span></div>';
        }
        momentsHtml += '</div>';
      }

      // Follow-up actions
      var actionItems = analysisEl.querySelectorAll(".actions-list li");
      if (actionItems.length) {
        actionsHtml = '<ul class="pr-actions">';
        for (var a = 0; a < actionItems.length; a++) {
          var txt = actionItems[a].textContent.replace(/^>\s*/, "").trim();
          actionsHtml += '<li><input type="checkbox"> ' + esc(txt) + '</li>';
        }
        actionsHtml += '</ul>';
      }
    }

    var printDate = new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });

    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
      '<title>Session Report - ' + esc(visitorName) + '</title>' +
      '<style>' +
      '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }' +
      'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; ' +
        'color: #1a1a1a; line-height: 1.6; padding: 40px; max-width: 800px; margin: 0 auto; background: #fff; }' +
      '.pr-header { border-bottom: 3px solid #e53e3e; padding-bottom: 24px; margin-bottom: 32px; }' +
      '.pr-logo { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }' +
      '.pr-logo-placeholder { width: 140px; height: 40px; border: 2px dashed #ccc; border-radius: 6px; ' +
        'display: flex; align-items: center; justify-content: center; color: #999; font-size: 11px; }' +
      '.pr-logo-text { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }' +
      '.pr-title { font-size: 28px; font-weight: 700; color: #111; margin-bottom: 4px; }' +
      '.pr-subtitle { font-size: 14px; color: #666; }' +
      '.pr-meta { display: flex; gap: 24px; margin-top: 12px; font-size: 13px; color: #555; }' +
      '.pr-meta strong { color: #333; }' +
      '.pr-section { margin-bottom: 28px; }' +
      '.pr-section-title { font-size: 16px; font-weight: 700; color: #222; border-bottom: 1px solid #ddd; ' +
        'padding-bottom: 6px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em; }' +
      '.pr-exec { background: #fafafa; border-left: 3px solid #e53e3e; padding: 16px 20px; ' +
        'font-size: 14px; line-height: 1.8; color: #333; margin-bottom: 8px; }' +

  // ── Event Feed Sidebar ──────────────────────────────────────────
  function renderEventFeed(clicks, transcript, meta, summary) {
    var feedToggle = document.getElementById("feed-toggle");
    var feedPanel = document.getElementById("event-feed");
    var feedClose = document.getElementById("feed-close");
    var feedScroll = document.getElementById("feed-scroll");
    var feedCountEl = document.getElementById("feed-count");
    var feedPulse = document.getElementById("feed-pulse");
    var feedStatusText = document.getElementById("feed-status-text");
    var filtersEl = document.getElementById("feed-filters");

    var startIso = (meta && meta.started_at) || "";
    var isEnded = meta && (meta.status === "completed" || meta.status === "ended" || meta.status === "analyzed");

    // Build unified event list
    var events = [];

    // Session start event
    if (meta && meta.started_at) {
      events.push({
        type: "session",
        ts: meta.started_at,
        text: "Session started",
        meta: meta.se_name ? "SE: " + meta.se_name : ""
      });
    }

    // Click events
    if (clicks && clicks.events) {
      for (var i = 0; i < clicks.events.length; i++) {
        var ev = clicks.events[i];
        var desc = ev.element ? (ev.element.text || ev.dom_path || "Click") : "Click";
        events.push({
          type: ev.screenshot_file ? "screenshot" : "click",
          ts: ev.timestamp,
          text: desc,
          meta: ev.page_title || ev.page_url || ""
        });
      }
    }

    // Transcript segments
    // Transcript timestamps are relative (HH:MM:SS.mmm), convert to ISO using session start
    function relTsToIso(relTs, baseIso) {
      if (!relTs || !baseIso) return baseIso || new Date().toISOString();
      // If already ISO, return as-is
      if (relTs.indexOf("T") !== -1) return relTs;
      var parts = relTs.replace(/\..*$/, "").split(":");
      var secs = 0;
      for (var p = 0; p < parts.length; p++) {
        secs = secs * 60 + Number(parts[p]);
      }
      return new Date(new Date(baseIso).getTime() + secs * 1000).toISOString();
    }

    if (transcript && transcript.entries) {
      for (var j = 0; j < transcript.entries.length; j++) {
        var entry = transcript.entries[j];
        var speaker = entry.speaker || "?";
        var textSnippet = entry.text || "";
        if (textSnippet.length > 80) textSnippet = textSnippet.substring(0, 80) + "...";
        events.push({
          type: "transcript",
          ts: relTsToIso(entry.timestamp, startIso),
          text: speaker + ": " + textSnippet,
          meta: ""
        });
      }
    }

    // Analysis events
    if (summary) {
      var analysisTs = meta.ended_at || meta.started_at || new Date().toISOString();
      events.push({
        type: "analysis",
        ts: analysisTs,
        text: "Analysis complete",
        meta: summary.executive_summary ? summary.executive_summary.substring(0, 60) + "..." : ""
      });
      if (summary.products_demonstrated && summary.products_demonstrated.length) {
        events.push({
          type: "analysis",
          ts: analysisTs,
          text: "Products identified: " + summary.products_demonstrated.join(", "),
          meta: ""
        });
      }
    }

    // Session end event
    if (meta && meta.ended_at) {
      events.push({
        type: "session",
        ts: meta.ended_at,
        text: "Session ended",
        meta: formatDuration(meta.started_at, meta.ended_at)
      });
    }

    // Sort chronologically
    events.sort(function (a, b) {
      return new Date(a.ts).getTime() - new Date(b.ts).getTime();
    });

    // Update count
    feedCountEl.textContent = events.length;

    // Status
    if (isEnded) {
      feedPulse.className = "pulse inactive";
      feedStatusText.textContent = events.length + " events -- session ended";
    } else {
      feedPulse.className = "pulse";
      feedStatusText.textContent = events.length + " events -- live";
    }

    // Icon labels per type
    var iconLabels = { click: "C", transcript: "T", screenshot: "S", analysis: "A", session: "!" };

    // Render events
    var activeFilter = "all";

    function renderFeedItems() {
      var html = "";
      var count = 0;
      for (var k = 0; k < events.length; k++) {
        var e = events[k];
        if (activeFilter !== "all" && e.type !== activeFilter) continue;
        count++;
        var relTime = startIso ? formatRelTime(e.ts, startIso) : "--:--";
        html += '<div class="feed-item" data-type="' + esc(e.type) + '">' +
          '<div class="feed-icon ' + esc(e.type) + '">' + (iconLabels[e.type] || "?") + '</div>' +
          '<div class="feed-content">' +
            '<div class="feed-text">' + esc(e.text) + '</div>' +
            (e.meta ? '<div class="feed-meta">' + esc(e.meta) + '</div>' : '') +
          '</div>' +
          '<div class="feed-ts">' + esc(relTime) + '</div>' +
          '</div>';
      }
      if (count === 0) {
        html = '<div style="padding:24px 16px;color:var(--text3);text-align:center;font-size:13px">No events match filter</div>';
      }
      feedScroll.innerHTML = html;
      // Auto-scroll to bottom
      feedScroll.scrollTop = feedScroll.scrollHeight;
    }

    renderFeedItems();

    // Toggle sidebar
    feedToggle.addEventListener("click", function () {
      var isOpen = feedPanel.classList.toggle("open");
      feedToggle.classList.toggle("active", isOpen);
      document.body.classList.toggle("feed-open", isOpen);
    });

    feedClose.addEventListener("click", function () {
      feedPanel.classList.remove("open");
      feedToggle.classList.remove("active");
      document.body.classList.remove("feed-open");
    });

    // Filter buttons
    var filterBtns = filtersEl.querySelectorAll(".feed-filter-btn");
    for (var f = 0; f < filterBtns.length; f++) {
      filterBtns[f].addEventListener("click", function () {
        activeFilter = this.getAttribute("data-type");
        for (var b = 0; b < filterBtns.length; b++) {
          filterBtns[b].classList.toggle("active", filterBtns[b].getAttribute("data-type") === activeFilter);
        }
        renderFeedItems();
      });
    }
  }

})();
</script>

<button class="fullscreen-toggle" id="fullscreen-toggle" title="Toggle fullscreen">
  <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
</button>
<script>
(function() {
  document.body.classList.add("has-fullscreen");
  var btn = document.getElementById("fullscreen-toggle");
  var expandSvg = '<svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';
  var shrinkSvg = '<svg viewBox="0 0 24 24"><path d="M4 14h6v6m10-10h-6V4m0 16l6-6M14 4l-6 6"/></svg>';
  btn.addEventListener("click", function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function() {});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener("fullscreenchange", function() {
    btn.innerHTML = document.fullscreenElement ? shrinkSvg : expandSvg;
    btn.title = document.fullscreenElement ? "Exit fullscreen" : "Toggle fullscreen";
  });
})();
</script>
