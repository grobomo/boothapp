<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoothApp - Session Viewer</title>
    <style>
        /* ============================================================
           RESET & BASE (matches demo.html)
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red:       #D71920;
            --red-glow:  rgba(215, 25, 32, .35);
            --red-dark:  #A8131A;
            --red-light: #FF4D52;
            --bg:        #06080C;
            --surface:   #0E1118;
            --surface2:  #151920;
            --border:    #1E2330;
            --text:      #F0F2F5;
            --text-dim:  #6B7385;
            --success:   #00E676;
            --blue:      #448AFF;
            --amber:     #FFAB00;
            --error:     #FF5252;
            --warning:   #FFA726;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================================
           ANIMATED BACKGROUND
           ============================================================ */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(215,25,32,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(215,25,32,.03) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridPulse 10s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: .3; }
            50%      { opacity: .7; }
        }

        .bg-glow {
            position: fixed; z-index: 0;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .12;
            animation: drift 25s ease-in-out infinite;
        }
        .bg-glow--1 { top: -300px; left: -200px; width: 800px; height: 800px; background: var(--red); }
        .bg-glow--2 { bottom: -300px; right: -200px; width: 700px; height: 700px; background: var(--red); animation-delay: -12s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(50px, 30px) scale(1.05); }
            66%      { transform: translate(-30px, 50px) scale(.95); }
        }

        /* ============================================================
           LAYOUT
           ============================================================ */
        .container {
            position: relative; z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 36px; height: 36px;
            fill: var(--red);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .page-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dim);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Connection status indicator */
        .conn-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all .3s ease;
        }

        .conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            transition: all .3s ease;
        }

        .conn-status.disconnected {
            border-color: rgba(255, 82, 82, .3);
        }

        .conn-status.disconnected .conn-dot {
            background: var(--error);
            box-shadow: 0 0 8px var(--error);
            animation: pulseRed 1.5s ease-in-out infinite;
        }

        @keyframes pulseRed {
            0%, 100% { opacity: 1; }
            50%      { opacity: .4; }
        }

        .conn-status.disconnected .conn-label {
            color: var(--error);
        }

        /* ============================================================
           SESSION INFO BAR
           ============================================================ */
        .session-info {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .session-visitor {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .visitor-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .visitor-name {
            font-weight: 600;
            font-size: 15px;
        }

        .visitor-company {
            font-size: 12px;
            color: var(--text-dim);
        }

        .session-meta {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 13px;
            color: var(--text-dim);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item svg {
            width: 14px; height: 14px;
            fill: var(--text-dim);
        }

        /* ============================================================
           CONNECTION LOST BANNER
           ============================================================ */
        .banner-lost {
            display: none;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(255, 82, 82, .08), rgba(255, 82, 82, .03));
            border: 1px solid rgba(255, 82, 82, .25);
            border-radius: 12px;
            margin-bottom: 24px;
            animation: bannerSlideIn .4s ease-out;
        }

        .banner-lost.visible {
            display: flex;
        }

        @keyframes bannerSlideIn {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .banner-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(255, 82, 82, .15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .banner-icon svg {
            width: 22px; height: 22px;
            fill: var(--error);
        }

        .banner-body { flex: 1; }

        .banner-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--error);
            margin-bottom: 2px;
        }

        .banner-desc {
            font-size: 13px;
            color: var(--text-dim);
        }

        .btn-retry {
            padding: 8px 20px;
            border: 1px solid rgba(255, 82, 82, .4);
            border-radius: 8px;
            background: rgba(255, 82, 82, .1);
            color: var(--error);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-retry:hover {
            background: rgba(255, 82, 82, .2);
            border-color: rgba(255, 82, 82, .6);
        }

        .btn-retry:active {
            transform: scale(.97);
        }

        .btn-retry.retrying {
            pointer-events: none;
            opacity: .6;
        }

        /* ============================================================
           CONTENT SECTIONS GRID
           ============================================================ */
        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .section-card.full-width {
            grid-column: 1 / -1;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }

        .section-header svg {
            width: 16px; height: 16px;
            fill: var(--text-dim);
        }

        .section-body {
            padding: 20px;
            min-height: 160px;
        }

        /* ============================================================
           PLACEHOLDER / MISSING DATA CARDS
           ============================================================ */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 20px;
            min-height: 140px;
        }

        .placeholder-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 14px;
        }

        .placeholder-icon svg {
            width: 24px; height: 24px;
        }

        .placeholder-icon.missing {
            background: rgba(107, 115, 133, .12);
        }

        .placeholder-icon.missing svg {
            fill: var(--text-dim);
        }

        .placeholder-icon.error {
            background: rgba(255, 82, 82, .12);
        }

        .placeholder-icon.error svg {
            fill: var(--error);
        }

        .placeholder-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .placeholder-title.missing {
            color: var(--text-dim);
        }

        .placeholder-title.error {
            color: var(--error);
        }

        .placeholder-desc {
            font-size: 12px;
            color: var(--text-dim);
            max-width: 280px;
            line-height: 1.5;
        }

        /* ============================================================
           ANALYSIS PROGRESS INDICATOR
           ============================================================ */
        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .progress-ring-wrap {
            position: relative;
            width: 80px; height: 80px;
            margin-bottom: 16px;
        }

        .progress-ring {
            width: 80px; height: 80px;
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: var(--surface2);
            stroke-width: 6;
        }

        .progress-ring-fill {
            fill: none;
            stroke: var(--blue);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 201;
            stroke-dashoffset: 201;
            transition: stroke-dashoffset .6s ease;
        }

        .progress-pct {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--blue);
        }

        .progress-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .progress-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .progress-stages {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-stage {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 6px;
            background: var(--surface2);
            transition: all .3s;
        }

        .progress-stage.active {
            color: var(--blue);
            background: rgba(68, 138, 255, .1);
            border: 1px solid rgba(68, 138, 255, .2);
        }

        .progress-stage.done {
            color: var(--success);
            background: rgba(0, 230, 118, .08);
        }

        .progress-stage-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
        }

        .progress-stage.active .progress-stage-dot {
            background: var(--blue);
            animation: pulseDot 1.2s ease-in-out infinite;
        }

        .progress-stage.done .progress-stage-dot {
            background: var(--success);
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.5); opacity: .5; }
        }

        /* Spinner for indeterminate progress */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--surface2);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin-bottom: 14px;
        }

        /* ============================================================
           TRANSCRIPT CONTENT
           ============================================================ */
        .transcript-lines {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .transcript-line {
            display: flex;
            gap: 10px;
            font-size: 13px;
            line-height: 1.5;
        }

        .transcript-ts {
            color: var(--text-dim);
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: nowrap;
            padding-top: 2px;
            flex-shrink: 0;
        }

        /* ============================================================
           CLICK EVENTS
           ============================================================ */
        .click-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .click-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface2);
            border-radius: 8px;
            font-size: 13px;
        }

        .click-item-ts {
            color: var(--text-dim);
            font-size: 11px;
            font-family: monospace;
            flex-shrink: 0;
        }

        .click-item-el {
            color: var(--blue);
            font-family: monospace;
            font-size: 12px;
        }

        /* ============================================================
           SCREENSHOTS GRID
           ============================================================ */
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .screenshot-thumb {
            aspect-ratio: 16 / 10;
            border-radius: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .screenshot-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* ============================================================
           ANALYSIS RESULTS
           ============================================================ */
        .analysis-result {
            font-size: 13px;
            line-height: 1.6;
        }

        .analysis-section {
            margin-bottom: 16px;
        }

        .analysis-section-title {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .topic-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(68, 138, 255, .1);
            color: var(--blue);
            border: 1px solid rgba(68, 138, 255, .15);
        }

        .score-bar-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .score-bar {
            flex: 1;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .8s ease;
        }

        .score-label {
            font-size: 13px;
            font-weight: 700;
            min-width: 36px;
            text-align: right;
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 800px) {
            .sections-grid { grid-template-columns: 1fr; }
            .container { padding: 20px 16px; }
            .header { flex-direction: column; gap: 12px; }
            .session-info { flex-direction: column; align-items: flex-start; }
            .session-meta { margin-left: 0; }
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>

<!-- Animated background layers -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow--1"></div>
<div class="bg-glow bg-glow--2"></div>

<div class="container">

    <!-- ============ HEADER ============ -->
    <header class="header">
        <div class="header-left">
            <svg class="logo-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <span class="logo-text">BoothApp</span>
            <span class="header-sep"></span>
            <span class="page-title">Session Viewer</span>
        </div>
        <div class="header-right">
            <div class="conn-status" id="connStatus">
                <span class="conn-dot"></span>
                <span class="conn-label">Connected</span>
            </div>
        </div>
    </header>

    <!-- ============ CONNECTION LOST BANNER ============ -->
    <div class="banner-lost" id="bannerLost">
        <div class="banner-icon">
            <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
        </div>
        <div class="banner-body">
            <div class="banner-title">Connection Lost</div>
            <div class="banner-desc" id="bannerDesc">Unable to reach S3. Session data may be stale. Check your network connection.</div>
        </div>
        <button class="btn-retry" id="btnRetry" onclick="retryConnection()">Retry</button>
    </div>

    <!-- ============ SESSION INFO ============ -->
    <div class="session-info" id="sessionInfo">
        <div class="session-visitor">
            <div class="visitor-avatar" id="visitorAvatar">--</div>
            <div>
                <div class="visitor-name" id="visitorName">Loading session...</div>
                <div class="visitor-company" id="visitorCompany"></div>
            </div>
        </div>
        <div class="session-meta">
            <div class="meta-item">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                <span id="sessionDuration">--:--</span>
            </div>
            <div class="meta-item">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <span id="sessionId">--</span>
            </div>
        </div>
    </div>

    <!-- ============ CONTENT SECTIONS ============ -->
    <div class="sections-grid">

        <!-- Transcript -->
        <div class="section-card">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                Transcript
            </div>
            <div class="section-body" id="transcriptBody">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Click Events -->
        <div class="section-card">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><path d="M13.75 8H11V5.25c0-.41-.34-.75-.75-.75s-.75.34-.75.75V8H6.75c-.41 0-.75.34-.75.75s.34.75.75.75H9.5v2.75c0 .41.34.75.75.75s.75-.34.75-.75V9.5h2.75c.41 0 .75-.34.75-.75s-.34-.75-.75-.75zM20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
                Click Events
            </div>
            <div class="section-body" id="clicksBody">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Screenshots -->
        <div class="section-card full-width">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                Screenshots
            </div>
            <div class="section-body" id="screenshotsBody">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Analysis -->
        <div class="section-card full-width">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.82-4 4.03-4h.26C7.11 7.61 9.35 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg>
                AI Analysis
            </div>
            <div class="section-body" id="analysisBody">
                <!-- Filled by JS -->
            </div>
        </div>

    </div>

    <!-- ============ FOOTER ============ -->
    <footer class="footer">
        BoothApp &mdash; Session Viewer &mdash; Hackathon 2026
    </footer>

</div>

<script>
(function () {
    'use strict';

    // ------------------------------------------------------------------
    // CONFIG
    // ------------------------------------------------------------------
    var API_URL = ''; // Set to S3/API endpoint; empty = demo mode
    var POLL_INTERVAL = 5000;
    var RETRY_DELAY = 3000;
    var ANALYSIS_STAGES = ['Transcribe', 'Correlate', 'Analyze'];

    // Parse session ID from URL query string (?session=abc123)
    var params = new URLSearchParams(window.location.search);
    var sessionIdParam = params.get('session') || '';

    // ------------------------------------------------------------------
    // STATE
    // ------------------------------------------------------------------
    var state = {
        connected: true,
        sessionId: sessionIdParam,
        visitor: null,       // { name, company, title, email }
        transcript: null,    // array of { ts, text } or null
        clicks: null,        // array of { timestamp, element, url } or null
        screenshots: null,   // array of URLs or null
        analysis: null,      // { topics, score, insights, stage } or null
        analysisStage: -1,   // -1 = not started, 0-2 = in progress, 3 = done
        analysisPct: 0,
        duration: 0,
        error: null
    };

    var pollTimer = null;
    var progressTimer = null;

    // ------------------------------------------------------------------
    // DOM REFS
    // ------------------------------------------------------------------
    var $connStatus   = document.getElementById('connStatus');
    var $bannerLost   = document.getElementById('bannerLost');
    var $bannerDesc   = document.getElementById('bannerDesc');
    var $btnRetry     = document.getElementById('btnRetry');
    var $visitorAvatar = document.getElementById('visitorAvatar');
    var $visitorName  = document.getElementById('visitorName');
    var $visitorCompany = document.getElementById('visitorCompany');
    var $sessionDuration = document.getElementById('sessionDuration');
    var $sessionId    = document.getElementById('sessionId');
    var $transcriptBody = document.getElementById('transcriptBody');
    var $clicksBody   = document.getElementById('clicksBody');
    var $screenshotsBody = document.getElementById('screenshotsBody');
    var $analysisBody = document.getElementById('analysisBody');

    // ------------------------------------------------------------------
    // CONNECTION STATUS
    // ------------------------------------------------------------------
    function setConnected(isConnected) {
        state.connected = isConnected;
        if (isConnected) {
            $connStatus.classList.remove('disconnected');
            $connStatus.querySelector('.conn-label').textContent = 'Connected';
            $bannerLost.classList.remove('visible');
        } else {
            $connStatus.classList.add('disconnected');
            $connStatus.querySelector('.conn-label').textContent = 'Disconnected';
            $bannerLost.classList.add('visible');
        }
    }

    // ------------------------------------------------------------------
    // RETRY
    // ------------------------------------------------------------------
    window.retryConnection = function () {
        $btnRetry.classList.add('retrying');
        $btnRetry.textContent = 'Retrying...';
        $bannerDesc.textContent = 'Attempting to reconnect...';

        fetchSessionData(function (ok) {
            $btnRetry.classList.remove('retrying');
            $btnRetry.textContent = 'Retry';
            if (ok) {
                setConnected(true);
            } else {
                $bannerDesc.textContent = 'Still unable to reach S3. Check your network and try again.';
            }
        });
    };

    // ------------------------------------------------------------------
    // RENDERING: MISSING DATA PLACEHOLDERS
    // ------------------------------------------------------------------
    function renderMissingPlaceholder(iconPath, title, desc) {
        return '<div class="placeholder">' +
            '<div class="placeholder-icon missing">' +
                '<svg viewBox="0 0 24 24"><path d="' + iconPath + '"/></svg>' +
            '</div>' +
            '<div class="placeholder-title missing">' + title + '</div>' +
            '<div class="placeholder-desc">' + desc + '</div>' +
        '</div>';
    }

    function renderErrorPlaceholder(title, desc) {
        return '<div class="placeholder">' +
            '<div class="placeholder-icon error">' +
                '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>' +
            '</div>' +
            '<div class="placeholder-title error">' + title + '</div>' +
            '<div class="placeholder-desc">' + desc + '</div>' +
        '</div>';
    }

    // ------------------------------------------------------------------
    // RENDERING: TRANSCRIPT
    // ------------------------------------------------------------------
    function renderTranscript() {
        if (state.transcript === null) {
            $transcriptBody.innerHTML = renderMissingPlaceholder(
                'M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z',
                'No Transcript Available',
                'Audio recording was not captured for this session, or transcription has not completed yet.'
            );
            return;
        }
        if (state.transcript.length === 0) {
            $transcriptBody.innerHTML = renderMissingPlaceholder(
                'M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z',
                'Empty Transcript',
                'The audio was recorded but no speech was detected.'
            );
            return;
        }
        var html = '<div class="transcript-lines">';
        state.transcript.forEach(function (line) {
            html += '<div class="transcript-line">' +
                '<span class="transcript-ts">' + formatTimestamp(line.ts) + '</span>' +
                '<span>' + escapeHtml(line.text) + '</span>' +
            '</div>';
        });
        html += '</div>';
        $transcriptBody.innerHTML = html;
    }

    // ------------------------------------------------------------------
    // RENDERING: CLICKS
    // ------------------------------------------------------------------
    function renderClicks() {
        if (state.clicks === null) {
            $clicksBody.innerHTML = renderMissingPlaceholder(
                'M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z',
                'No Click Data',
                'Click tracking was not enabled for this session, or no interactions were recorded.'
            );
            return;
        }
        if (state.clicks.length === 0) {
            $clicksBody.innerHTML = renderMissingPlaceholder(
                'M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z',
                'No Clicks Recorded',
                'The session ran but the visitor did not interact with any elements.'
            );
            return;
        }
        var html = '<div class="click-list">';
        state.clicks.forEach(function (c) {
            html += '<div class="click-item">' +
                '<span class="click-item-ts">' + formatTimestamp(c.timestamp) + '</span>' +
                '<span class="click-item-el">' + escapeHtml(c.element || 'unknown') + '</span>' +
            '</div>';
        });
        html += '</div>';
        $clicksBody.innerHTML = html;
    }

    // ------------------------------------------------------------------
    // RENDERING: SCREENSHOTS
    // ------------------------------------------------------------------
    function renderScreenshots() {
        if (state.screenshots === null) {
            $screenshotsBody.innerHTML = renderMissingPlaceholder(
                'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z',
                'No Screenshots Captured',
                'Screen capture was not enabled or no frames were saved during this session.'
            );
            return;
        }
        if (state.screenshots.length === 0) {
            $screenshotsBody.innerHTML = renderMissingPlaceholder(
                'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z',
                'No Screenshots Available',
                'Screen capture ran but no click-correlated frames were matched.'
            );
            return;
        }
        var html = '<div class="screenshots-grid">';
        state.screenshots.forEach(function (url) {
            html += '<div class="screenshot-thumb"><img src="' + escapeHtml(url) + '" alt="Session screenshot" loading="lazy" onerror="this.parentElement.innerHTML=\'Load failed\'"></div>';
        });
        html += '</div>';
        $screenshotsBody.innerHTML = html;
    }

    // ------------------------------------------------------------------
    // RENDERING: ANALYSIS (with progress indicator)
    // ------------------------------------------------------------------
    function renderAnalysis() {
        // Error state
        if (state.error && state.error.stage) {
            $analysisBody.innerHTML = renderErrorPlaceholder(
                'Analysis Failed',
                'The analysis pipeline failed at the "' + escapeHtml(state.error.stage) + '" stage: ' + escapeHtml(state.error.message || 'Unknown error')
            );
            return;
        }

        // Still processing
        if (state.analysisStage >= 0 && state.analysisStage < ANALYSIS_STAGES.length) {
            var pct = state.analysisPct;
            var circumference = 2 * Math.PI * 32;
            var offset = circumference - (pct / 100) * circumference;

            var remaining = estimateTimeRemaining(state.analysisStage, pct);

            var html = '<div class="progress-container">' +
                '<div class="progress-ring-wrap">' +
                    '<svg class="progress-ring" viewBox="0 0 72 72">' +
                        '<circle class="progress-ring-bg" cx="36" cy="36" r="32"/>' +
                        '<circle class="progress-ring-fill" cx="36" cy="36" r="32" style="stroke-dasharray:' + circumference.toFixed(1) + ';stroke-dashoffset:' + offset.toFixed(1) + '"/>' +
                    '</svg>' +
                    '<div class="progress-pct">' + pct + '%</div>' +
                '</div>' +
                '<div class="progress-label">Analysis in Progress</div>' +
                '<div class="progress-sub">Estimated time remaining: ' + remaining + '</div>' +
                '<div class="progress-stages">';

            ANALYSIS_STAGES.forEach(function (name, i) {
                var cls = '';
                if (i < state.analysisStage) cls = 'done';
                else if (i === state.analysisStage) cls = 'active';
                html += '<div class="progress-stage ' + cls + '">' +
                    '<span class="progress-stage-dot"></span>' + name +
                '</div>';
            });

            html += '</div></div>';
            $analysisBody.innerHTML = html;
            return;
        }

        // Not started yet (no data at all)
        if (state.analysis === null) {
            $analysisBody.innerHTML = renderMissingPlaceholder(
                'M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z',
                'No Analysis Yet',
                'Analysis has not started. It will begin automatically once the session recording completes.'
            );
            return;
        }

        // Analysis complete -- show results
        var a = state.analysis;
        var html = '<div class="analysis-result">';

        // Topics
        if (a.topics && a.topics.length) {
            html += '<div class="analysis-section">' +
                '<div class="analysis-section-title">Topics Detected</div>' +
                '<div class="topic-tags">';
            a.topics.forEach(function (t) {
                html += '<span class="topic-tag">' + escapeHtml(t) + '</span>';
            });
            html += '</div></div>';
        }

        // Engagement score
        if (a.score !== undefined) {
            var scoreColor = a.score >= 70 ? 'var(--success)' : a.score >= 40 ? 'var(--amber)' : 'var(--error)';
            html += '<div class="analysis-section">' +
                '<div class="analysis-section-title">Engagement Score</div>' +
                '<div class="score-bar-wrap">' +
                    '<div class="score-bar"><div class="score-bar-fill" style="width:' + a.score + '%;background:' + scoreColor + '"></div></div>' +
                    '<span class="score-label" style="color:' + scoreColor + '">' + a.score + '</span>' +
                '</div>' +
            '</div>';
        }

        // Insights
        if (a.insights) {
            html += '<div class="analysis-section">' +
                '<div class="analysis-section-title">Key Insights</div>' +
                '<div>' + escapeHtml(a.insights) + '</div>' +
            '</div>';
        }

        html += '</div>';
        $analysisBody.innerHTML = html;
    }

    // ------------------------------------------------------------------
    // RENDERING: SESSION INFO
    // ------------------------------------------------------------------
    function renderSessionInfo() {
        if (state.visitor) {
            var initials = state.visitor.name.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
            $visitorAvatar.textContent = initials;
            $visitorName.textContent = state.visitor.name;
            $visitorCompany.textContent = (state.visitor.title ? state.visitor.title + ' at ' : '') + (state.visitor.company || '');
        }
        $sessionId.textContent = state.sessionId ? state.sessionId.slice(0, 12) : '--';
        $sessionDuration.textContent = formatDuration(state.duration);
    }

    function renderAll() {
        renderSessionInfo();
        renderTranscript();
        renderClicks();
        renderScreenshots();
        renderAnalysis();
    }

    // ------------------------------------------------------------------
    // HELPERS
    // ------------------------------------------------------------------
    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatTimestamp(ms) {
        if (!ms) return '00:00';
        var s = Math.floor(ms / 1000);
        var m = Math.floor(s / 60);
        s = s % 60;
        return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    function formatDuration(seconds) {
        if (!seconds) return '--:--';
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    function estimateTimeRemaining(stage, pct) {
        // Each stage ~30s avg: Transcribe=30s, Correlate=10s, Analyze=40s
        var stageTimes = [30, 10, 40];
        var remaining = 0;
        // Time left in current stage
        var stagePctComplete = (pct - (stage * 33.3)) / 33.3;
        if (stagePctComplete < 0) stagePctComplete = 0;
        if (stagePctComplete > 1) stagePctComplete = 1;
        remaining += stageTimes[stage] * (1 - stagePctComplete);
        // Full time for later stages
        for (var i = stage + 1; i < stageTimes.length; i++) {
            remaining += stageTimes[i];
        }
        remaining = Math.round(remaining);
        if (remaining < 5) return 'a few seconds';
        if (remaining < 60) return '~' + remaining + 's';
        return '~' + Math.ceil(remaining / 60) + 'min';
    }

    // ------------------------------------------------------------------
    // DATA FETCHING
    // ------------------------------------------------------------------
    function fetchSessionData(callback) {
        if (!API_URL || !state.sessionId) {
            // Demo mode -- no real fetch
            if (callback) callback(true);
            return;
        }

        var url = API_URL + '/sessions/' + encodeURIComponent(state.sessionId);
        fetch(url)
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (data) {
                setConnected(true);
                applySessionData(data);
                renderAll();
                if (callback) callback(true);
            })
            .catch(function (err) {
                setConnected(false);
                $bannerDesc.textContent = 'Unable to reach S3: ' + (err.message || 'Network error') + '. Session data may be stale.';
                if (callback) callback(false);
            });
    }

    function applySessionData(data) {
        if (data.visitor) state.visitor = data.visitor;
        if (data.transcript !== undefined) state.transcript = data.transcript;
        if (data.clicks !== undefined) state.clicks = data.clicks;
        if (data.screenshots !== undefined) state.screenshots = data.screenshots;
        if (data.analysis !== undefined) {
            state.analysis = data.analysis;
            state.analysisStage = 3; // completed
        }
        if (data.analysisStage !== undefined) {
            state.analysisStage = data.analysisStage;
            state.analysisPct = data.analysisPct || 0;
        }
        if (data.duration !== undefined) state.duration = data.duration;
        if (data.error) state.error = data.error;
    }

    // ------------------------------------------------------------------
    // POLLING
    // ------------------------------------------------------------------
    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function () {
            fetchSessionData(null);
        }, POLL_INTERVAL);
    }

    // ------------------------------------------------------------------
    // DEMO MODE: populate with sample data or empty states
    // ------------------------------------------------------------------
    function loadDemoMode() {
        var mode = params.get('demo') || 'full'; // full | empty | progress | error

        if (mode === 'empty') {
            // Show all missing-data placeholders
            state.visitor = { name: 'Unknown Visitor', company: 'Badge not scanned', title: '' };
            state.sessionId = 'demo-empty-001';
            state.transcript = null;
            state.clicks = null;
            state.screenshots = null;
            state.analysis = null;
            state.analysisStage = -1;
            state.duration = 0;

        } else if (mode === 'progress') {
            // Show analysis in progress
            state.visitor = { name: 'Sarah Mitchell', company: 'Acme Corp', title: 'CISO' };
            state.sessionId = 'demo-progress-001';
            state.transcript = [
                { ts: 5000, text: 'So tell me about your XDR platform.' },
                { ts: 12000, text: 'Vision One provides a unified view across endpoints, email, servers, and network...' },
                { ts: 25000, text: 'How does it compare to CrowdStrike?' }
            ];
            state.clicks = [
                { timestamp: 8000, element: 'btn-xdr-demo', url: '/demo/xdr' },
                { timestamp: 18000, element: 'tab-endpoints', url: '/demo/xdr/endpoints' }
            ];
            state.screenshots = null;
            state.analysis = null;
            state.analysisStage = 1; // Correlate stage
            state.analysisPct = 45;
            state.duration = 187;

            // Simulate progress
            progressTimer = setInterval(function () {
                state.analysisPct += 2;
                if (state.analysisPct >= 100) {
                    state.analysisPct = 100;
                    state.analysisStage = 3;
                    state.analysis = {
                        topics: ['Vision One XDR', 'Endpoint Security', 'Competitive Analysis'],
                        score: 82,
                        insights: 'Strong interest in XDR consolidation. Visitor compared to CrowdStrike -- emphasize unified platform value and single-agent architecture.'
                    };
                    clearInterval(progressTimer);
                } else if (state.analysisPct >= 66) {
                    state.analysisStage = 2;
                } else if (state.analysisPct >= 33) {
                    state.analysisStage = 1;
                }
                renderAnalysis();
            }, 800);

        } else if (mode === 'error') {
            // Show connection lost + error states
            state.visitor = { name: 'Demo User', company: 'Test Corp', title: 'Engineer' };
            state.sessionId = 'demo-error-001';
            state.transcript = [
                { ts: 3000, text: 'Hi, can you show me the cloud security features?' }
            ];
            state.clicks = [];
            state.screenshots = [];
            state.analysis = null;
            state.error = { stage: 'Analyze', message: 'Bedrock throttling -- rate limit exceeded. Will retry automatically.' };
            state.duration = 45;
            setConnected(false);

        } else {
            // Full demo with all data
            state.visitor = { name: 'James Chen', company: 'TechVault', title: 'VP Engineering' };
            state.sessionId = 'sess-2026-03-31-a7f3';
            state.transcript = [
                { ts: 0, text: 'Welcome to the Trend Micro booth! What brings you here today?' },
                { ts: 8000, text: 'We are looking at consolidating our security stack. Currently running three different vendors.' },
                { ts: 18000, text: 'Vision One can replace multiple point products with a unified platform...' },
                { ts: 35000, text: 'Can you show me the endpoint protection capabilities?' },
                { ts: 42000, text: 'Absolutely. Let me pull up Apex One. Here you can see real-time threat detection...' },
                { ts: 68000, text: 'What about zero-day protection? We had an incident last quarter.' },
                { ts: 75000, text: 'Our virtual patching technology provides protection before patches are available...' },
                { ts: 95000, text: 'This is impressive. Can you send me more details for our security team?' }
            ];
            state.clicks = [
                { timestamp: 20000, element: 'nav-vision-one', url: '/demo/vision-one' },
                { timestamp: 43000, element: 'btn-apex-demo', url: '/demo/apex-one' },
                { timestamp: 50000, element: 'tab-threat-detection', url: '/demo/apex-one/threats' },
                { timestamp: 76000, element: 'btn-virtual-patching', url: '/demo/virtual-patching' },
                { timestamp: 88000, element: 'tab-zero-day', url: '/demo/virtual-patching/zero-day' }
            ];
            state.screenshots = [];
            state.analysis = {
                topics: ['Vision One XDR', 'Apex One', 'Virtual Patching', 'Vendor Consolidation'],
                score: 91,
                insights: 'High-intent prospect evaluating vendor consolidation. Strong interest in endpoint protection and zero-day coverage after a recent incident. Decision-maker level (VP Eng). Recommend scheduling a POC with their security team.'
            };
            state.analysisStage = 3;
            state.duration = 312;
        }

        renderAll();
    }

    // ------------------------------------------------------------------
    // BOOT
    // ------------------------------------------------------------------
    if (API_URL && state.sessionId) {
        fetchSessionData(function (ok) {
            if (!ok) {
                // Still render whatever we have
                renderAll();
            }
        });
        startPolling();
    } else {
        loadDemoMode();
    }

})();
</script>

</body>
</html>
