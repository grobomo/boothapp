<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booth Session Dashboard</title>
<link rel="stylesheet" href="../presenter/styles/mobile.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    line-height: 1.5;
    padding: 24px;
    min-height: 100vh;
  }

  h1 { font-size: 2rem; margin-bottom: 8px; }
  h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

  /* -- Config bar -- */
  .config-bar {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 24px;
  }
  .config-bar label { color: var(--text-muted); font-size: 0.9rem; }
  .config-bar input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 12px; font-size: 1rem; width: 260px;
  }
  .config-bar button {
    background: var(--accent); color: #000; border: none; border-radius: 4px;
    padding: 8px 20px; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  .config-bar button:hover { opacity: 0.85; }

  /* -- Status -- */
  .status {
    font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;
  }
  .status .ok { color: var(--green); }
  .status .err { color: var(--red); }

  /* -- Grid layout -- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .card.full { grid-column: 1 / -1; }

  /* -- Visitor header -- */
  .visitor-header { display: flex; align-items: center; gap: 20px; }
  .visitor-header .name { font-size: 2rem; font-weight: 700; }
  .visitor-header .company { font-size: 1.2rem; color: var(--text-muted); }
  .visitor-header .duration {
    margin-left: auto; font-size: 2.4rem; font-weight: 700; color: var(--green);
  }
  .visitor-header .duration small { font-size: 1rem; color: var(--text-muted); }

  /* -- Score ring -- */
  .score-wrap { text-align: center; }
  .score-ring {
    width: 140px; height: 140px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 3rem; font-weight: 800;
    border: 6px solid var(--border);
    margin-bottom: 8px;
  }
  .score-label { font-size: 1rem; color: var(--text-muted); }

  /* -- Timeline -- */
  .timeline { list-style: none; position: relative; padding-left: 24px; }
  .timeline::before {
    content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
    width: 2px; background: var(--border);
  }
  .timeline li {
    position: relative; margin-bottom: 16px; padding-left: 20px;
  }
  .timeline li::before {
    content: ''; position: absolute; left: -20px; top: 6px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--surface);
  }
  .timeline .ts { color: var(--purple); font-family: monospace; margin-right: 8px; }

  /* -- Products pills -- */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pill {
    background: var(--accent); color: #000; font-weight: 600;
    border-radius: 20px; padding: 4px 14px; font-size: 0.95rem;
  }

  /* -- Follow-up cards -- */
  .follow-ups { display: flex; flex-wrap: wrap; gap: 12px; }
  .follow-card {
    flex: 1 1 260px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; font-size: 1rem;
  }
  .follow-card .num {
    display: inline-block; width: 28px; height: 28px; line-height: 28px;
    text-align: center; border-radius: 50%; background: var(--accent);
    color: #000; font-weight: 700; margin-right: 8px; font-size: 0.9rem;
  }

  /* -- Interests -- */
  .interest-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .interest-row:last-child { border-bottom: none; }
  .confidence { font-size: 0.85rem; padding: 2px 10px; border-radius: 12px; font-weight: 600; }
  .confidence.high { background: var(--green); color: #000; }
  .confidence.medium { background: var(--orange); color: #000; }
  .confidence.low { background: var(--red); color: #fff; }
  .evidence { font-size: 0.85rem; color: var(--text-muted); }

  /* -- CRM export -- */
  .crm-btns { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .crm-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 20px; font-size: 1rem; cursor: pointer;
    text-decoration: none; font-weight: 600; transition: border-color 0.2s;
  }
  .crm-btn:hover { border-color: var(--accent); color: var(--accent); }
  .crm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* -- Sentiment Timeline -- */
  .sent-bar { display: flex; height: 28px; border-radius: 14px; overflow: hidden; gap: 2px; margin-bottom: 14px; }
  .sent-seg { flex: 1; position: relative; cursor: default; transition: opacity 0.15s; min-width: 20px; display: flex; align-items: center; justify-content: center; }
  .sent-seg:hover { opacity: 0.8; }
  .sent-seg-ts { font-size: 9px; color: rgba(0,0,0,0.6); font-weight: 700; }
  .sent-legend { display: flex; gap: 18px; margin-bottom: 18px; flex-wrap: wrap; }
  .sent-leg-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-muted); }
  .sent-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sent-details { display: flex; flex-direction: column; gap: 6px; }
  .sent-detail-row { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .sent-detail-row:last-child { border-bottom: none; }
  .sent-detail-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .sent-detail-ts { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); min-width: 50px; flex-shrink: 0; }
  .sent-detail-text { color: var(--text); flex: 1; }
  .sent-detail-quote { display: block; color: var(--text-muted); font-style: italic; margin-top: 2px; font-size: 0.8rem; }

  /* -- Empty state -- */
  .empty { color: var(--text-muted); font-style: italic; text-align: center; padding: 40px 0; font-size: 1.2rem; }

  /* -- Responsive: 768px -- */
  @media (max-width: 768px) {
    body { padding: 16px; font-size: 16px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; }
    .grid { grid-template-columns: 1fr; }
    .card.full { grid-column: 1; }
    .config-bar { flex-direction: column; align-items: stretch; }
    .config-bar input { width: 100%; min-height: 44px; font-size: 16px; }
    .config-bar button { width: 100%; min-height: 48px; }
    .visitor-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .visitor-header .duration { margin-left: 0; font-size: 1.8rem; }
    .visitor-header .name { font-size: 1.5rem; }
    .score-ring { width: 100px; height: 100px; font-size: 2.2rem; }
    .follow-ups { flex-direction: column; }
    .follow-card { flex: 1 1 100%; }
    .crm-btns { flex-direction: column; }
    .crm-btn { width: 100%; min-height: 48px; justify-content: center; }
    .sent-bar { height: 24px; }
    .interest-row { flex-direction: column; align-items: flex-start; gap: 4px; }
  }

  /* -- Responsive: 480px -- */
  @media (max-width: 480px) {
    body { padding: 8px; }
    h1 { font-size: 1.2rem; }
    .visitor-header .name { font-size: 1.2rem; }
    .visitor-header .duration { font-size: 1.4rem; }
    .score-ring { width: 80px; height: 80px; font-size: 1.8rem; border-width: 4px; }
    .timeline li { padding-left: 14px; font-size: 0.9rem; }
    .sent-bar { height: 20px; }
    .sent-seg-ts { display: none; }
    .pill { font-size: 0.8rem; padding: 3px 8px; }
  }
</style>
</head>
<body>

<!-- Config bar -->
<div class="config-bar">
  <div>
    <label>S3 Bucket</label><br>
    <input id="bucket" type="text" placeholder="my-booth-bucket" />
  </div>
  <div>
    <label>Session ID</label><br>
    <input id="session" type="text" placeholder="A726594" />
  </div>
  <div>
    <label>Region (optional)</label><br>
    <input id="region" type="text" placeholder="us-east-1" value="us-east-1" />
  </div>
  <button onclick="loadSession()">Load Session</button>
</div>

<div class="status" id="status">Enter bucket and session ID above, then click Load Session.</div>

<!-- Dashboard content (hidden until data loads) -->
<div id="dashboard" style="display:none">

  <!-- Row 1: Visitor info + Score -->
  <div class="grid">
    <div class="card">
      <h2>Visitor</h2>
      <div class="visitor-header">
        <div>
          <div class="name" id="vName">--</div>
          <div class="company" id="vCompany">--</div>
        </div>
        <div class="duration"><span id="vDuration">--</span><br><small>minutes</small></div>
      </div>
      <div style="margin-top:16px">
        <h2>Products Shown</h2>
        <div class="pills" id="vProducts"></div>
      </div>
    </div>

    <div class="card">
      <h2>Session Score</h2>
      <div class="score-wrap">
        <div class="score-ring" id="scoreRing">--</div>
        <div class="score-label" id="scoreLabel">Engagement score (1-10)</div>
      </div>
    </div>
  </div>

  <!-- Row 2: Timeline + Interests -->
  <div class="grid" style="margin-top:20px">
    <div class="card">
      <h2>Demo Timeline</h2>
      <ul class="timeline" id="timeline"></ul>
    </div>

    <div class="card">
      <h2>Visitor Interests</h2>
      <div id="interests"></div>
    </div>
  </div>

  <!-- Row 3: Sentiment Timeline -->
  <div class="grid" style="margin-top:20px">
    <div class="card full" id="sentimentCard" style="display:none">
      <h2>Visitor Sentiment</h2>
      <div id="sentimentBar"></div>
      <div id="sentimentLegend"></div>
      <div id="sentimentDetails"></div>
    </div>
  </div>

  <!-- Row 4: Follow-ups -->
  <div class="grid" style="margin-top:20px">
    <div class="card full">
      <h2>Follow-Up Recommendations</h2>
      <div class="follow-ups" id="followUps"></div>
    </div>
  </div>

  <!-- Row 5: Export to CRM -->
  <div class="grid" style="margin-top:20px">
    <div class="card full">
      <h2>Export to CRM</h2>
      <p style="color:var(--text-muted);margin-bottom:8px">Download visitor data for CRM import</p>
      <div class="crm-btns" id="crmBtns">
        <button class="crm-btn" id="btnVcard" disabled onclick="downloadCrm('vcard')">[VCF] vCard Contact</button>
        <button class="crm-btn" id="btnCsv" disabled onclick="downloadCrm('csv')">[CSV] Bulk Import</button>
        <button class="crm-btn" id="btnSalesforce" disabled onclick="downloadCrm('salesforce')">[JSON] Salesforce Lead</button>
      </div>
    </div>
  </div>

</div>

<script>
var refreshTimer = null;

function buildUrl() {
  var bucket = document.getElementById('bucket').value.trim();
  var session = document.getElementById('session').value.trim();
  var region = document.getElementById('region').value.trim() || 'us-east-1';
  if (!bucket || !session) return null;
  return 'https://' + bucket + '.s3.' + region + '.amazonaws.com/sessions/' + session + '/output/summary.json';
}

function setStatus(msg, ok) {
  var el = document.getElementById('status');
  el.innerHTML = '<span class="' + (ok ? 'ok' : 'err') + '">' + msg + '</span>';
}

function computeScore(data) {
  var score = 0;
  // Duration: up to 3 points (15+ min = 3, 10+ = 2, 5+ = 1)
  var dur = Math.round((data.demo_duration_seconds || 0) / 60) || 0;
  if (dur >= 15) score += 3;
  else if (dur >= 10) score += 2;
  else if (dur >= 5) score += 1;

  // Products shown: up to 3 points (3+ = 3, 2 = 2, 1 = 1)
  var prods = (data.products_demonstrated || []).length;
  if (prods >= 3) score += 3;
  else score += prods;

  // Interests with high confidence: up to 2 points
  var highInterests = (data.key_interests || []).filter(function(i) { return i.confidence === 'high'; }).length;
  if (highInterests >= 2) score += 2;
  else score += highInterests;

  // Key moments: up to 2 points
  var moments = (data.key_moments || []).length;
  if (moments >= 3) score += 2;
  else if (moments >= 1) score += 1;

  return Math.min(10, Math.max(1, score));
}

function scoreColor(s) {
  if (s >= 8) return 'var(--green)';
  if (s >= 5) return 'var(--orange)';
  return 'var(--red)';
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function render(data) {
  document.getElementById('dashboard').style.display = 'block';

  // Visitor info
  document.getElementById('vName').textContent = data.visitor_name || 'Unknown';
  // Company from follow-up sdr_notes or tags
  var company = '';
  if (data.sdr_notes) {
    var m = data.sdr_notes.match(/from\s+(\S+)/i);
    if (m) company = m[1];
  }
  document.getElementById('vCompany').textContent = company || (data.tags || []).join(', ') || '';
  document.getElementById('vDuration').textContent = Math.round((data.demo_duration_seconds || 0) / 60) || '--';

  // Products
  var pills = document.getElementById('vProducts');
  pills.innerHTML = '';
  (data.products_demonstrated || []).forEach(function(p) {
    var span = document.createElement('span');
    span.className = 'pill';
    span.textContent = p;
    pills.appendChild(span);
  });

  // Score
  var score = computeScore(data);
  var ring = document.getElementById('scoreRing');
  ring.textContent = score;
  ring.style.borderColor = scoreColor(score);
  ring.style.color = scoreColor(score);
  document.getElementById('scoreLabel').textContent =
    score >= 8 ? 'High engagement' : score >= 5 ? 'Moderate engagement' : 'Low engagement';

  // Timeline (key_moments + products_demonstrated as fallback)
  var tl = document.getElementById('timeline');
  tl.innerHTML = '';
  var moments = data.key_moments || [];
  if (moments.length === 0 && data.products_demonstrated) {
    moments = data.products_demonstrated.map(function(p, i) {
      return { timestamp: '--:--', description: 'Demonstrated ' + p };
    });
  }
  moments.forEach(function(m) {
    var li = document.createElement('li');
    li.innerHTML = '<span class="ts">' + esc(m.timestamp || '') + '</span> ' + esc(m.description || '');
    tl.appendChild(li);
  });

  // Interests
  var intEl = document.getElementById('interests');
  intEl.innerHTML = '';
  (data.key_interests || []).forEach(function(vi) {
    var row = document.createElement('div');
    row.className = 'interest-row';
    row.innerHTML =
      '<div><strong>' + esc(vi.topic) + '</strong><br><span class="evidence">' + esc(vi.evidence || '') + '</span></div>' +
      '<span class="confidence ' + esc(vi.confidence || 'medium') + '">' + esc(vi.confidence || '?') + '</span>';
    intEl.appendChild(row);
  });

  // Follow-ups
  var fu = document.getElementById('followUps');
  fu.innerHTML = '';
  (data.follow_up_actions || []).forEach(function(text, i) {
    var card = document.createElement('div');
    card.className = 'follow-card';
    card.innerHTML = '<span class="num">' + (i + 1) + '</span>' + esc(text);
    fu.appendChild(card);
  });

  // Sentiment timeline
  renderSentiment(data.sentiment_timeline || []);

  // Enable CRM export buttons
  document.getElementById('btnVcard').disabled = false;
  document.getElementById('btnCsv').disabled = false;
  document.getElementById('btnSalesforce').disabled = false;
  window._crmData = data;
}

var SENT_COLORS = { positive: '#3fb950', neutral: '#58a6ff', hesitation: '#d29922', skepticism: '#f85149' };
var SENT_LABELS = { positive: 'Positive', neutral: 'Neutral', hesitation: 'Hesitation', skepticism: 'Skepticism' };

function renderSentiment(items) {
  var card = document.getElementById('sentimentCard');
  var barEl = document.getElementById('sentimentBar');
  var legendEl = document.getElementById('sentimentLegend');
  var detailsEl = document.getElementById('sentimentDetails');
  if (!items || items.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  // Bar
  var barHtml = '<div class="sent-bar">';
  items.forEach(function(s) {
    var sent = (s.sentiment || 'neutral').toLowerCase();
    var color = SENT_COLORS[sent] || SENT_COLORS.neutral;
    var ts = esc(s.timestamp_rel || '');
    var tip = ts + ' -- ' + esc(s.indicator || '');
    if (s.speaker_text) tip += ': "' + esc(s.speaker_text) + '"';
    barHtml += '<div class="sent-seg" style="background:' + color + '" title="' + tip + '"><span class="sent-seg-ts">' + ts + '</span></div>';
  });
  barHtml += '</div>';
  barEl.innerHTML = barHtml;

  // Legend
  var legHtml = '<div class="sent-legend">';
  ['positive', 'neutral', 'hesitation', 'skepticism'].forEach(function(key) {
    legHtml += '<span class="sent-leg-item"><span class="sent-leg-dot" style="background:' + SENT_COLORS[key] + '"></span>' + SENT_LABELS[key] + '</span>';
  });
  legHtml += '</div>';
  legendEl.innerHTML = legHtml;

  // Detail rows
  var detHtml = '<div class="sent-details">';
  items.forEach(function(s) {
    var sent = (s.sentiment || 'neutral').toLowerCase();
    var color = SENT_COLORS[sent] || SENT_COLORS.neutral;
    detHtml += '<div class="sent-detail-row">';
    detHtml += '<span class="sent-detail-dot" style="background:' + color + '"></span>';
    detHtml += '<span class="sent-detail-ts">' + esc(s.timestamp_rel || '') + '</span>';
    detHtml += '<span class="sent-detail-text">' + esc(s.indicator || '');
    if (s.speaker_text) detHtml += '<span class="sent-detail-quote">"' + esc(s.speaker_text) + '"</span>';
    detHtml += '</span></div>';
  });
  detHtml += '</div>';
  detailsEl.innerHTML = detHtml;
}

function generateVcard(data) {
  var name = data.visitor_name || 'Unknown Visitor';
  var parts = name.split(' ');
  var first = parts[0] || name;
  var last = parts.slice(1).join(' ') || '';
  var products = (data.products_demonstrated || []).join(', ');
  var lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:' + last + ';' + first + ';;;',
    'FN:' + name
  ];
  if (products) lines.push('NOTE:Demo products: ' + products);
  lines.push('REV:' + new Date().toISOString().replace(/\.\d+/, ''));
  lines.push('END:VCARD');
  return lines.join('\r\n');
}

function generateCsv(data) {
  var name = data.visitor_name || '';
  var products = (data.products_demonstrated || []).join('; ');
  var score = data.session_score || 0;
  var actions = (data.follow_up_actions || []).join('; ');
  function csvEsc(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }
  var header = 'name,company,title,products_shown,engagement_score,follow_up_actions';
  var row = [name, '', '', products, score, actions].map(csvEsc).join(',');
  return header + '\n' + row + '\n';
}

function generateSalesforceLead(data) {
  var name = data.visitor_name || 'Unknown';
  var parts = name.split(' ');
  var first = parts[0] || name;
  var last = parts.slice(1).join(' ') || '(Unknown)';
  var score = data.session_score || 0;
  var rating = score >= 8 ? 'Hot' : score >= 5 ? 'Warm' : 'Cold';
  return JSON.stringify({
    attributes: { type: 'Lead' },
    FirstName: first,
    LastName: last,
    Company: '(Unknown)',
    Title: '',
    Email: '',
    LeadSource: 'Trade Show',
    Rating: rating,
    Description: data.executive_summary || '',
    ProductInterest__c: (data.products_demonstrated || []).join('; '),
    EngagementScore__c: score,
    FollowUpActions__c: (data.follow_up_actions || []).join('; '),
    DemoDate__c: data.generated_at || '',
    SessionId__c: data.session_id || ''
  }, null, 2);
}

function downloadCrm(format) {
  var data = window._crmData;
  if (!data) return;
  var content, filename, mime;
  var sid = data.session_id || 'session';
  if (format === 'vcard') {
    content = generateVcard(data);
    filename = sid + '.vcf';
    mime = 'text/vcard';
  } else if (format === 'csv') {
    content = generateCsv(data);
    filename = sid + '.csv';
    mime = 'text/csv';
  } else {
    content = generateSalesforceLead(data);
    filename = sid + '_salesforce.json';
    mime = 'application/json';
  }
  var blob = new Blob([content], { type: mime });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadSession() {
  var url = buildUrl();
  if (!url) { setStatus('Please enter bucket and session ID.', false); return; }

  setStatus('Fetching ' + url + ' ...', true);

  fetch(url, { mode: 'cors' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var now = new Date().toLocaleTimeString();
      setStatus('Loaded at ' + now + ' | Next refresh in 30s', true);
      render(data);
      startAutoRefresh();
    })
    .catch(function(err) {
      setStatus('Error: ' + err.message + '. Check bucket permissions (CORS) and session ID.', false);
    });
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() {
    var url = buildUrl();
    if (!url) return;
    fetch(url, { mode: 'cors' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
      .then(function(data) {
        var now = new Date().toLocaleTimeString();
        setStatus('Refreshed at ' + now + ' | Next refresh in 30s', true);
        render(data);
      })
      .catch(function(err) {
        setStatus('Refresh failed: ' + err + ' | Retrying in 30s', false);
      });
  }, 30000);
}

// Allow Enter key to trigger load
document.getElementById('session').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadSession();
});
</script>
</body>
</html>
