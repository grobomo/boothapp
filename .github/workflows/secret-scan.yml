name: Secret Scan
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and personal paths
        run: |
          echo "Scanning for secrets and personal paths..."
          FAIL=0

          # Check for API keys/tokens
          if grep -rn "TOKEN=\|KEY=\|SECRET=\|PASSWORD=" . \
            --include="*.py" --include="*.js" --include="*.json" --include="*.env" \
            | grep -v node_modules | grep -v ".git/" | grep -v "secret-scan.yml" | grep -v "process.env"; then
            echo "FAIL: Found potential secrets"
            FAIL=1
          fi

          # Check for personal paths
          if grep -rn "C:/Users/joelg\|OneDrive - TrendMicro\|joel-ginsberg\|joeltest\|joelg" . \
            --include="*.py" --include="*.js" --include="*.json" --include="*.md" \
            --include="*.sh" --include="*.yaml" --include="*.yml" \
            | grep -v node_modules | grep -v ".git/" | grep -v "secret-scan.yml"; then
            echo "FAIL: Found personal paths"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            exit 1
          fi

          echo "All clean."
