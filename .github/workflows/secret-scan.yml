name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and PII
        run: |
          FOUND=0

          # API keys and tokens
          if grep -rn "TOKEN=\|KEY=\|SECRET=\|PASSWORD=" \
            --include="*.py" --include="*.js" --include="*.json" --include="*.env" \
            --exclude-dir=.git --exclude-dir=node_modules . ; then
            echo "::error::Potential secrets found"
            FOUND=1
          fi

          # AWS/Azure subscription IDs and storage keys
          if grep -rn "[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}" \
            --include="*.py" --include="*.js" --include="*.json" --include="*.yaml" --include="*.yml" \
            --exclude-dir=.git --exclude-dir=node_modules . ; then
            echo "::warning::Possible subscription/tenant IDs found -- verify they are not real"
            FOUND=1
          fi

          # Personal paths
          if grep -rn "C:/Users/\|/home/[a-z]" \
            --include="*.py" --include="*.js" --include="*.json" --include="*.md" \
            --exclude-dir=.git --exclude-dir=node_modules . ; then
            echo "::error::Personal paths found"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "Review the findings above. Failing if secrets or personal paths detected."
            exit 1
          fi

          echo "No secrets or PII found."

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests -v
